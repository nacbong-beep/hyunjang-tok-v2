async function printSelectedInspectionItems(folderId) {
  const checks = document.querySelectorAll('.inspection-print-check:checked');
  if(checks.length === 0) { showToast('мЭЄмЗДнХ† лПДл©імЭД мД†нГЭнХі м£ЉмДЄмЪФ.'); return; }
  const selectedIds = [...checks].map(c => c.dataset.itemId);
  // нЪМм†Д м†Хл≥і мИШмІС
  const rotatedIds = new Set([...document.querySelectorAll('button[data-rotated="1"]')].map(b => {
    return b.closest('.drag-item')?.dataset.id;
  }).filter(Boolean));
  const items = (inspectionItems[folderId] || []).filter(item => selectedIds.includes(item.id));

  const signedItems = await Promise.all(items.map(async item => {
    const doc = inspectionDocs.find(d => d.id === item.doc_id);
    if(!doc) return null;
    let url = doc.file_url;
    try {
      const filePath = doc.file_path || (doc.file_url ? doc.file_url.split('/library/')[1]?.split('?')[0] : null);
      if(filePath) url = await getLibraryFileUrl(filePath) || url;
    } catch(e) {}
    return { id: item.id, url, paper_size: item.paper_size || 'A4 landscape', title: doc.title };
  }));

  const validItems = signedItems.filter(Boolean);
  if(validItems.length === 0) { showToast('мЭЄмЗДнХ† лПДл©імЭі мЧЖмЦімЪФ.'); return; }

  const printWin = window.open('', '_blank');
  const pageStyles = '@page{margin:5mm;}';
  const styleStr = `
    *{margin:0;padding:0;}
    body{margin:0;}
    @media print{
      body{margin:0;}
      img{display:block;width:100%;height:100vh;object-fit:contain;page-break-after:always;}
      img:last-child{page-break-after:avoid;}
    }
  `;
  // нЪМм†Д мЭілѓЄмІАл•Љ canvasл°Ь л≥АнЩШ
  async function rotateImgToDataUrl(url) {
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalHeight;
        canvas.height = img.naturalWidth;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(Math.PI/2);
        ctx.drawImage(img, -img.naturalWidth/2, -img.naturalHeight/2);
        resolve(canvas.toDataURL('image/jpeg', 0.95));
      };
      img.onerror = () => resolve(url);
      img.src = url;
    });
  }
  // нЪМм†Д мЭілѓЄмІА лѓЄл¶ђ л≥АнЩШ
  const processedItems = await Promise.all(validItems.map(async item => {
    if(rotatedIds?.has(item.id)) {
      const rotatedUrl = await rotateImgToDataUrl(item.url);
      return {...item, url: rotatedUrl};
    }
    return item;
  }));
  const pagesHtml = processedItems.map((item,i) => {
    const isLast = i === processedItems.length - 1;
    return `<div style="page-break-after:${isLast?'avoid':'always'};break-after:${isLast?'avoid':'page'};width:100%;height:100vh;display:flex;align-items:center;justify-content:center;"><img src="${item.url}" style="width:100%;height:100%;object-fit:contain;"></div>`;
  }).join('');
  const scriptStr = 'window.onload=function(){setTimeout(function(){window.print();},800);};';
  printWin.document.write('<!DOCTYPE html><html><head><title>к≤АмЄ°мЪФм≤≠мДЬ</title><style>' + styleStr + '<\/style><\/head><body>' + pagesHtml + '<script>' + scriptStr + '<\/scr' + 'ipt><\/body><\/html>');
  printWin.document.close();
}

async function printInspectionFolder(folderId) {
  if(!inspectionItems[folderId]) await loadInspectionItems(folderId);
  const items = inspectionItems[folderId] || [];
  if(items.length === 0) { alert('мґЬл†•нХ† лПДл©імЭі мЧЖмКµлЛИлЛ§.'); return; }

  // мЭілѓЄмІА URL мДЬл™Е к∞±мЛ†
  const signedItems = await Promise.all(items.map(async item => {
    const doc = inspectionDocs.find(d => d.id === item.doc_id);
    if(!doc) return null;
    let url = doc.file_url;
    try {
      const filePath = doc.file_path || (doc.file_url ? doc.file_url.split('/library/')[1]?.split('?')[0] : null);
      if(filePath) url = await getLibraryFileUrl(filePath) || url;
    } catch(e) {}
    const paperSize = item.paper_size || 'A4 landscape';
    return { url, paper_size: paperSize, title: doc.title };
  }));

  const validItems = signedItems.filter(Boolean);

  const printWin = window.open('', '_blank');
  const pageStyles = '@page{margin:5mm;}';

  const styleStr = `
    *{margin:0;padding:0;}
    body{margin:0;}
    @media print{
      body{margin:0;}
      img{display:block;width:100%;height:100vh;object-fit:contain;page-break-after:always;}
      img:last-child{page-break-after:avoid;}
    }
  `;
  const pagesHtml = validItems.map((item,i) =>
    `<img src="${item.url}" alt="${item.title}">`
  ).join('');
  const scriptStr = 'window.onload=function(){setTimeout(function(){window.print();},800);};';
  printWin.document.write('<!DOCTYPE html><html><head><title>к≤АмЄ°мЪФм≤≠мДЬ</title><style>' + styleStr + '<\/style><\/head><body>' + pagesHtml + '<script>' + scriptStr + '<\/scr' + 'ipt><\/body><\/html>');
  printWin.document.close();
}

function renderLibrarySearch(q, storageType) {
  const countEl = document.getElementById('lib-search-count');
  if(!q.trim()) {
    // к≤АмГЙмЦі мЧЖмЬЉл©і м†Дм≤і нСЬмЛЬ
    document.getElementById('lib-doc-grid') && renderLibraryGrid(libraryDocs, storageType);
    if(countEl) countEl.textContent = '';
    return;
  }
  const lower = q.toLowerCase();
  const results = libraryDocs.filter(doc => {
    const catLabel = getCatLabel(doc.category).toLowerCase();
    return (doc.title||'').toLowerCase().includes(lower)
      || (doc.file_name||'').toLowerCase().includes(lower)
      || (doc.category||'').toLowerCase().includes(lower)
      || catLabel.includes(lower)
      || (doc.memo||'').toLowerCase().includes(lower);
  });
  if(countEl) countEl.textContent = results.length + 'к±і';
  renderLibraryGrid(results, storageType, q);
}

  gridEl.innerHTML = docs.map(doc => {

// мНЄлД§мЭЉ signed URLмЭД localStorageмЧР мЇРмЛ± (мГИл°Ьк≥†мє®/мЮђл∞©лђЄнХілПД мЬ†мІА вЖТ transform/egress мВђмЪ©лЯЙ мµЬмЖМнЩФ)
// signed URLмЭД 7мЭЉмІЬл¶ђл°Ь кЄЄк≤М л∞ЬкЄЙ вЖТ лПДл©імЭА к±∞мЭШ мХИ л∞ФлАМлКФ м†Хм†Б мЮРл£МмЭілѓАл°Ь мЮРм£Љ мЮђл∞ЬкЄЙнХ† нХДмЪФ мЧЖмЭМ
const LIB_THUMB_CACHE_KEY = 'hj_thumb_cache_v1';
const LIB_THUMB_EXPIRES_IN = 7 * 24 * 60 * 60; // signed URL мЬ†нЪ®кЄ∞к∞Д: 7мЭЉ (міИ лЛ®мЬД)
const LIB_THUMB_CACHE_TTL = 6 * 24 * 60 * 60 * 1000; // мЇРмЛЬ мЬ†мІА: 6мЭЉ (URL лІМл£М 1мЭЉ м†Д мЧђмЬ†)

function getThumbCacheStore() {
  try { return JSON.parse(localStorage.getItem(LIB_THUMB_CACHE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function setThumbCacheStore(store) {
  try { localStorage.setItem(LIB_THUMB_CACHE_KEY, JSON.stringify(store)); }
  catch(e) {
    // мЪ©лЯЙ міИк≥Љ лУ±мЬЉл°Ь м†АмЮ• мЛ§нМ®нХШл©і мЇРмЛЬ лєДмЪ∞к≥† мЮђмЛЬлПД (мШ§лЮШлРЬ нХ≠л™© лИДм†Б л∞©мІА)
    try { localStorage.removeItem(LIB_THUMB_CACHE_KEY); localStorage.setItem(LIB_THUMB_CACHE_KEY, JSON.stringify(store)); }
    catch(e2) {}
  }
}

let libThumbUrlCache = {}; // file_path -> signed URL (л©Фл™®л¶ђ, localStorageмЭШ лє†л•Є 1м∞® мЇРмЛЬ)

// мЧЕл°ЬлУЬ мЛЬ лѓЄл¶ђ мГЭмД±нХілСФ мЮСмЭА мНЄлД§мЭЉ нММмЭЉмЭШ signed URL л∞ЬкЄЙ (transform лґИнХДмЪФ - Free нФМлЮЬмЧРмДЬлПД лПЩмЮС)
async function getLibraryThumbFileUrl(thumbPath) {
  if(libThumbUrlCache[thumbPath]) return libThumbUrlCache[thumbPath];

  const store = getThumbCacheStore();
  const cached = store[thumbPath];
  if(cached && (Date.now() - cached.ts) < LIB_THUMB_CACHE_TTL) {
    libThumbUrlCache[thumbPath] = cached.url;
    return cached.url;
  }

  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/library/${thumbPath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ expiresIn: LIB_THUMB_EXPIRES_IN })
  });
  if(!res.ok) return null;
  const data = await res.json();
  if(!data.signedURL) return null;
  const url = `${SUPABASE_URL}/storage/v1${data.signedURL}`;
  libThumbUrlCache[thumbPath] = url;
  store[thumbPath] = { url, ts: Date.now() };
  setThumbCacheStore(store);
  return url;
}

async function getLibraryThumbUrl(filePath) {
  // 1м∞®: л©Фл™®л¶ђ мЇРмЛЬ
  if(libThumbUrlCache[filePath]) return libThumbUrlCache[filePath];

  // 2м∞®: localStorage мЇРмЛЬ (лІМл£М мХИ лРРмЬЉл©і мЮђмВђмЪ© вЖТ transform мЪФм≤≠ мЮРм≤іл•Љ мХИ л≥ілГД)
  const store = getThumbCacheStore();
  const cached = store[filePath];
  if(cached && (Date.now() - cached.ts) < LIB_THUMB_CACHE_TTL) {
    libThumbUrlCache[filePath] = cached.url;
    return cached.url;
  }

  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/library/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ expiresIn: LIB_THUMB_EXPIRES_IN, transform: { width: 240, height: 240, resize: 'cover', quality: 60 } })
  });
  if(!res.ok) {
    console.warn('мНЄлД§мЭЉ signed URL л∞ЬкЄЙ мЛ§нМ®:', filePath, res.status, await res.text().catch(()=>''));
    return null;
  }
  const data = await res.json();
  if(!data.signedURL) {
    console.warn('мНЄлД§мЭЉ signedURL лИДлЭљ:', filePath, data);
    return null;
  }
  const url = `${SUPABASE_URL}/storage/v1${data.signedURL}`;
  libThumbUrlCache[filePath] = url;

  // localStorageмЧРлПД м†АмЮ• (лЛ§мЭМ л∞©лђЄ/мГИл°Ьк≥†мє® лХМ мЮђмВђмЪ©)
  store[filePath] = { url, ts: Date.now() };
  setThumbCacheStore(store);

  return url;
}

let libThumbObserver = null;

async function loadLibraryThumbs() {
  const imgs = Array.from(document.querySelectorAll('.lib-thumb')).filter(img => !img.dataset.loaded && !img.dataset.observed);
  if(!imgs.length) return;

  const loadOne = async (img) => {
    const path = img.dataset.path;
    const thumbPath = img.dataset.thumbPath;
    if(!path || img.dataset.loaded) return;
    img.dataset.loaded = '1';
    try {
      let url;
      if(thumbPath) {
        // мЧЕл°ЬлУЬ мЛЬ лѓЄл¶ђ лІМлУ§мЦілСФ мЮСмЭА мНЄлД§мЭЉ нММмЭЉ мВђмЪ© (Free нФМлЮЬмЧРмДЬлПД лПЩмЮС, transform лґИнХДмЪФ)
        url = await getLibraryThumbFileUrl(thumbPath);
      }
      if(!url) {
        // кµђл≤Дм†Д лПДл©і(мНЄлД§мЭЉ мЧЖмЭМ) - мДЬл≤Д transform мЛЬлПД (Pro нФМлЮЬмЧРмДЬлІМ лПЩмЮС)
        url = await getLibraryThumbUrl(path);
      }
      if(!url) url = await getLibraryFileUrl(path);
      if(url) {
        img.src = url;
      } else {
        console.warn('мНЄлД§мЭЉ URL л∞ЬкЄЙ мЛ§нМ® (м†ДлґА null):', path);
      }
    } catch(e) {
      console.warn('мНЄлД§мЭЉ л°ЬлУЬ мШИмЩЄ:', path, e);
    }
  };

  if('IntersectionObserver' in window) {
    if(!libThumbObserver) {
      libThumbObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting) {
            loadOne(entry.target);
            libThumbObserver.unobserve(entry.target);
          }
        });
      }, { rootMargin: '300px' }); // нЩФл©імЧР лУ§мЦімШ§кЄ∞ 300px м†ДлґАнД∞ лѓЄл¶ђ л°ЬлУЬ (мК§нБђл°§ мЛЬ лБКкєА мЧЖмЭі)
    }
    imgs.forEach(img => {
      img.dataset.observed = '1';
      libThumbObserver.observe(img);
    });
  } else {
    // нПіл∞±: IntersectionObserver лѓЄмІАмЫР мЛЬ лПЩмЛЬ л°ЬлУЬ
    const concurrency = 6;
    let idx = 0;
    async function worker() {
      while(idx < imgs.length) { await loadOne(imgs[idx++]); }
    }
    await Promise.all(Array.from({ length: Math.min(concurrency, imgs.length) }, worker));
  }
}

let libZoomScale = 1;      // нШДмЮђ м§М л∞∞мЬ® (1 = fit кЄ∞м§А)
let libBaseFitWidth = 0;   // "м†Дм≤і лІЮмґ§" мГБнГЬмЭШ кЄ∞м§А лДИлєД(px)

function libApplyZoomWidth() {
  const img = document.getElementById('lib-view-img');
  if(!img || !libBaseFitWidth) return;
  img.style.width = (libBaseFitWidth * libZoomScale) + 'px';
  img.style.height = 'auto';
  const label = document.getElementById('lib-zoom-label');
  if(label) label.textContent = Math.round(libZoomScale * 100) + '%';
}

function libZoom(delta) {
  if(!libBaseFitWidth) return;
  libZoomScale = Math.max(0.2, Math.min(8, libZoomScale + delta));
  libApplyZoomWidth();
}

function libZoomReset() {
  // мЫРл≥Є = мЭілѓЄмІАмЭШ мЛ§м†Ь мЮРмЧ∞ нФљмЕА нБђкЄ∞
  const img = document.getElementById('lib-view-img');
  if(img && img.naturalWidth && libBaseFitWidth) {
    libZoomScale = img.naturalWidth / libBaseFitWidth;
    libApplyZoomWidth();
  }
}

function libZoomFit() {
  const img = document.getElementById('lib-view-img');
  const container = document.getElementById('lib-view-scroll');
  if(!img || !container || !img.naturalWidth) {
    libZoomScale = 1;
    const label = document.getElementById('lib-zoom-label');
    if(label) label.textContent = '100%';
    return;
  }
  const availW = Math.max(50, container.clientWidth - 40);  // padding 20px*2 к≥†л†§
  const availH = Math.max(50, container.clientHeight - 40);
  const ratio = img.naturalWidth / img.naturalHeight;
  let w = availW, h = w / ratio;
  if(h > availH) { h = availH; w = h * ratio; }
  libBaseFitWidth = w;
  libZoomScale = 1;
  img.style.width = w + 'px';
  img.style.height = 'auto';
  const label = document.getElementById('lib-zoom-label');
  if(label) label.textContent = '100%';
}

function initLibViewerDrag() {
  const el = document.getElementById('lib-view-scroll');
  if(!el) return;
  let isDragging = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;

  const onDown = (x, y) => {
    isDragging = true;
    startX = x; startY = y;
    scrollLeft = el.scrollLeft; scrollTop = el.scrollTop;
    el.style.cursor = 'grabbing';
    el.style.userSelect = 'none';
  };
  const onMove = (x, y) => {
    if(!isDragging) return;
    el.scrollLeft = scrollLeft - (x - startX);
    el.scrollTop  = scrollTop  - (y - startY);
  };
  const onUp = () => {
    isDragging = false;
    el.style.cursor = 'grab';
    el.style.userSelect = '';
  };

  el.addEventListener('mousedown',  e => { if(e.button===0) onDown(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   onUp);

  // нД∞мєШ мІАмЫР (л™®л∞ФмЭЉ)
  el.addEventListener('touchstart', e => { const t=e.touches[0]; onDown(t.clientX, t.clientY); }, {passive:true});
  el.addEventListener('touchmove',  e => { const t=e.touches[0]; onMove(t.clientX, t.clientY); }, {passive:true});
  el.addEventListener('touchend',   onUp);
}

  // лПДл©і лєДмЬ®мЧР лФ∞лЭЉ мЪ©мІА л∞©нЦ• мЮРлПЩ к≤∞м†Х
  const isLandscape = img.naturalWidth > img.naturalHeight;

function popoutLibraryDoc() {

  const doc = libFloatWin.document;
  doc.open();
  doc.write('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>' + title + '</title><style>');
  doc.write('* { box-sizing:border-box; margin:0; padding:0; }');
  doc.write('body { background:#1a2332; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }');

  doc.write('.img-wrap { flex:1; overflow:auto; display:block; padding:12px; text-align:center; cursor:grab; }');
  doc.write('.img-wrap.dragging { cursor:grabbing; }');
  doc.write('.zoom-bar { background:#263448; padding:8px 14px; display:flex; gap:8px; align-items:center; justify-content:center; flex-shrink:0; }');
  doc.write('button { border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); color:#fff; border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; }');
  doc.write('button:hover { background:rgba(255,255,255,.3); }');
  doc.write('</style></head><body>');
  doc.write('<div class="header">');
  doc.write('<div><div style="color:#fff;font-size:13px;font-weight:700">' + title + '</div>');
  doc.write('<div style="color:rgba(255,255,255,.5);font-size:11px;margin-top:2px">' + meta + '</div></div>');
  doc.write('<div style="color:rgba(255,255,255,.4);font-size:11px">лУЬлЮШкЈЄл°Ь мЭілПЩ / л≤ДнКЉмЬЉл°Ь нЩХлМА</div></div>');
  doc.write('<div class="img-wrap" id="img-wrap"><img id="main-img" src="' + imgSrc + '" style="border-radius:6px;margin:auto;display:block;user-select:none;-webkit-user-drag:none"></div>');
  doc.write('<div class="zoom-bar">');
  doc.write('<button id="zm">вИТ мґХмЖМ</button>');
  doc.write('<span id="zl" style="color:rgba(255,255,255,.7);font-size:12px;min-width:44px;text-align:center">100%</span>');
  doc.write('<button id="zp">+ нЩХлМА</button>');
  doc.write('<button id="zr">мЫРл≥Є</button>');
  doc.write('<button id="zf">м†Дм≤і лІЮмґ§</button>');
  doc.write('</div>');
  doc.close();

  const win = libFloatWin;
  win.onload = function() {
    const img = win.document.getElementById('main-img');
    const wrap = win.document.getElementById('img-wrap');
    let baseFitWidth = 0, zoomScale = 1;

    function applyZoom() {
      img.style.width = (baseFitWidth * zoomScale) + 'px';
      img.style.height = 'auto';
      win.document.getElementById('zl').textContent = Math.round(zoomScale * 100) + '%';
    }
    function setZoom(s) {
      zoomScale = Math.max(0.2, Math.min(8, s));
      applyZoom();
    }
    function fitZoom() {
      if(!img.naturalWidth) return;
      const availW = Math.max(50, wrap.clientWidth - 24);
      const availH = Math.max(50, wrap.clientHeight - 24);
      const ratio = img.naturalWidth / img.naturalHeight;
      let w = availW, h = w / ratio;
      if(h > availH) { h = availH; w = h * ratio; }
      baseFitWidth = w; zoomScale = 1;
      img.style.width = w + 'px'; img.style.height = 'auto';
      win.document.getElementById('zl').textContent = '100%';
    }
    img.onload = fitZoom;
    if(img.complete && img.naturalWidth) fitZoom();

    win.document.getElementById('zm').onclick = () => setZoom(zoomScale - 0.2);
    win.document.getElementById('zp').onclick = () => setZoom(zoomScale + 0.2);
    win.document.getElementById('zr').onclick = () => { if(img.naturalWidth && baseFitWidth) setZoom(img.naturalWidth / baseFitWidth); };
    win.document.getElementById('zf').onclick = fitZoom;

    // лУЬлЮШкЈЄл°Ь мЭілПЩ
    let isDragging = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;
    wrap.addEventListener('mousedown', e => {
      if(e.button !== 0) return;
      isDragging = true; startX = e.clientX; startY = e.clientY;
      scrollLeft = wrap.scrollLeft; scrollTop = wrap.scrollTop;
      wrap.classList.add('dragging');
    });
    win.addEventListener('mousemove', e => {
      if(!isDragging) return;
      wrap.scrollLeft = scrollLeft - (e.clientX - startX);
      wrap.scrollTop  = scrollTop  - (e.clientY - startY);
    });
    win.addEventListener('mouseup', () => { isDragging = false; wrap.classList.remove('dragging'); });
  };
  if(win.document.readyState === 'complete') win.onload();
  libFloatWin.focus();
}

let personalEvents = [];

async function loadPersonalEvents() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_events?user_id=eq.${userId}&order=date.asc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(res.ok) personalEvents = await res.json();
  } catch(e) { console.warn('personal events load error', e); }
}

async function savePersonalEvent(ev) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  const payload = { user_id: userId, date: ev.date, end_date: ev.end_date||null, title: ev.title, memo: ev.memo||'', color: ev.color||'#3b82f6' };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_events`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(payload)
  });
  if(res.ok) { const rows = await res.json(); personalEvents.push(rows[0]); }
}

async function updatePersonalEvent(id, patch) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_events?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(patch)
  });
  personalEvents = personalEvents.map(e => e.id === id ? {...e, ...patch} : e);
}

async function deletePersonalEvent(id) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_events?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  personalEvents = personalEvents.filter(e => e.id !== id);
}

async function confirmSavePersonalEvent(editId) {
  const modal = document.getElementById('personal-event-modal');
  const title = document.getElementById('pev-title')?.value.trim();
  const date = document.getElementById('pev-date')?.value;
  const end_date = document.getElementById('pev-end')?.value || null;
  const memo = document.getElementById('pev-memo')?.value.trim();
  const colorEl = modal?.querySelector('div[data-color][style*="outline:2.5px"]') || modal?.querySelector('div[data-color]');
  const color = modal?._getSelectedColor?.() || colorEl?.dataset.color || '#3b82f6';
  if(!title || !date) { showToast('м†Ьл™©к≥Љ лВ†мІЬл•Љ мЮЕл†•нХім£ЉмДЄмЪФ.'); return; }

  const isOffDay = /^нЬілђі/.test(title.trim());
  const finalColor = isOffDay ? '#ef4444' : color;

  if(editId) {
    await updatePersonalEvent(editId, { title, date, end_date, memo, color: finalColor });
    // нЬілђіл©і customEventsлПД мЧЕлН∞мЭінКЄ
    if(isOffDay) {
      const existing = customEvents.find(e => /^нЬілђі/.test(e.title?.trim()) && e.date === date);
      if(existing) {
        customEvents = customEvents.map(e => e.id === existing.id ? {...e, title, date, endDate: end_date||null, memo} : e);
      } else {
        customEvents.push({id:uid(), title, date, endDate: end_date||null, tag:'мЭЉм†Х', color:'#ef4444', memo, createdAt: new Date().toISOString()});
      }
      save(); saveCustomEventsToSupabase();
    }
    showToast('вЬЕ мИШм†ХлРРмЦімЪФ.');
  } else {
    await savePersonalEvent({ title, date, end_date, memo, color: finalColor });
    // нЬілђіл©і customEventsмЧРлПД лПЩмЛЬ м†АмЮ•
    if(isOffDay) {
      const newEv = {id:uid(), title, date, endDate: end_date||null, tag:'мЭЉм†Х', color:'#ef4444', memo, createdAt: new Date().toISOString()};
      customEvents.push(newEv);
      save();
      // SupabaseмЧР мІБм†С insert
      await sbFetch('custom_events', 'POST', [{
        id: newEv.id, title, date, end_date: end_date||null, tag:'мЭЉм†Х', color:'#ef4444', memo, created_at: newEv.createdAt
      }]);
    }
    showToast('вЬЕ мґФк∞АлРРмЦімЪФ.');
  }
  modal?.remove();
  // мЧЕлђімЇШл¶∞лНФлПД к∞±мЛ† (нЬілђі мЧ∞лПЩ)
  if(currentView === 'calendar') renderCalendarView(document.getElementById('main-content'));
  else if(currentView === 'dashboard') renderDashboard(document.getElementById('main-content'));
  else renderPersonalView(document.getElementById('main-content'));
}

async function confirmDeletePersonalEvent(id) {
  if(!confirm('мЭі мЭЉм†ХмЭД мВ≠м†ЬнХ†кєМмЪФ?')) return;
  const ev = personalEvents.find(e => e.id === id);
  document.getElementById('personal-event-modal')?.remove();
  await deletePersonalEvent(id);

  if(ev && /^нЬілђі/.test(ev.title?.trim())) {
    const target = customEvents.find(e => /^нЬілђі/.test(e.title?.trim()) && e.date === ev.date);

      sbFetch('custom_events', 'DELETE', null, `?id=eq.${target.id}`).catch(e=>console.error(e));

}

function drawPersonalRangeBars(y, mo) {
  const gridId = 'p-cal-grid';
  document.querySelectorAll(`#${gridId} .range-bar-item`).forEach(el => el.remove());
  const rangeEvents = personalEvents.filter(e => e.end_date && e.end_date !== e.date);
  if(!rangeEvents.length) return;

  const monthStart = dateKey(new Date(y, mo, 1));
  const monthEnd = dateKey(new Date(y, mo+1, 0));

  rangeEvents.forEach(ev => {
    const color = ev.color || '#3b82f6';
    let cur = new Date(ev.date > monthStart ? ev.date : monthStart);
    const endD = new Date(ev.end_date < monthEnd ? ev.end_date : monthEnd);
    if(cur > endD) return;
    while(cur <= endD) {
      const dk = dateKey(cur);
      const cell = document.querySelector(`#${gridId} [data-dk="${dk}"]`);
      if(cell) {
        const isStart = dk === ev.date;
        const isEnd = dk === ev.end_date;
        const dow = cur.getDay();
        const isWeekStart = dow === 0;
        const isWeekEnd = dow === 6;
        const showLabel = isStart || isWeekStart;
        const capLeft = isStart || isWeekStart;
        const capRight = isEnd || isWeekEnd;
        const bar = document.createElement('div');
        bar.className = 'range-bar-item';
        bar.style.cssText = `display:block;margin-top:2px;margin-bottom:1px;margin-left:-6px;margin-right:-7px;height:16px;background:${color}33;color:${color};font-size:10px;font-weight:700;border-radius:${capLeft?'4px':'0'} ${capRight?'4px':'0'} ${capRight?'4px':'0'} ${capLeft?'4px':'0'};padding:1px 6px;overflow:hidden;white-space:nowrap;cursor:pointer;line-height:14px;position:relative;z-index:5;`;
        bar.textContent = showLabel ? ev.title : '';
        bar.title = ev.title;
        bar.onclick = e => { e.stopPropagation(); openPersonalEventModal(ev.date, ev.id); };
        const ref = cell.querySelector('.cal-event, .cal-more');
        cell.insertBefore(bar, ref);
      }
      cur.setDate(cur.getDate() + 1);
    }
  });
}

function renderPersonalCalendar() {
  const y = pCalYear, mo = pCalMonth;

let punchImages = {}; // punch_id -> [{id, image_path, thumb_path}]

async function loadPunchImages(punchId) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_images?punch_id=eq.${punchId}&order=created_at.asc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(res.ok) punchImages[punchId] = await res.json();
  return punchImages[punchId] || [];
}

async function savePunchImage(punchId, imagePath, thumbPath) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_images`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ punch_id: punchId, image_path: imagePath, thumb_path: thumbPath })
  });
  if(res.ok) {
    const rows = await res.json();
    if(!punchImages[punchId]) punchImages[punchId] = [];
    punchImages[punchId].push(rows[0]);
    return rows[0];
  }
  return null;
}

async function deletePunchImage(imageId, punchId) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/punch_images?id=eq.${imageId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(punchImages[punchId]) {
    punchImages[punchId] = punchImages[punchId].filter(img => img.id !== imageId);
  }
}

async function loadPunchItems() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_items?user_id=eq.${userId}&order=created_at.desc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }

function setAfterImagePreview(file) {

async function pasteAfterImage() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `after_${Date.now()}.png`, { type });
          setAfterImagePreview(file);
          showToast('рЯУЛ мЭілѓЄмІАл•Љ лґЩмЧђлД£мЧИмЦімЪФ');
          return;

async function uploadPunchImage(file) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const baseName = `punch_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `${baseName}.jpg`;
  const thumbPath = `thumb_${baseName}.jpg`;

  // мЫРл≥Є мЧЕл°ЬлУЬ
  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': file.type },
    body: file
  });
  if(!uploadRes.ok) throw new Error('мЭілѓЄмІА мЧЕл°ЬлУЬ мЛ§нМ®');

  // мНЄлД§мЭЉ мГЭмД± л∞П мЧЕл°ЬлУЬ
  let finalThumbPath = null;
  try {
    const thumbBlob = await resizeImageToThumb(file);
    if(thumbBlob) {
      const thumbRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
        body: thumbBlob
      });
      if(thumbRes.ok) finalThumbPath = thumbPath;
    }
  } catch(e) { console.warn('мНЄлД§мЭЉ мГЭмД± мЛ§нМ®:', e); }

  return { filePath, thumbPath: finalThumbPath };
}

async function extractLocationFromImage(file) {
  if(!geminiApiKey) return;
  showToast('рЯУН мЬДмєШ м†Хл≥і мЭЄмЛЭ м§С...');
  try {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${geminiApiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: file.type || 'image/jpeg', data: base64 } },
            { text: 'мЭі мВђмІДмЧРмДЬ мЬДмєШ м†Хл≥імЩА лґИлЯЙ лВімЪ© нЕНмК§нКЄл•Љ м∞ЊмХДм£ЉмДЄмЪФ. мЬДмєШлКФ "302лПЩ 903нШЄ", "302лПЩ 1мљФмЦі 21мЄµ", "1лПЩ 101нШЄ к±∞мЛ§" к∞ЩмЭА нШХмЛЭмЮЕлЛИлЛ§. лПЩ л≤ИнШЄ, нШЄмИШ лШРлКФ мЄµ/мљФмЦі, к≥µк∞Дл™Е(к±∞мЛ§/мХИл∞©/м£Љл∞© лУ±), лґИлЯЙлВімЪ©мЭД мґФмґЬнХШмДЄмЪФ. л∞ШлУЬмЛЬ мХДлЮШ нШХмЛЭмЭШ мИЬмИШ JSONлІМ мЭСлЛµнХШк≥† лЛ§л•Є нЕНмК§нКЄлКФ м†ИлМА нПђнХ®нХШмІА лІИмДЄмЪФ. {"building":"302лПЩ","unit":"1мљФмЦі 21мЄµ","space":null,"description":"л∞∞кіАм†Ьк±∞"} мЧЖлКФ нХ≠л™©мЭА nullл°Ь нХШмДЄмЪФ.' }
          ]
        }],
        generationConfig: { temperature: 0, maxOutputTokens: 500 }
      })
    });
    const data = await response.json();
    if(data.error) {
      if(data.error.code === 429) showToast('вЪ†пЄП Gemini мВђмЪ©лЯЙ нХЬлПД міИк≥Љ. мЮ†мЛЬ нЫД лЛ§мЛЬ мЛЬлПДнХі м£ЉмДЄмЪФ.');
      return;
    }
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
    if(!text) return;
    const stripped = text.replace(/```json|```/g, '').trim();
    const jsonMatch = stripped.match(/\{[\s\S]*?\}/);
    if(!jsonMatch) return;
    const loc = JSON.parse(jsonMatch[0]);
    if(loc.building) { const el = document.getElementById('punch-building'); if(el && !el.value) el.value = loc.building; }
    if(loc.unit) { const el = document.getElementById('punch-unit'); if(el && !el.value) el.value = loc.unit; }
    if(loc.space) { const el = document.getElementById('punch-space'); if(el && !el.value) el.value = loc.space; }
    if(loc.description) { const el = document.getElementById('punch-desc'); if(el && !el.value) el.value = loc.description; }
    if(loc.building || loc.unit || loc.description) showToast('рЯУН мЬДмєШ/лВімЪ© мЮРлПЩ мЮЕл†•лРРмЦімЪФ!');
  } catch(e) { console.warn('мЬДмєШ мЭЄмЛЭ мЛ§нМ®:', e); }
}

async function pastePunchImage() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `punch_${Date.now()}.png`, { type });
          addPunchPendingImage(file);
          extractLocationFromImage(file);

    showToast('лґЩмЧђлД£кЄ∞ кґМнХЬмЭі нХДмЪФнХімЪФ.');

async function confirmPunchItem(editId) {
  const modal = document.getElementById('punch-add-modal');
  const building = document.getElementById('punch-building')?.value.trim();
  const unit = document.getElementById('punch-unit')?.value.trim();
  const space = document.getElementById('punch-space')?.value.trim();
  const location = [building, unit, space].filter(Boolean).join(' ');
  const desc = document.getElementById('punch-desc')?.value.trim();
  const memo = document.getElementById('punch-memo')?.value.trim();
  const due = document.getElementById('punch-due')?.value || null;
  const found = document.getElementById('punch-found')?.value || todayKey();
  const contractor = document.getElementById('punch-contractor')?.value || null;
  const catBtn = modal?.querySelector('.punch-cat-btn[style*="var(--primary)"]');
  const category = catBtn?.dataset.cat || getPunchCats().slice(-1)[0] || 'кЄ∞нГА';

  if(!building) { showToast('лПЩмЭД мЮЕл†•нХім£ЉмДЄмЪФ.'); return; }

  const saveBtn = modal?.querySelector('.btn-primary');
  if(saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'м†АмЮ• м§С...'; }

  try {
    let punchId = editId;

    if(editId) {
      await updatePunchItem(editId, { building, unit, space, location, description: desc, memo, due_date: due, found_date: found, contractor, category });
      showToast('вЬЕ мИШм†ХлРРмЦімЪФ.');
    } else {
      await savePunchItem({ building, unit, space, location, description: desc, memo, due_date: due, found_date: found, contractor, category, status: 'лѓЄм°∞мєШ' });
      punchId = punchItems[0]?.id;
      showToast('вЬЕ мґФк∞АлРРмЦімЪФ.');
    }

    // лМАкЄ∞ м§СмЭЄ мЭілѓЄмІАлУ§ мЧЕл°ЬлУЬ
    const pendingFiles = pendingPunchImages.filter(Boolean);
    if(pendingFiles.length && punchId) {
      for(const item of pendingFiles) {
        const result = await uploadPunchImage(item.file);
        await savePunchImage(punchId, result.filePath, result.thumbPath);
      }
      pendingPunchImages = [];
    }

    // лМАнСЬ мНЄлД§мЭЉ мЧЕлН∞мЭінКЄ (м≤Ђ л≤ИмІЄ мЭілѓЄмІАл°Ь)
    const imgs = punchImages[punchId] || [];
    if(imgs.length > 0) {
      await updatePunchItem(punchId, { image_path: imgs[0].image_path, thumb_path: imgs[0].thumb_path });
    }

    modal?.remove();
    renderPunchView(document.getElementById('main-content'));
  } catch(e) {
    showToast('м†АмЮ• мЛ§нМ®: ' + e.message);
    if(saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'м†АмЮ•'; }
  }
}

let personalNotes = [];

let personalCatFilter = 'м†Дм≤і';
let pendingPersonalImageFile = null;
let pendingPersonalImageRemoved = false;

function getPersonalCats() {
  return appSettings.personalCategories || PERSONAL_CATS_DEFAULT;
}

async function loadPersonalNotes() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_notes?user_id=eq.${userId}&order=created_at.desc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(res.ok) personalNotes = await res.json();
  } catch(e) { console.warn('personal notes load error', e); }
}

// к∞ЬмЭЄлЕЄнКЄ мЭілѓЄмІА мЧЕл°ЬлУЬ (мЫРл≥Є + мЮСмЭА мНЄлД§мЭЉ нХ®кїШ м†АмЮ• - Free нФМлЮЬмЧРмДЬлПД лПЩмЮС)
async function uploadPersonalNoteImage(file) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const ext = file.name.split('.').pop() || 'png';
  const baseName = `pn_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `${baseName}.${ext}`;

  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': file.type },
    body: file
  });
  if(!uploadRes.ok) throw new Error('мЭілѓЄмІА мЧЕл°ЬлУЬ мЛ§нМ®');

  return filePath;
}

async function getPersonalNoteImageUrl(filePath) {
  let url = await getLibraryThumbUrl(filePath); // Pro нФМлЮЬ: мДЬл≤Д transform мґХмЖМл≥Є
  if(!url) url = await getLibraryFileUrl(filePath); // нПіл∞±: мЫРл≥Є
  return url;
}

async function savePersonalNote(note) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  const payload = { user_id: userId, title: note.title, memo: note.memo||'', category: note.category||'л©Фл™®', due_date: note.due_date||null, image_path: note.image_path||null, done: false };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_notes`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(payload)
  });
  if(res.ok) { const rows = await res.json(); personalNotes.unshift(rows[0]); }
}

async function updatePersonalNote(id, patch) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_notes?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(patch)
  });
  personalNotes = personalNotes.map(n => n.id === id ? {...n, ...patch} : n);
}

async function deletePersonalNote(id) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_notes?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  personalNotes = personalNotes.filter(n => n.id !== id);
}

async function togglePersonalDone(id) {
  const note = personalNotes.find(n => n.id === id);
  if(!note) return;
  const done = !note.done;
  await updatePersonalNote(id, { done, done_at: done ? new Date().toISOString() : null });
  renderPersonalView(document.getElementById('main-content'));
}

async function pastePersonalImage() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `paste_${Date.now()}.png`, { type });
          pendingPersonalImageFile = file;
          pendingPersonalImageRemoved = false;
          const reader = new FileReader();
          reader.onload = ev => {
            const wrap = document.getElementById('pn-image-preview-wrap');
            if(wrap) {
              wrap.innerHTML = `
                <div style="position:relative;display:inline-block">
                  <img src="${ev.target.result}" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border2);display:block">

                </div>

  if(saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'м†АмЮ• м§С...'; }

function renderPersonalCalendar() {
  const y = pCalYear, mo = pCalMonth;
  const firstDay = new Date(y, mo, 1).getDay();
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const monthNames = ['1мЫФ','2мЫФ','3мЫФ','4мЫФ','5мЫФ','6мЫФ','7мЫФ','8мЫФ','9мЫФ','10мЫФ','11мЫФ','12мЫФ'];
  const cells = [];
  for(let i=0; i<firstDay; i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(y, mo, d));

  const upcomingEvs = personalEvents
    .filter(e => e.date >= todayKey())
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, 5);

            <button onclick="pCalNav(1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">вАЇ</button>
          </div>
          <button onclick="pCalNav(0)" style="height:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 12px">мШ§лКШ</button>
        </div>
        <div class="calendar-grid" id="p-cal-grid">
          ${['мЭЉ','мЫФ','нЩФ','мИШ','л™©','кЄИ','нЖ†'].map(d=>`<div class="day-label">${d}</div>`).join('')}
          ${cells.map((date, i) => {
            if(!date) return '<div class="cal-cell" data-dk=""></div>';
            const dk = dateKey(date);
            const dayEvs = personalEvents.filter(e => e.date === dk || (e.end_date && e.date <= dk && e.end_date >= dk));
            const isToday = isSameDay(date, new Date());
            const isSun = i % 7 === 0;
            const allDayCustom = getCustomEventsForDate(dk);
            const dayPersonalEvs = personalEvents.filter(e => e.date === dk);
            const isOffDay = [...allDayCustom, ...dayPersonalEvs].some(e => /^нЬілђі/.test(e.title?.trim()));
            const isWorkSat = allDayCustom.some(e => /^кЈЉлђі/.test(e.title?.trim())) && date.getDay() === 6;
            const holiday = appSettings.showHoliday !== false ? getHoliday(y, mo, date.getDate()) : null;
            const singleEvs = dayEvs.filter(e => !e.end_date||e.end_date===e.date);
            return `<div class="cal-cell ${isToday?'today':''} ${isSun?'sunday':''} ${holiday?'holiday':''} ${isOffDay?'off-day':''} ${singleEvs.length?'has-custom':''}" data-dk="${dk}" onclick="openPersonalEventModal('${dk}')">
              <div class="cal-date" style="${isOffDay?'color:#ef4444':''}">

                ${isWorkSat?'<span style="font-size:11px;color:#0f766e;font-weight:900;margin-left:3px">кЈЉлђі</span>':''}
                ${holiday?`<span class="holiday-name" style="display:inline;margin-left:3px">${holiday}</span>`:''}

function _renderPersonalView(el) {
  if(!el) return;
  const today = todayKey();
  const thisWeekEnd = (() => {
    const d = new Date();
    const kst = new Date(d.getTime() + 9*60*60*1000);
    kst.setDate(kst.getDate() + (7 - kst.getDay()));
    return kst.toISOString().slice(0,10);
  })();
  const filtered = personalCatFilter === 'м†Дм≤і' ? personalNotes : personalNotes.filter(n => n.category === personalCatFilter);
  const undone = filtered.filter(n => !n.done);
  const done = filtered.filter(n => n.done);
  const overdue = undone.filter(n => n.due_date && n.due_date < today);
  const dueToday = undone.filter(n => n.due_date === today);
  const dueWeek = undone.filter(n => n.due_date && n.due_date > today && n.due_date <= thisWeekEnd);
  const dueFuture = undone.filter(n => n.due_date && n.due_date > thisWeekEnd);
  const noDue = undone.filter(n => !n.due_date);

  function noteCard(n) {
    const catColor = PERSONAL_CAT_COLORS[n.category] || '#6b7280';
    const isOverdue = n.due_date && n.due_date < today && !n.done;
    const dueTxt = n.due_date ? (isOverdue ? `вЪ†пЄП кЄ∞нХЬ мІАлВ®` : n.due_date) : '';
    return `
      <div style="background:var(--card);border:0.5px solid var(--border2);border-radius:14px;padding:16px;min-height:180px;display:flex;flex-direction:column;cursor:pointer;${n.done?'opacity:0.5':''}" onclick="openPersonalEditModal('${n.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:${catColor}22;color:${catColor}">${n.category}</span>
          <div style="display:flex;align-items:center;gap:6px">
            ${dueTxt?`<span style="font-size:11px;color:${isOverdue?'#ef4444':'var(--muted)'};font-weight:${isOverdue?'600':'400'}">${dueTxt}</span>`:''}
            <button onclick="event.stopPropagation();togglePersonalDone('${n.id}')" style="width:16px;height:16px;border-radius:50%;border:1.5px solid ${n.done?catColor:'var(--border2)'};background:${n.done?catColor:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;padding:0">
              ${n.done?'<svg width="8" height="6" viewBox="0 0 8 6"><polyline points="1,3 3,5 7,1" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>':''}
            </button>
            <button onclick="event.stopPropagation();if(confirm('мВ≠м†ЬнХ†кєМмЪФ?')){deletePersonalNote('${n.id}').then(()=>renderPersonalView(document.getElementById('main-content')))}" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0;line-height:1">вЬХ</button>
          </div>
        </div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;${n.done?'text-decoration:line-through':''}">${n.title}</div>
        ${n.image_path ? `<img data-path="${n.image_path}" class="lib-thumb" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;background:var(--surface);cursor:zoom-in" onclick="event.stopPropagation();openPersonalImageViewer('${n.image_path}')" onerror="if(this.dataset.loaded)this.style.display='none'">` : ''}
        ${n.memo?`<div style="font-size:12px;color:var(--muted);line-height:1.6;flex:1">${n.memo.replace(/\n/g,'<br>')}</div>`:'<div style="flex:1"></div>'}
      </div>`;
  }

  function section(label, notes, color='var(--muted)') {
    if(!notes.length) return '';
    return `
      <div style="margin-bottom:1.5rem">
        <div style="font-size:11px;font-weight:600;color:${color};margin-bottom:10px;display:flex;justify-content:space-between">
          <span>${label}</span><span>${notes.length}к±і</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
          ${notes.map(noteCard).join('')}
        </div>
      </div>`;
  }

  const isEmpty = personalNotes.length === 0;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:12px 16px;align-items:start">
      <div>
        ${renderPersonalCalendar()}
      </div>
      <div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px">
          ${['м†Дм≤і',...getPersonalCats()].map(c=>`
            <div onclick="personalCatFilter='${c}';renderPersonalView(document.getElementById('main-content'))"
              style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid ${personalCatFilter===c?'var(--primary)':'var(--border2)'};background:${personalCatFilter===c?'var(--primary)':'var(--surface)'};color:${personalCatFilter===c?'#fff':'var(--muted)'}">
              ${c}
            </div>`).join('')}
          <button class="btn-primary" onclick="openPersonalAddModal()" style="padding:4px 12px;font-size:12px;margin-left:auto">+ мґФк∞А</button>
        </div>
        ${isEmpty
          ? `<div style="text-align:center;padding:40px 0;color:var(--muted)">
              <div style="font-size:28px;margin-bottom:10px">рЯУТ</div>
              <div style="font-size:13px;font-weight:500">мХДмІБ лЕЄнКЄк∞А мЧЖмЦімЪФ</div>
            </div>`
          : `${section('кЄ∞нХЬ мІАлВ®', overdue, '#ef4444')}
             ${section('мШ§лКШ', dueToday, '#f59e0b')}
             ${section('мЭіл≤И м£Љ', dueWeek, 'var(--primary)')}
             ${section('мШИм†Х', dueFuture)}
             ${section('кЄ∞нХЬ мЧЖмЭМ', noDue)}
             ${done.length?`<div style="height:0.5px;background:var(--border2);margin:1rem 0"></div>${section('мЩДл£М', done)}`:''}`
        }
      </div>
    </div>
    <style>
      @media(max-width:700px){
        #main-content > div { grid-template-columns:1fr!important; }
      }
    </style>
  `;
  requestAnimationFrame(() => drawPersonalRangeBars(pCalYear, pCalMonth));
  loadLibraryThumbs();
}

// ===== кЄ∞м°і лПДл©і мНЄлД§мЭЉ мЭЉкіД мГЭмД± =====
async function startThumbMigration() {
  const statusEl = document.getElementById('thumb-migration-status');
  const progressWrap = document.getElementById('thumb-migration-progress-wrap');
  const bar = document.getElementById('thumb-migration-bar');
  const label = document.getElementById('thumb-migration-label');
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;

  statusEl.textContent = 'лМАмГБ лПДл©і нЩХмЭЄ м§С...';
  progressWrap.style.display = 'block';

  // thumb_path мЧЖлКФ лПДл©і м†Дм≤і м°∞нЪМ
  const res = await fetch(`${SUPABASE_URL}/rest/v1/library_docs?thumb_path=is.null&select=id,file_path,doc_type`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(!res.ok) { statusEl.textContent = 'лМАмГБ м°∞нЪМ мЛ§нМ®'; return; }
  const targets = await res.json();

  if(targets.length === 0) {
    statusEl.textContent = 'вЬЕ л™®лУ† лПДл©імЧР мЭілѓЄ мНЄлД§мЭЉмЭі мЮИмЦімЪФ.';
    progressWrap.style.display = 'none';
    return;
  }

  statusEl.textContent = `${targets.length}мЮ• м≤Шл¶ђ м§С...`;
  let done = 0, failed = 0;

  for(const doc of targets) {
    try {
      // 1. мЫРл≥Є мЭілѓЄмІА лЛ§мЪіл°ЬлУЬ
      const fileUrl = await getLibraryFileUrl(doc.file_path);
      if(!fileUrl) { failed++; continue; }
      const imgRes = await fetch(fileUrl);
      if(!imgRes.ok) { failed++; continue; }
      const blob = await imgRes.blob();
      const file = new File([blob], doc.file_path, { type: blob.type || 'image/png' });

      // 2. нБілЭЉмЭімЦЄнКЄмЧРмДЬ 240x240 л¶ђмВђмЭім¶И
      const thumbBlob = await resizeImageToThumb(file);
      if(!thumbBlob) { failed++; continue; }

      // 3. мНЄлД§мЭЉ мЧЕл°ЬлУЬ
      const thumbPath = `thumb_${doc.file_path.replace(/\.[^.]+$/, '')}.jpg`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
        body: thumbBlob
      });
      if(!uploadRes.ok) { failed++; continue; }

      // 4. DB мЧЕлН∞мЭінКЄ
      await fetch(`${SUPABASE_URL}/rest/v1/library_docs?id=eq.${doc.id}`, {
        method: 'PATCH',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ thumb_path: thumbPath })
      });

      done++;
    } catch(e) {
      console.warn('мНЄлД§мЭЉ лІИмЭікЈЄл†ИмЭімЕШ мЛ§нМ®:', doc.file_path, e);
      failed++;
    }

    const progress = Math.round(((done + failed) / targets.length) * 100);
    bar.style.width = progress + '%';
    label.textContent = `${done + failed} / ${targets.length} м≤Шл¶ђлР® (мД±к≥µ ${done}, мЛ§нМ® ${failed})`;
  }

  statusEl.textContent = `вЬЕ мЩДл£М! мД±к≥µ ${done}мЮ•, мЛ§нМ® ${failed}мЮ•`;
  if(failed > 0) statusEl.textContent += ' (мЛ§нМ®нХЬ лПДл©імЭА мЫРл≥ЄмЬЉл°Ь нСЬмЛЬлПЉмЪФ)';

  // мЇРмЛЬ міИкЄ∞нЩФнХімДЬ мГИ мНЄлД§мЭЉмЭі л∞Фл°Ь л∞ШмШБлРШлПДл°Э
  libThumbUrlCache = {};
  localStorage.removeItem(LIB_THUMB_CACHE_KEY);
}

async function uploadGalleryPhoto(folderId, file, title='') {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const resized = await resizeImage(file, 1920);
  const baseName = `gallery_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `gallery/${baseName}.jpg`;
  const thumbPath = `gallery/thumb_${baseName}.jpg`;

  await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
    body: resized
  });

  const thumbBlob = await resizeImageToThumb(file);
  if(thumbBlob) {
    await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
      body: thumbBlob
    });
  }

  await sbFetch('gallery_photos', 'POST', [{ folder_id: folderId, file_path: filePath, thumb_path: thumbBlob ? thumbPath : null, memo: '', title: title||'' }]);
  await loadGalleryPhotos(folderId);
  renderGalleryView(document.getElementById('main-content'));
}

async function resizeImage(file, maxSize) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxSize || h > maxSize) {
        if(w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/jpeg', 0.85);
    };
    img.src = url;
  });
}

}

function searchGalleryPhotos(query) {
  const resultsEl = document.getElementById('gallery-search-results');
  if(!resultsEl) return;
  if(!query.trim()) { resultsEl.style.display = 'none'; resultsEl.innerHTML = ''; return; }
  // м†Дм≤і нПілНФ мВђмІДмЧРмДЬ к≤АмГЙ
  const q = query.toLowerCase();
  const results = [];
  Object.entries(galleryPhotos).forEach(([folderId, photos]) => {
    const folder = galleryFolders.find(f => f.id === folderId);
    photos.filter(p => (p.title||'').toLowerCase().includes(q)).forEach(p => {
      results.push({...p, folderName: folder?.name || 'лѓЄлґДл•Ш'});
    });
  });

  if(results.length === 0) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:12px 0">к≤АмГЙ к≤∞к≥Љк∞А мЧЖмЦімЪФ.</div>`;
    return;
  }

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${results.length}мЮ• к≤АмГЙлР®</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">
      ${results.map(p => `
        <div style="position:relative;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--surface)" onclick="openGalleryPhotoViewer('${p.file_path}')">
          <div style="aspect-ratio:1">
            <img data-path="${p.thumb_path||p.file_path}" class="lib-thumb" style="width:100%;height:100%;object-fit:cover">
          </div>
          <div style="padding:4px 6px;background:var(--card)">
            ${p.title ? `<div style="font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.title}</div>` : ''}
            <div style="font-size:10px;color:var(--muted)">${p.folderName}</div>
          </div>
        </div>
      `).join('')}
    </div>`;

  // lazy load
  setTimeout(() => {
    resultsEl.querySelectorAll('img.lib-thumb[data-path]').forEach(img => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(async e => {
          if(e.isIntersecting) {
            observer.disconnect();
            const path = img.dataset.path;
            const cacheKey = 'hj_thumb_cache_v1_' + path;
            const cached = localStorage.getItem(cacheKey);
            if(cached) { img.src = cached; return; }
            const url = await getLibraryFileUrl(path);
            if(url) { img.src = url; localStorage.setItem(cacheKey, url); }
          }
        });
      });
      observer.observe(img);
    });
  }, 50);
}

function initGalleryFolderDrag() {
  const grid = document.getElementById('gallery-folder-grid');
  if(!grid) return;
  let dragSrc = null;
  grid.querySelectorAll('.gallery-folder-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => item.style.opacity = '0.4', 0);
    });
    item.addEventListener('dragend', () => { item.style.opacity = '1'; });
    item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    item.addEventListener('drop', async e => {
      e.preventDefault();
      e.stopPropagation();
      if(dragSrc === item) return;
      const items = [...grid.querySelectorAll('.gallery-folder-item')];
      const srcIdx = items.indexOf(dragSrc);
      const tgtIdx = items.indexOf(item);
      if(srcIdx < tgtIdx) item.after(dragSrc); else item.before(dragSrc);
      // мИЬмДЬ м†АмЮ•
      const newOrder = [...grid.querySelectorAll('.gallery-folder-item')].map((el,i) => ({id: el.dataset.id, sort_order: i}));
      galleryFolders = newOrder.map(o => galleryFolders.find(f => f.id === o.id)).filter(Boolean);
      await Promise.all(newOrder.map(o => sbFetch('gallery_folders', 'PATCH', {sort_order: o.sort_order}, `?id=eq.${o.id}`)));
    });
  });
}

function _renderGalleryFolderDetail(el, folderId) {

  el.innerHTML = `

        <button onclick="currentGalleryFolder=null;renderGalleryView(document.getElementById('main-content'))" style="background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text)">вЖР л™©л°Э</button>
        <span style="font-size:15px;font-weight:700;color:var(--text)">рЯЧВпЄП ${folder?.name||''}</span>
      </div>

      ${photos.length === 0 ? `<div style="text-align:center;color:var(--muted);padding:60px 0;font-size:14px">мВђмІДмЭі мЧЖмЦімЪФ.</div>` : `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">
        ${photos.map(p => `
          <div style="position:relative;border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--border)">
            <div style="aspect-ratio:1;cursor:pointer" onclick="openGalleryPhotoViewer('${p.file_path}')">
              <img data-path="${p.thumb_path||p.file_path}" class="lib-thumb" style="width:100%;height:100%;object-fit:cover">
            </div>
            <div style="padding:4px 8px 4px 8px;display:flex;align-items:center;gap:4px;min-height:26px">
              <span style="flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.title||''}</span>
              <button onclick="event.stopPropagation();openGalleryPhotoMenu('${p.id}','${folderId}',this)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;flex-shrink:0">вЛЃ</button>
            </div>
          </div>
        `).join('')}
      </div>`}
    </div>`;
  // lazy load мНЄлД§мЭЉ
  setTimeout(() => {
    el.querySelectorAll('img.lib-thumb[data-path]').forEach(img => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(async e => {
          if(e.isIntersecting) {
            observer.disconnect();
            const path = img.dataset.path;
            const cacheKey = 'hj_thumb_cache_v1_' + path;
            const cachedRaw = localStorage.getItem(cacheKey);
            const isGallery = path.startsWith('gallery/');
            const ttl = isGallery ? 50*60*1000 : 7*24*60*60*1000; // к∞§лЯђл¶ђ:50лґД, лВШл®ЄмІА:7мЭЉ
            if(cachedRaw) {
              try {
                const {url: cachedUrl, ts} = JSON.parse(cachedRaw);
                if(Date.now() - ts < ttl) { img.src = cachedUrl; return; }
              } catch(e) { img.src = cachedRaw; return; } // кµђнШХ мЇРмЛЬ нПђлІЈ
            }
            const url = await getLibraryFileUrl(path);
            if(url) {
              img.src = url;
              localStorage.setItem(cacheKey, JSON.stringify({url, ts: Date.now()}));
            }
          }
        });
      });
      observer.observe(img);
    });
  }, 50);
}

function openGalleryPhotoViewer(filePath) {
  const existing = document.getElementById('gallery-viewer');
  if(existing) existing.remove();

  let scale = 1, rotate = 0, currentUrl = '';

  const modal = document.createElement('div');
  modal.id = 'gallery-viewer';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.4)">
      <button onclick="document.getElementById('gallery-viewer').remove()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer">вЬХ лЛЂкЄ∞</button>
      <div style="display:flex;gap:8px">
        <button onclick="gvRotate(-90)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="мЩЉм™љ нЪМм†Д">вЖЇ</button>
        <button onclick="gvRotate(90)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="мШ§л•Єм™љ нЪМм†Д">вЖї</button>
        <button onclick="gvZoom(-0.25)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="мґХмЖМ">пЉН</button>
        <button onclick="gvZoom(0.25)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="нЩХлМА">пЉЛ</button>
        <button onclick="gvShare()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer" title="к≥µмЬ†">к≥µмЬ†</button>
      </div>
    </div>
    <div style="overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding-top:56px">
      <img id="gallery-viewer-img" style="max-width:90vw;max-height:85vh;object-fit:contain;transition:transform .2s;transform-origin:center center;border-radius:4px">
    </div>`;

  document.body.appendChild(modal);

  // л∞∞к≤љ нБіл¶≠ лЛЂкЄ∞
  modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });

  function applyTransform() {
    const img = document.getElementById('gallery-viewer-img');
    if(img) img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
  }

  window.gvRotate = (deg) => { rotate = (rotate + deg + 360) % 360; applyTransform(); };
  window.gvZoom = (delta) => { scale = Math.max(0.25, Math.min(5, scale + delta)); applyTransform(); };
  window.gvShare = async () => {
    const img = document.getElementById('gallery-viewer-img');
    if(!img?.src) return;
    try {
      const res = await fetch(img.src);
      const blob = await res.blob();
      const file = new File([blob], 'photo.jpg', { type: blob.type });
      if(navigator.share && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'нШДмЮ• мВђмІД' });
      } else {
        // к≥µмЬ† лґИк∞А мЛЬ лЛ§мЪіл°ЬлУЬ
        const a = document.createElement('a');
        a.href = img.src;
        a.download = `photo_${Date.now()}.jpg`;
        a.click();
      }
    } catch(e) { showToast('к≥µмЬ†мЧР мЛ§нМ®нЦИмЦімЪФ.'); }
  };

  // нХАмєШ м§М мІАмЫР
  let lastDist = 0;
  modal.addEventListener('touchstart', e => {
    if(e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  });
  modal.addEventListener('touchmove', e => {
    if(e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if(lastDist > 0) { scale = Math.max(0.25, Math.min(5, scale * (dist / lastDist))); applyTransform(); }
      lastDist = dist;
    }
  });

  getLibraryFileUrl(filePath).then(url => {
    if(url) {
      currentUrl = url;
      const img = document.getElementById('gallery-viewer-img');
      if(img) img.src = url;
    }
  });
}

function initMenuOrderList() {
  const menuDefs = {
    dashboard: {icon:'рЯУК', label:'лМАмЛЬл≥ілУЬ'},
    calendar: {icon:'рЯУЕ', label:'мЇШл¶∞лНФ'},
    weekly: {icon:'рЯУЛ', label:'м£Љк∞ДмЧЕлђімЭЉмІА'},
    library: {icon:'рЯУК', label:'к≥µм†ХнСЬ кіАл¶ђ'},
    drawing: {icon:'рЯУР', label:'лПДл©і кіАл¶ђ'},
    construction: {icon:'рЯПЧпЄП', label:'мЛЬк≥µ кіАл¶ђ'},
    inspection: {icon:'рЯУЛ', label:'к≤АмЄ°мЪФм≤≠мДЬ'},
    punch: {icon:'рЯУМ', label:'нОАмєШл¶ђмК§нКЄ'},
    todo: {icon:'вЬЕ', label:'нХ†мЭЉ'},
    personal: {icon:'рЯУТ', label:'к∞ЬмЭЄлЕЄнКЄ'},
    settings: {icon:'вЪЩпЄП', label:'мД§м†Х'},
  };
  const defaultOrder = ['dashboard','calendar','weekly','library','drawing','construction','inspection','punch','todo','personal','gallery','settings'];
  let order = (appSettings.menuOrder && appSettings.menuOrder.length === defaultOrder.length)
    ? [...appSettings.menuOrder]
    : [...defaultOrder];

  const list = document.getElementById('menu-order-list');
  if(!list) return;

  function render() {
    list.innerHTML = order.map(key => {
      const m = menuDefs[key];
      if(!m) return '';
      return `<div class="menu-order-item" data-key="${key}" style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:8px">
        <span style="font-size:16px;color:var(--soft);cursor:grab">в†њ</span>
        <span style="font-size:14px">${m.icon}</span>
        <span style="font-size:13px;font-weight:600;color:var(--text)">${m.label}</span>
      </div>`;
    }).join('');
    attachDrag();
  }

  function attachDrag() {
    let dragging = null;
    list.querySelectorAll('.menu-order-item').forEach(el => {
      el.draggable = true;
      el.addEventListener('dragstart', () => {
        dragging = el;
        setTimeout(() => el.style.opacity = '0.4', 0);
      });
      el.addEventListener('dragend', async () => {
        el.style.opacity = '';
        dragging = null;
        order = [...list.querySelectorAll('.menu-order-item')].map(d => d.getAttribute('data-key'));
        appSettings.menuOrder = order;
        await saveSettingsToSupabase();
        renderSidebar();
        showToast('вЬЕ л©ФлЙі мИЬмДЬк∞А м†АмЮ•лРРмЦімЪФ');
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        if(dragging && dragging !== el) {
          const rect = el.getBoundingClientRect();
          const mid = rect.top + rect.height/2;
          if(e.clientY < mid) list.insertBefore(dragging, el);
          else list.insertBefore(dragging, el.nextSibling);
        }
      });
    });
  }

  render();
}

function getUpcomingCustomEvents() {
  const today = todayKey();
  const limit = addDaysKey(appSettings.upcomingDays||7);
  return customEvents
    .filter(e=>{
      const start = e.date;
      const end = e.endDate || e.date;
      return end >= today && (appSettings.upcomingDays===999 || start <= limit);
    })
    .map(e=>({...e, isCustom:true}))
    .sort((a,b)=>a.date.localeCompare(b.date));
}

// нКєм†Х лВ†мІЬмЧР к±Єл¶ђлКФ customEvents л∞ШнЩШ (кЄ∞к∞Д мЭЉм†Х нПђнХ®)
function getCustomEventsForDate(dk) {
  return customEvents.filter(e => {
    const start = e.date;
    const end = e.endDate || e.date;
    return dk >= start && dk <= end;
  });
}

// лВ†мІЬ нБіл¶≠ вЖТ мЭЉм†Х мЮИмЬЉл©і л™©л°Э, мЧЖмЬЉл©і мґФк∞А л™®лЛђ
function handleDayClick(dateStr) {
  const dayMsgs = messages.filter(m=>(m.eventDate||m.messageDate)===dateStr&&normalizeTag(m.tag)==='мЭЉм†Х');
  const dayCustom = getCustomEventsForDate(dateStr);
  if(dayMsgs.length===0 && dayCustom.length===0) {
    openEventModal(dateStr);
    return;
  }
  // мЭЉм†Х л™©л°Э л™®лЛђ
  const d = new Date(dateStr);
  const days=['мЭЉ','мЫФ','нЩФ','мИШ','л™©','кЄИ','нЖ†'];
  const dateLabel = `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
  document.getElementById('day-modal-title').textContent = `рЯУЕ ${dateLabel} мЭЉм†Х`;
  let html = '';
  // л©ФмЛЬмІА мЭЉм†Х + мІБм†С мґФк∞А мЭЉм†Х нХ©м≥РмДЬ мИЬмДЬ кіАл¶ђ
  const allItems = [
    ...dayMsgs.map(m=>({type:'msg', id:m.id, tag:normalizeTag(m.tag), title:m.summary, sub:m.roomName+(m.sender?' ¬Ј '+m.sender:''), data:m})),
    ...dayCustom.map(e=>({type:'custom', id:e.id, tag:normalizeTag(e.tag||'мЭЉм†Х'), title:e.title, sub:e.memo||'', color:e.color||'none', data:e}))
  ];

  // м†АмЮ•лРЬ мИЬмДЬ м†БмЪ©
  const orderKey = 'hj3_order_'+dateStr;
  const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(savedOrder.length) {
    allItems.sort((a,b)=>{
      const ai = savedOrder.indexOf(a.id);
      const bi = savedOrder.indexOf(b.id);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  }

  allItems.forEach((item,i)=>{
    const tag = item.tag;
    html+=`<div class="day-drag-item" draggable="true" data-idx="${i}"
      ondragstart="onDayDragStart(event,${i})"
      ondragover="onDayDragOver(event,${i},'${dateStr}')"
      ondrop="onDayDrop(event,${i},'${dateStr}')"
      ondragend="onDayDragEnd(event,'${dateStr}')"
      style="margin-bottom:8px;border:1px solid var(--border);border-left:3px solid ${/^нЬілђі/.test((item.title||'').trim())?'#ef4444':(item.title||'').includes('нГАмД§')?'#f5c518':item.type==='custom'&&item.color&&item.color!=='none'?item.color:item.type==='custom'?'#3b82f6':'#7c3aed'};border-radius:8px;padding:12px;background:${/^нЬілђі/.test((item.title||'').trim())?'#fff0f0':(item.title||'').includes('нГАмД§')?'#fffbe6':item.type==='custom'&&item.color&&item.color!=='none'?item.color+'11':'var(--surface)'};display:flex;align-items:flex-start;gap:8px;cursor:grab;transition:opacity 0.15s">
      <span style="font-size:14px;color:var(--soft);margin-top:2px">в†њ</span>
      <div style="flex:1;cursor:pointer" onclick="closeDayModal();${item.type==='custom'?`openEditEventModal('${item.id}')`:`openEditMsgEvent('${item.id}')`}">
        <span class="badge ${badgeClass(tag)}">${tagIcon(tag)} ${tag} вЬПпЄП</span>
        <div class="item-title" style="font-size:13px;margin-top:4px">${item.title}</div>
        ${item.sub?`<div class="meta">${item.sub}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('day-modal-list').innerHTML = html;
  document.getElementById('day-modal-date').value = dateStr;
  document.getElementById('day-modal').style.display = 'flex';
}

let dragEventId = null;
let dragFromIdx = null;

function onDayDragStart(e, idx) {
  dragFromIdx = idx;
  e.target.style.opacity = '0.4';
}

function onDayDragOver(e, idx, dateStr) {
  e.preventDefault();
  if(dragFromIdx === null || dragFromIdx === idx) return;
  // мЛЬк∞Бм†Б нФЉлУЬл∞±
  document.querySelectorAll('.day-drag-item').forEach((el,i)=>{
    el.style.borderTop = i===idx ? '2px solid #3b82f6' : '';
  });
}

function onDayDragEnd(e, dateStr) {
  e.target.style.opacity = '1';
  document.querySelectorAll('.day-drag-item').forEach(el=>{
    el.style.borderTop = '';
    el.style.opacity = '1';
  });
  // dropмЭі м≤Шл¶ђлР®
}

function onDayDrop(e, toIdx, dateStr) {
  e.preventDefault();
  if(dragFromIdx===null || dragFromIdx===toIdx) { dragFromIdx=null; return; }

  // нХілЛє лВ†мІЬ л™®лУ† мХДмЭінЕЬ мИШмІС
  const dayMsgs = messages.filter(m=>(m.eventDate||m.messageDate)===dateStr&&normalizeTag(m.tag)==='мЭЉм†Х');
  const dayCustom = customEvents.filter(ev=>ev.date===dateStr);
  let allIds = [
    ...dayMsgs.map(m=>m.id),
    ...dayCustom.map(ev=>ev.id)
  ];

  // м†АмЮ•лРЬ мИЬмДЬ мЮИмЬЉл©і м†БмЪ©
  const orderKey = 'hj3_order_'+dateStr;
  const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(savedOrder.length) {
    allIds.sort((a,b)=>{
      const ai=savedOrder.indexOf(a); const bi=savedOrder.indexOf(b);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  }

  // мИЬмДЬ л≥Ак≤љ
  const moved = allIds.splice(dragFromIdx,1)[0];
  allIds.splice(toIdx,0,moved);
  dragFromIdx = null;

  // localStorageмЧР м†АмЮ•
  localStorage.setItem(orderKey, JSON.stringify(allIds));

  // customEvents л∞∞мЧі мИЬмДЬлПД л∞ШмШБ
  const customOrder = allIds.filter(id => customEvents.find(e=>e.id===id));
  customEvents.sort((a,b)=>{
    const ai = customOrder.indexOf(a.id);
    const bi = customOrder.indexOf(b.id);
    if(ai===-1&&bi===-1) return 0;
    if(ai===-1) return 1;
    if(bi===-1) return -1;
    return ai-bi;
  });

  save(); saveCustomEventsToSupabase();
  handleDayClick(dateStr);
  // мЇШл¶∞лНФ мЕАлПД м¶ЙмЛЬ к∞±мЛ†
  const el = document.getElementById('main-content');
  if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='dashboard') renderDashboard(el);
}

  const key = color === 'none' ? 'color-none' : 'color-'+color.replace('#','');
  document.querySelectorAll('#event-color-picker > div').forEach(el => {
    el.style.border = el.id === key ? '3px solid #1a2332' : '3px solid transparent';

}

function openEditEventModal(id) {
  const ev = customEvents.find(e=>e.id===id);

  editingEventId = id;
  document.getElementById('event-modal-title').textContent = 'рЯУЕ мЭЉм†Х мИШм†Х';
  document.getElementById('event-title-input').value = ev.title;
  document.getElementById('event-tag-input').value = ev.tag || 'мЭЉм†Х';
  document.getElementById('event-memo-input').value = ev.memo || '';
  document.getElementById('event-delete-btn').style.display = 'block';
  if(ev.endDate && ev.endDate !== ev.date) {
    document.getElementById('event-type-range').checked = true;

function saveCustomEvent() {
  const title = document.getElementById('event-title-input').value.trim();
  const tag = document.getElementById('event-tag-input').value;
  const color = document.getElementById('event-color-input').value || '#3b82f6';
  const memo = document.getElementById('event-memo-input').value.trim();
  const isRange = document.getElementById('event-type-range').checked;
  const date = isRange ? document.getElementById('event-start-input').value : document.getElementById('event-date-input').value;
  const endDate = isRange ? document.getElementById('event-end-input').value : null;
  if(!title) { showToast('м†Ьл™©мЭД мЮЕл†•нХім£ЉмДЄмЪФ'); return; }
  if(!date) { showToast('лВ†мІЬл•Љ мД†нГЭнХім£ЉмДЄмЪФ'); return; }
  if(isRange && endDate && endDate < date) { showToast('мҐЕл£МмЭЉмЭі мЛЬмЮСмЭЉл≥ілЛ§ лє†л•Љ мИШ мЧЖмЦімЪФ'); return; }
  if(editingEventId) {
    customEvents = customEvents.map(e=>e.id===editingEventId?{...e,title,date,endDate:endDate||null,tag,color,memo}:e);
    showToast('вЬЕ мЭЉм†ХмЭі мИШм†ХлРРмЦімЪФ!');

    customEvents.push({id:uid(),title,date,endDate:endDate||null,tag,color,memo,createdAt:new Date().toISOString()});

  }
  save(); saveCustomEventsToSupabase();
  closeEventModal();
  const el = document.getElementById('main-content');
  if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='dashboard') renderDashboard(el);
}

const ALLOWED_EMAIL = 'nacbong@gmail.com';

// вЬЕ мИШм†ХлРЬ нХ®мИШ - мІБм†С URL л¶ђлФФл†ЙнКЄ
function loginWithGoogle() {
  const redirectTo = window.location.origin + window.location.pathname;
  window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
}

async function checkAuth() {
  // URL нХімЛЬмЧРмДЬ access_token нЩХмЭЄ (OAuth мљЬл∞±)
  const hash = window.location.hash;
  if(hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if(accessToken) {
      localStorage.setItem('hj_token', accessToken);
      if(refreshToken) localStorage.setItem('hj_refresh_token', refreshToken);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }

  const token = localStorage.getItem('hj_token');
  if(!token) return false;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    if(!res.ok) {
      // нЖ†нБ∞ лІМл£М вЖТ мЮРлПЩк∞±мЛ† мЛЬлПД
      const refreshed = await refreshToken();
      if(!refreshed) { localStorage.removeItem('hj_token'); return false; }
      return await checkAuth();
    }
    const user = await res.json();
    if(user.email === ALLOWED_EMAIL) {
      window._currentUserEmail = user.email;
      window._currentUserName = user.user_metadata?.full_name || user.email;
      // 45лґДлІИлЛ§ мЮРлПЩк∞±мЛ†
      setTimeout(autoRefreshToken, 45 * 60 * 1000);
      return true;
    } else {
      alert(`м†СкЈЉ кґМнХЬмЭі мЧЖмКµлЛИлЛ§.\n(${user.email})`);
      localStorage.removeItem('hj_token');
      localStorage.removeItem('hj_refresh_token');
      return false;
    }
  } catch(e) { return false; }
}

async function refreshToken() {
  const refresh = localStorage.getItem('hj_refresh_token');
  if(!refresh) return false;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refresh })
    });
    if(!res.ok) return false;
    const data = await res.json();
    if(data.access_token) {
      localStorage.setItem('hj_token', data.access_token);
      if(data.refresh_token) localStorage.setItem('hj_refresh_token', data.refresh_token);
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function autoRefreshToken() {
  const ok = await refreshToken();
  if(ok) {
    // к∞±мЛ† мД±к≥µ вЖТ 45лґД нЫД лЛ§мЛЬ к∞±мЛ†
    setTimeout(autoRefreshToken, 45 * 60 * 1000);
    console.log('вЬЕ нЖ†нБ∞ мЮРлПЩк∞±мЛ† мЩДл£М');
  }
}
