<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>현장톡</title>
<meta name="description" content="건설현장 카카오톡 메시지 관리">
<meta name="theme-color" content="#1a2332">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="현장톡">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f2ee;--surface:#faf9f7;--card:#ffffff;--primary:#1a2332;--primary2:#263448;--accent:#b8732e;
  --border:#e8e4de;--border2:#ddd8d0;--text:#1a2332;--muted:#64748b;--soft:#94a3b8;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 8px 32px rgba(0,0,0,.1);
  --radius:12px;--radius2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* 레이아웃 */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:252px;background:linear-gradient(180deg,#1a2332 0%,#1e2a3d 100%);color:#fff;display:flex;flex-direction:column;flex-shrink:0;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* 사이드바 */
.logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;transition:opacity 0.15s}
.logo:hover{opacity:0.85}
.logo-title{font-size:19px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.nav{flex:1;overflow:auto;padding:14px 10px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-section{margin-bottom:16px}
.nav-label{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1.2px;padding:8px 8px 5px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase}
.nav-collapsible{cursor:pointer;user-select:none;border-radius:6px;transition:background 0.15s}
.nav-collapsible:hover{background:rgba(255,255,255,.06)}
.nav-label small{font-size:10px;color:rgba(255,255,255,.25);font-weight:600;letter-spacing:0;text-transform:none}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;margin-bottom:2px;transition:all 0.15s}
.nav-item:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1)}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.count{margin-left:auto;background:rgba(255,255,255,.15);padding:2px 7px;border-radius:10px;font-size:10px;color:rgba(255,255,255,.9);font-weight:700}
.room-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:13px}
.room-star-btn{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;padding:2px;transition:color 0.15s;flex-shrink:0}
.room-star-btn:hover{color:rgba(255,255,255,.7)}
.room-star-btn.on{color:#f6c453}
.room-actions{display:flex;gap:3px;margin-left:2px}
.room-action-btn{width:22px;height:22px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border-radius:6px;font-size:10px;cursor:pointer;transition:all 0.15s}
.room-action-btn:hover{background:rgba(255,255,255,.15)}
.room-action-btn.wide{width:36px}
.room-archived{opacity:.4}
.room-tools{display:flex;gap:6px;padding:0 10px 10px}
.room-tool-btn{flex:1;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);border-radius:8px;padding:7px 4px;font-size:11px;cursor:pointer;transition:all 0.15s}
.room-tool-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.room-add{margin:0 10px 12px;padding:9px;border:1px dashed rgba(255,255,255,.2);border-radius:9px;color:rgba(255,255,255,.55);background:none;font-size:12px;cursor:pointer;width:calc(100% - 20px);transition:all 0.15s}
.room-add:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.85)}
.side-stat{border-top:1px solid rgba(255,255,255,.08);padding:12px 18px 16px}
.side-stat-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px}
.side-stat-row span:first-child{color:rgba(255,255,255,.4)}
.side-stat-row strong{color:rgba(255,255,255,.85);font-weight:700}

/* 헤더 */
.header{min-height:64px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;flex-wrap:wrap;gap:8px;box-shadow:0 1px 0 var(--border)}
.header-title{font-size:18px;font-weight:900;letter-spacing:-.4px}
.header-sub{font-size:12px;color:var(--soft);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-primary{border:none;background:var(--primary);color:#fff;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn-primary:hover{background:var(--primary2);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.2)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{border:1px solid var(--border2);background:#fff;color:var(--muted);border-radius:9px;padding:9px 13px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:7px 13px;border:1px solid var(--border2);border-radius:8px;background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-sm:hover{border-color:var(--primary);color:var(--primary);background:var(--bg)}

/* 컨텐츠 */
.content{flex:1;overflow:auto;padding:22px 24px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.ai-fixed-input{position:fixed;left:252px;right:0;bottom:0;z-index:80;padding:14px 24px;background:linear-gradient(to top,var(--bg) 60%,rgba(244,242,238,0));pointer-events:none}
.ai-fixed-input>div{pointer-events:auto}
@media(max-width:768px){.ai-fixed-input{left:0;padding:10px 14px}}
.header-btn-narrow{display:none}
body.is-mobile-device .header-btn-wide{display:none}
body.is-mobile-device .header-btn-narrow{display:inline-flex}
body.is-mobile-device .dash-ai-bar{display:none!important}

/* 대시보드 */
.dashboard-layout{display:grid;grid-template-columns:minmax(0,1.1fr) 440px;gap:20px;align-items:start}
.dashboard-left{min-width:0}
.dashboard-right{position:sticky;top:0}
.dashboard-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;grid-auto-flow:row}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
.summary-card:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
.summary-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.summary-card.missed::before{background:linear-gradient(180deg,#ef4444,#dc2626)}
.summary-card.calendar::before{background:linear-gradient(180deg,#f59e0b,var(--accent))}
.summary-card.todo::before{background:linear-gradient(180deg,#10b981,#0f766e)}
.summary-card.notice::before{background:linear-gradient(180deg,#3b82f6,#1d4ed8)}
.summary-card-icon{font-size:22px;margin-bottom:8px}
.card-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;letter-spacing:.3px}
.card-num{font-size:34px;line-height:1;font-weight:900;letter-spacing:-1px}
.card-hint{font-size:11px;color:var(--soft);margin-top:8px}
.summary-card.missed .card-num{color:#dc2626}
.summary-card.todo .card-num{color:#0f766e}
.summary-card.notice .card-num{color:#1d4ed8}
.summary-card.calendar .card-num{color:var(--accent)}
.dashboard-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-title{font-size:13px;font-weight:900;letter-spacing:-.2px}
.panel-link{font-size:12px;color:var(--accent);font-weight:700;border:none;background:none;cursor:pointer;transition:opacity 0.15s}
.panel-link:hover{opacity:.75}

/* 아이템 */
.item{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius2);padding:12px;margin-bottom:8px;transition:all 0.15s}
.item:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.todo-click{cursor:pointer}
.todo-click.done{opacity:.5}
.item-title{font-size:13px;font-weight:700;line-height:1.5;margin-top:5px;color:var(--text)}
.meta{font-size:11px;color:var(--soft);margin-top:6px;display:flex;gap:6px;align-items:center}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--border2)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px;margin-bottom:4px;letter-spacing:.1px}
.b-blue{background:#dbeafe;color:#1e40af}.b-green{background:#dcfce7;color:#15803d}
.b-orange{background:#ffedd5;color:#c2410c}.b-yellow{background:#fef9c3;color:#854d0e}
.b-pink{background:#fce7f3;color:#9d174d}.b-purple{background:#ede9fe;color:#6d28d9}
.b-gray{background:#f1f5f9;color:#475569}.b-red{background:#fee2e2;color:#b91c1c}
.b-teal{background:#ccfbf1;color:#0f766e}
.empty-box{padding:28px 16px;text-align:center;color:var(--soft);font-size:13px;background:var(--bg);border-radius:var(--radius2);border:1px dashed var(--border2)}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.empty-text{font-weight:500}

/* 검색/필터 */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:12px;font-weight:600;border:1px solid var(--border2);background:var(--card);border-radius:20px;padding:6px 13px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 6px rgba(26,35,50,.3)}
.category-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.category{border-radius:var(--radius);padding:14px 8px;border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow);cursor:pointer;text-align:center;transition:all 0.2s}
.category:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow2)}
.category-icon{font-size:22px;margin-bottom:8px}
.category-num{font-size:22px;font-weight:900;letter-spacing:-1px}
.category-name{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px}
.search-wrap{margin-bottom:14px;position:relative}
.search-input{width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:14px;background:var(--card);color:var(--text);box-shadow:var(--shadow);transition:all 0.15s}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,35,50,.08)}

/* 캘린더 */
.calendar-card{padding:0;overflow:hidden;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.calendar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.calendar-title{font-size:14px;font-weight:900}
.calendar-nav{display:flex;gap:6px}
.calendar-nav button{height:30px;min-width:30px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:13px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px;transition:all 0.15s}
.calendar-nav button:hover{border-color:var(--primary);color:var(--primary)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)}
.day-label{padding:8px 4px;text-align:center;font-size:10px;font-weight:800;color:var(--soft);background:var(--bg);border-right:1px solid var(--border);border-bottom:1px solid var(--border);letter-spacing:.5px}
.day-label:first-child{color:#ef4444}
.cal-cell{min-height:140px;padding:4px 6px;overflow:hidden;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.mini-cal-cell{height:116px!important;min-height:116px!important;max-height:116px!important;padding:6px;border-right:1px solid var(--border);border-top:1px solid var(--border);background:var(--card);cursor:pointer;transition:background 0.1s;overflow:hidden}
.cal-cell:hover{background:var(--bg)}
.cal-cell:nth-child(7n){border-right:none}
.cal-date{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;min-height:24px;display:flex;align-items:center;gap:2px;white-space:nowrap}
.cal-cell.today .cal-date span:first-child{background:var(--primary);color:#fff;font-weight:900;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.sunday{background:#fff8f8}
.cal-cell.sunday .cal-date{color:#ef4444}
.cal-cell.holiday{background:#fff8f8}
.cal-cell.holiday .cal-date{color:#ef4444}
.holiday-name{font-size:9px;color:#ef4444;font-weight:700;margin-bottom:2px;line-height:1.2}
.cal-event{display:block;font-size:10px;font-weight:700;line-height:1.5;padding:2px 6px;border-radius:4px;margin:0 -6px 2px -6px;white-space:nowrap;overflow:hidden;text-overflow:clip;cursor:pointer;position:relative;border:none;box-shadow:none}
.cal-event:hover::after{content:attr(title);position:absolute;left:0;top:100%;background:#1a2332;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;white-space:normal;width:160px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.2);line-height:1.4;font-weight:600}
.ev-purple{background:#ede9fe;color:#6d28d9}.ev-green{background:#dcfce7;color:#15803d}.ev-tasel{background:#fff3b0!important;color:#7a6000!important}.ev-range-start{border-radius:6px 0 0 6px!important;margin-right:-6px;padding-right:8px}.ev-range-mid{border-radius:0!important;margin-left:-6px;margin-right:-6px;padding-left:8px;padding-right:8px}.ev-range-end{border-radius:0 6px 6px 0!important;margin-left:-6px;padding-left:8px}.cal-more{font-size:9px;color:var(--muted);font-weight:700;padding:0 3px;cursor:pointer;display:inline-block;width:fit-content;line-height:1.3;background:var(--surface);border-radius:3px;margin-top:-2px}
.ev-blue{background:#dbeafe;color:#1e40af}.ev-yellow{background:#fef9c3;color:#854d0e}
.ev-red{background:#fee2e2;color:#b91c1c}.ev-gray{background:#f1f5f9;color:#475569}
.cal-search-match{outline:2px solid #f59e0b!important;outline-offset:-2px;background:#fef9c3!important}
.calendar-list{padding:14px 16px 16px}
.calendar-list-title{font-size:12px;font-weight:800;margin-bottom:10px;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.mini-schedule{border-left:3px solid var(--accent);background:var(--bg);border-radius:var(--radius2);padding:10px 12px;margin-bottom:8px;transition:all 0.15s}
.mini-schedule:hover{transform:translateX(2px)}
.mini-date{font-size:11px;color:var(--accent);font-weight:800;margin-bottom:3px}
.mini-text{font-size:12px;font-weight:700;line-height:1.4;color:var(--text)}
.full-calendar{max-width:100%}

/* 할일 */
.todo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;box-shadow:var(--shadow);transition:all 0.15s}
.todo-card:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
.todo-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s}
.todo-check.done{background:var(--primary);border-color:var(--primary);color:#fff}
.todo-done-label{font-size:11px;color:var(--soft);margin-left:auto;white-space:nowrap}

/* 입력 */
.input-page{display:grid;grid-template-columns:minmax(0,1fr) minmax(380px,.9fr);gap:18px;align-items:start}
.input-panel,.preview-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.input-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.input-title{font-size:17px;font-weight:900;letter-spacing:-.4px}
.input-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field-label{font-size:12px;font-weight:700;color:var(--muted);display:flex;flex-direction:column;gap:6px}
.field-control{border:1px solid var(--border2);border-radius:var(--radius2);padding:9px 12px;font-size:13px;background:var(--card);color:var(--text);transition:border-color 0.15s}
.field-control:focus{outline:none;border-color:var(--primary)}
.paste-guide{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius2);padding:12px;margin-bottom:14px}
.paste-guide strong{font-size:12px;font-weight:700}
.paste-guide pre{font-family:inherit;white-space:pre-wrap;font-size:11px;color:var(--muted);line-height:1.6;margin-top:6px}
.paste-area{width:100%;min-height:230px;border:1px solid var(--border2);border-radius:var(--radius2);padding:12px;font-size:13px;line-height:1.7;background:var(--card);color:var(--text);resize:vertical;transition:border-color 0.15s}
.paste-area:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,35,50,.06)}
.input-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
.input-count{font-size:12px;color:var(--soft)}
.input-buttons{display:flex;gap:8px}
.input-error{margin-top:10px;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:var(--radius2);padding:10px 12px;font-size:12px;font-weight:700}
.preview-list{display:flex;flex-direction:column;gap:10px}
.preview-card{border:1px solid var(--border);background:var(--bg);border-radius:var(--radius2);padding:14px}
.preview-row{display:grid;grid-template-columns:140px 1fr;gap:8px;margin-bottom:8px}
.preview-top{grid-template-columns:130px 1fr 80px 50px;align-items:center}
.summary-edit{width:100%;margin-bottom:8px;font-weight:700;border:1px solid var(--border2);border-radius:var(--radius2);padding:8px 10px;font-size:13px;background:var(--card)}
.todo-check-label{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:5px}
.remove-btn{border:1px solid #fecaca;color:#b91c1c;background:#fff;border-radius:var(--radius2);padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;width:100%;transition:all 0.15s}
.remove-btn:hover{background:#fee2e2}
.preview-card select,.preview-card input[type=text],.preview-card input[type=date],.preview-card textarea{border:1px solid var(--border2);border-radius:var(--radius2);padding:7px 10px;font-size:12px;background:var(--card);color:var(--text);width:100%}
.preview-card textarea{min-height:60px;resize:vertical}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:16px;padding:26px;width:90%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.modal-input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius2);font-size:14px;margin-bottom:12px;transition:border-color 0.15s}

async function sbFetch(table, method='GET', body=null, query='') {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : '',
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) { const err = await res.text(); console.error('Supabase error:', err); return null; }
  if (res.status === 204) return true;
  return res.json();
}

      sbFetch('todos', 'GET', null, '?order=created_at.desc'),

      userId ? sbFetch('user_settings', 'GET', null, `?user_id=eq.${userId}&select=settings&limit=1`) : Promise.resolve(null),
    ]);
    if (dbRooms) rooms = dbRooms.map(r=>({id:r.id,name:r.name,favorite:r.favorite,archived:r.archived,sortOrder:r.sort_order}));
    if (dbMsgs) messages = dbMsgs.map(m=>({id:m.id,roomName:m.room_name,tag:m.tag,sender:m.sender,summary:m.summary,content:m.content,messageDate:m.message_date,eventDate:m.event_date,createdAt:m.created_at,isTodo:m.is_todo}));
    if (dbTodos) todos = dbTodos.map(t=>({id:t.id,messageId:t.message_id,title:t.title,tag:t.tag,roomName:t.room_name,dueDate:t.due_date,done:t.done,doneAt:t.done_at}));
    if (dbCustomEvents) customEvents = dbCustomEvents.map(e=>({id:e.id,title:e.title,date:e.date,endDate:e.end_date||null,tag:e.tag,color:e.color||'none',memo:e.memo,createdAt:e.created_at}));

    console.log('✅ Supabase 로드 완료');

(function() {
  const cached = localStorage.getItem('hj_holidays_cache');
  if(cached) {

      const { data, ts } = JSON.parse(cached);

async function fetchHolidaysFromAPI(year) {
  const apiKey = localStorage.getItem('hj_holiday_api_key') || 'cec76bc0e43f205d776fecbe676a16e972762b6f64535963ebf2adf922684478';
  const url = `https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getHoliDeInfo?serviceKey=${apiKey}&solYear=${year}&numOfRows=50&_type=json`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const items = data?.response?.body?.items?.item;
    if(!items) return {};
    const list = Array.isArray(items) ? items : [items];
    const holidays = {};
    list.forEach(item => {
      const d = String(item.locdate);
      const key = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
      holidays[key] = item.dateName;
    });
    return holidays;
  } catch(e) {
    console.warn('공휴일 API 실패:', e);
    return {};
  }
}

async function refreshHolidays() {
  const thisYear = new Date().getFullYear();
  const nextYear = thisYear + 1;
  showToast('⏳ 공휴일 데이터 갱신 중...');
  const [h1, h2] = await Promise.all([
    fetchHolidaysFromAPI(thisYear),
    fetchHolidaysFromAPI(nextYear)
  ]);
  const merged = { ...h1, ...h2 };
  if(Object.keys(merged).length === 0) {
    showToast('❌ 공휴일 데이터를 가져오지 못했어요.');
    return;
  }
  KR_HOLIDAYS = { ...KR_HOLIDAYS, ...merged };
  localStorage.setItem('hj_holidays_cache', JSON.stringify({ data: merged, ts: Date.now() }));
  showToast(`✅ ${Object.keys(merged).length}개 공휴일 갱신 완료!`);
  // 캘린더 새로고침
  const el = document.getElementById('main-content');
  if(currentView === 'calendar') renderCalendarView(el);
}

// ===== 유틸 =====
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function todayKey() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9*60*60*1000);
  return kst.toISOString().slice(0,10);
}
function addDaysKey(n) { const now = new Date(); const kst = new Date(now.getTime() + 9*60*60*1000); kst.setDate(kst.getDate()+n); return dateKey(kst); }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function formatDate(v) {
  if(!v) return '';
  const d=new Date(v);
  if(isNaN(d)) return v;
  const days=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()} ${days[d.getDay()]}`;
}
function normalizeTag(t) {
  const map={'자재/발주':'자재발주','하자/보수':'하자보수','안전':'안전관리','지시':'지시사항','공지':'공지사항','시공':'시공기준','품질':'품질관리'};
  return map[t]||t||'기타';
}

function badgeClass(t) { return BADGE[t]||'b-gray'; }
function evClass(t) { return EV_CLASS[normalizeTag(t)]||'ev-gray'; }
function shortTag(t) {
  return {지시사항:'지시',공지사항:'공지',시공기준:'기준',자재발주:'자재',품질관리:'품질',안전관리:'안전',하자보수:'하자',일정:'일정'}[normalizeTag(t)]||t;
}
function getHoliday(y,m,d) { return KR_HOLIDAYS[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]||null; }

  const pending = todos.filter(t=>!t.done).length;
  document.getElementById('stat-total').textContent = messages.length+'건';
  document.getElementById('stat-todo').textContent = pending+'건';
}

      </div>
      ${!sectionCollapsed['찾아보기'] ? CATEGORIES.map(c => navItem(c.icon,c.tag,'cat_'+c.tag,messages.filter(m=>normalizeTag(m.tag)===c.tag).length)).join('') : ''}

function navItem(icon,label,view,count) {
  const isActive = currentView===view || (view.startsWith('cat_')&&currentView===view);
  return `<div class="nav-item ${isActive?'active':''}" onclick="setView('${view}')">
    <span class="nav-icon">${icon}</span>${label}
    ${typeof count==='number'?`<span class="count">${count}</span>`:''}
  </div>`;
}

function setView(v) {
  currentView = v;
  closeSidebar();
  if(v.startsWith('cat_')) { selectedCategory=v.replace('cat_',''); currentView='search'; }
  const titles = {dashboard:'대시보드',calendar:'캘린더',weekly:'주간업무일지',library:'공정표 관리',drawing:'도면 관리',construction:'시공 관리',inspection:'검측요청서',punch:'펀치리스트',todo:'할일',personal:'개인노트',gallery:'갤러리',search:'검색',ai_search:'AI 검색',input:'메시지 입력',settings:'설정'};
  document.getElementById('header-title').textContent = titles[v]||(v.startsWith('cat_')?v.replace('cat_','')+'  검색':v);
  const guideEl = document.getElementById('header-guide');
  if(guideEl) guideEl.style.display = (currentView==='dashboard') ? 'block' : 'none';
  renderSidebar();
  const el = document.getElementById('main-content');
  if(currentView==='dashboard') renderDashboard(el);
  else if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='todo') renderTodoView(el);
  else if(currentView==='search') renderSearchView(el);
  else if(currentView==='ai_search') renderAiSearchView(el);
  else if(currentView==='input') renderInputView(el);
  else if(currentView==='weekly') renderWeeklyView(el);
  else if(currentView==='library') renderLibraryView(el, 'library');
  else if(currentView==='drawing') renderLibraryView(el, 'drawing');
  else if(currentView==='construction') renderLibraryView(el, 'construction');
  else if(currentView==='inspection') renderInspectionView(el);
  else if(currentView==='personal') { renderPersonalView(el); }
  else if(currentView==='punch') renderPunchView(el);
  else if(currentView==='gallery') renderGalleryView(el);
  else if(currentView==='settings') renderSettingsView(el);
  else if(currentView.startsWith('room_')) {
    renderRoomView(el,v);
    setTimeout(applyRoomCalLayout, 0);
  }
}

function openRoom(id) {
  const room = rooms.find(r=>r.id===id);
  if(!room) return;
  closeSidebar();
  currentView = 'room_'+id;
  document.getElementById('header-title').textContent = room.name;
  renderSidebar();
  renderRoomView(document.getElementById('main-content'), id);
  setTimeout(applyRoomCalLayout, 0);
}

function toggleSection(name) {
  sectionCollapsed[name] = !sectionCollapsed[name];
  renderSidebar();
}

function toggleFav(id) { rooms=rooms.map(r=>r.id===id?{...r,favorite:!r.favorite}:r); save(); saveRoomsToSupabase(); }
function moveRoom(id,dir) {
  const sorted=[...rooms].sort((a,b)=>a.sortOrder-b.sortOrder);
  const i=sorted.findIndex(r=>r.id===id);
  const j=i+dir;
  if(i<0||j<0||j>=sorted.length) return;
  [sorted[i].sortOrder,sorted[j].sortOrder]=[sorted[j].sortOrder,sorted[i].sortOrder];
  rooms=sorted; save(); saveRoomsToSupabase();
}
function archiveRoom(id) { rooms=rooms.map(r=>r.id===id?{...r,archived:!r.archived}:r); save(); saveRoomsToSupabase(); }

function deleteRoomConfirm(id) {
  const room = rooms.find(r=>r.id===id);
  if(!room) return;
  const msgCount = messages.filter(m=>m.roomName===room.name).length;
  const msg = msgCount > 0
    ? `"${room.name}" 채팅방과 관련 메시지 ${msgCount}건이 모두 삭제됩니다.\n정말 삭제하시겠어요?`
    : `"${room.name}" 채팅방을 삭제하시겠어요?`;
  if(confirm(msg)) {
    messages = messages.filter(m=>m.roomName!==room.name);
    rooms = rooms.filter(r=>r.id!==id);
    save(); saveRoomsToSupabase(); saveMessagesToSupabase();
    renderSidebar();
    setView('dashboard');
    showToast(`🗑️ "${room.name}" 삭제됐어요.`);
  }
}
function toggleEditMode() { editMode=!editMode; renderSidebar(); }
function toggleFavoriteOnly() { favoriteOnly=!favoriteOnly; renderSidebar(); }
function addRoomPrompt() { document.getElementById('room-modal').style.display='flex'; document.getElementById('room-name-input').focus(); }
function closeModal() { document.getElementById('room-modal').style.display='none'; }
function confirmAddRoom() {
  const name=document.getElementById('room-name-input').value.trim();
  if(!name) return;
  rooms.push({id:uid(),name,favorite:false,archived:false,sortOrder:rooms.length+1});
  save(); saveRoomsToSupabase(); closeModal();
  document.getElementById('room-name-input').value='';
  showToast('채팅방이 추가됐어요!');
}

          </div>
          <div class="panel">
            <div class="panel-head"><div class="panel-title">지시사항</div><button class="panel-link" onclick="setView('cat_지시사항')">전체 →</button></div>
            ${missedInstr.length?missedInstr.slice(0,3).map(m=>msgItem(m,true)).join(''):'<div class="empty-box">지시사항이 없습니다.</div>'}
          </div>
        </div>
        <div class="dashboard-grid-2">
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">해야 할 일 <span style="background:#dc2626;color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px;">내일</span></div>
              <button class="panel-link" onclick="setView('todo')">할일 전체 →</button>

// ===== 캘린더 =====
function getCalendarEvents() {
  return messages
    .filter(m=>(m.eventDate||m.messageDate)&&normalizeTag(m.tag)==='일정')
    .map(m=>({id:m.id,date:m.eventDate||m.messageDate,title:m.summary,tag:normalizeTag(m.tag),roomName:m.roomName}))
    .sort((a,b)=>a.date.localeCompare(b.date));
}

function getScheduleEvents() {
  const today = todayKey();
  return messages
    .filter(m=>(m.eventDate||m.messageDate)&&(m.eventDate||m.messageDate)>=today&&normalizeTag(m.tag)==='일정')
    .map(m=>({id:m.id,date:m.eventDate||m.messageDate,title:m.summary,tag:normalizeTag(m.tag),roomName:m.roomName}))
    .sort((a,b)=>a.date.localeCompare(b.date));
}

function calendarCard() {
  const y=calYear,mo=calMonth;
  const firstDay=new Date(y,mo,1).getDay();
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const events=getCalendarEvents();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(new Date(y,mo,d));
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  return `
    <div class="calendar-card">
      <div class="calendar-head">
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="calNav(-1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px;transition:all 0.15s">‹</button>
          <div class="calendar-title">${y}년 ${monthNames[mo]}</div>
          <button onclick="calNav(1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px;transition:all 0.15s">›</button>
        </div>
        <button onclick="calNav(0)" style="height:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 12px;transition:all 0.15s">오늘</button>
      </div>
      <div class="calendar-grid" id="cal-grid-dash">
        ${['일','월','화','수','목','금','토'].map(d=>`<div class="day-label">${d}</div>`).join('')}
        ${cells.map((date,i)=>{
          if(!date) return '<div class="cal-cell mini-cal-cell" data-dk=""></div>';
          const dk=dateKey(date);
          const dayEvents=events.filter(e=>e.date===dk);
          const dayCustom=getCustomEventsForDate(dk);

          // 저장된 순서 적용해서 합치기
          const orderKey = 'hj3_order_'+dk;
          const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
          let allDayItems = [
            ...dayEvents.map(e=>({type:'msg',id:e.id,tag:e.tag,title:e.title})),
            ...dayCustom.filter(e=>!/^(휴무|근무)/.test(e.title.trim())).map(e=>({type:'custom',id:e.id,tag:e.tag||'일정',title:e.title,memo:e.memo,color:e.color||'none'}))
          ];
          if(savedOrder.length) {
            allDayItems.sort((a,b)=>{
              const ai=savedOrder.indexOf(a.id); const bi=savedOrder.indexOf(b.id);
              return (ai===-1?999:ai)-(bi===-1?999:bi);
            });
          }
          const isToday=isSameDay(date,new Date());
          const isSun=i%7===0;
          const holiday = appSettings.showHoliday!==false ? getHoliday(y,mo,date.getDate()) : null;
          const hasCustom=dayCustom.length>0;
          const isOffDay = dayCustom.some(e=>/^휴무/.test(e.title.trim()));
          const isWorkSat = dayCustom.some(e=>/^근무/.test(e.title.trim())) && date.getDay()===6;
          const dayCustomSingleDash = dayCustom.filter(e=>!e.endDate&&!/^(휴무|근무)/.test(e.title.trim()));
          let singleItemsDash = [
            ...dayEvents.map(e=>({type:'msg',id:e.id,tag:e.tag,title:e.title})),
            ...dayCustomSingleDash.map(e=>({type:'custom',id:e.id,tag:e.tag||'일정',title:e.title,memo:e.memo,color:e.color||'none'}))
          ];
          if(savedOrder.length){singleItemsDash.sort((a,b)=>{const ai=savedOrder.indexOf(a.id);const bi=savedOrder.indexOf(b.id);return(ai===-1?999:ai)-(bi===-1?999:bi);});}
          const calSrchMatch = calSearchActive && calSearchQuery && (() => {
            const q = calSearchQuery.toLowerCase();
            const dayMsgs = messages.filter(m=>(m.eventDate||m.messageDate)===dk);
            const evTexts = [
              ...dayMsgs.map(m=>(m.summary||'')+(m.content||'')+(m.tag||'')),
              ...allDayCustom.map(e=>(e.title||'')+(e.memo||''))
            ].join(' ').toLowerCase();
            return q.split(' ').filter(Boolean).every(w=>evTexts.includes(w));
          })();
          return `<div class="cal-cell mini-cal-cell ${isToday?'today':''} ${isSun?'sunday':''} ${holiday?'holiday':''} ${isOffDay?'off-day':''} ${hasCustom&&!isOffDay&&!isWorkSat?'has-custom':''} ${calSrchMatch?'cal-search-match':''}" data-dk="${dk}" onclick="handleDayClick('${dk}')">
            <div class="cal-date" style="${isOffDay?'color:#ef4444':''}">
              <span>${date.getDate()}</span>${isOffDay?'<span style="font-size:11px;color:#ef4444;font-weight:900;margin-left:3px;vertical-align:middle">휴무</span>':''}${isWorkSat?'<span style="font-size:11px;color:#0f766e;font-weight:900;margin-left:3px;vertical-align:middle">근무</span>':''}${holiday?`<span class="holiday-name" style="display:inline;margin-left:3px;margin-bottom:0">${holiday}</span>`:''}
            </div>
            ${singleItemsDash.slice(0,3).map(e=>
              e.type==='msg'
                ? `<span class="cal-event ${e.title&&e.title.includes('타설')?'ev-tasel':'ev-purple'}" title="${e.title}">${shortTag(e.tag)}</span>`
                : `<span class="cal-event ${e.title&&e.title.includes('타설')?'ev-tasel':'custom-ev'}" onclick="event.stopPropagation();openEditEventModal('${e.id}')" title="${e.title}${e.memo?' · '+e.memo:''}" style="${e.color&&e.color!=='none'?'background:'+e.color+'22;color:'+e.color:''}">${e.title}</span>`
            ).join('')}
            ${singleItemsDash.length===4?(
              singleItemsDash[3].type==='msg'
                ? `<span class="cal-event ${singleItemsDash[3].title&&singleItemsDash[3].title.includes('타설')?'ev-tasel':'ev-purple'}" title="${singleItemsDash[3].title}">${shortTag(singleItemsDash[3].tag)}</span>`
                : `<span class="cal-event ${singleItemsDash[3].title&&singleItemsDash[3].title.includes('타설')?'ev-tasel':'custom-ev'}" title="${singleItemsDash[3].title}">${singleItemsDash[3].title}</span>`
            ):(singleItemsDash.length>4?`<span class="cal-event" style="background:var(--surface);color:var(--muted);font-weight:700;cursor:pointer" onclick="event.stopPropagation();handleDayClick('${dk}')">+${singleItemsDash.length-3} 더보기</span>`:'')}
          </div>`;
        }).join('')}
      </div>
      <div class="calendar-list">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:10px">
          <div class="calendar-list-title" style="margin-bottom:0;white-space:nowrap">다가오는 일정</div>
          <button class="btn-primary" style="font-size:11px;padding:5px 10px;white-space:nowrap;flex-shrink:0" onclick="openEventModal('${todayKey()}')">+ 추가</button>
        </div>
        ${[...getScheduleEvents(), ...getUpcomingCustomEvents()].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6).map(e=>{
          const isOffDay = e.isCustom && /^휴무/.test((e.title||'').trim());
          const borderColor = isOffDay ? '#ef4444' : e.isCustom ? (e.color&&e.color!=='none'?e.color:'#3b82f6') : '#7c3aed';
          const dateColor = isOffDay ? '#ef4444' : e.isCustom ? (e.color&&e.color!=='none'?e.color:'#3b82f6') : '#7c3aed';
          const icon = isOffDay ? '' : e.isCustom ? '✏️' : '📋';
          const displayDate = e.isCustom && e.date < todayKey() ? todayKey() : e.date;
          const dateLabel = e.isCustom && e.endDate ? formatDate(displayDate)+' ~ '+formatDate(e.endDate) : formatDate(displayDate);
          return `<div class="mini-schedule" style="cursor:pointer;border-left-color:${borderColor}" onclick="${e.isCustom?`openEditEventModal('${e.id}')` : `openEditMsgEvent('${e.id}')`}">
            <div class="mini-date" style="color:${dateColor}">${dateLabel} ${icon}</div>
            <div class="mini-text">${e.title}</div>
            <div class="meta">${e.isCustom?(e.tag||'일정')+(e.memo?` · ${e.memo.slice(0,20)}`:''):e.roomName+' · '+e.tag}</div>
          </div>`;
        }).join('')||'<div class="empty-box">다가오는 일정이 없습니다.</div>'}
      </div>
    </div>`;
}

function calNav(dir) {
  if(dir===0){calYear=new Date().getFullYear();calMonth=new Date().getMonth();}
  else{calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}}
  if(currentView==='dashboard') renderDashboard(document.getElementById('main-content'));
  else setView('calendar');
}


async function loadCalMemo() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/calendar_memo?user_id=eq.${userId}&order=updated_at.desc&limit=1`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(res.ok) {
    const rows = await res.json();
    calMemoContent = rows[0]?.content || '';
    const inp = document.getElementById('cal-memo-input');
    if(inp) inp.value = calMemoContent;
  }
}

async function saveCalMemo(content) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  const statusEl = document.getElementById('cal-memo-status');
  if(statusEl) statusEl.textContent = '저장 중...';
  try {
    // merge-duplicates는 user_id에 unique 제약이 없으면 새 행만 쌓이므로
    // 기존 행을 지우고 새로 넣는 방식으로 통일 (주간업무일지와 동일 패턴)
    await fetch(`${SUPABASE_URL}/rest/v1/calendar_memo?user_id=eq.${userId}`, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    const res = await fetch(`${SUPABASE_URL}/rest/v1/calendar_memo`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, content, updated_at: new Date().toISOString() })
    });
    if(!res.ok) throw new Error('save failed: ' + res.status);
    calMemoContent = content;
    if(statusEl) { statusEl.textContent = '저장됨 ✓'; setTimeout(() => { if(statusEl) statusEl.textContent = ''; }, 2000); }
  } catch(e) {
    console.warn('calMemo save error', e);
    if(statusEl) { statusEl.textContent = '저장 실패 ⚠'; }
  }
}

function initCalMemo() {
  const inp = document.getElementById('cal-memo-input');
  if(!inp) return;
  inp.value = calMemoContent;
  inp.addEventListener('input', function() {
    clearTimeout(calMemoSaveTimer);
    calMemoSaveTimer = setTimeout(() => saveCalMemo(this.value), 1000);
  });
}

function toggleCalSearch() {
  calSearchActive = !calSearchActive;
  const bar = document.getElementById('cal-search-bar');
  const btn = document.getElementById('cal-search-btn');
  if(calSearchActive) {
    bar.style.display = 'flex';
    btn.style.background = 'var(--primary)';
    btn.style.color = '#fff';
    btn.style.borderColor = 'var(--primary)';
    setTimeout(() => document.getElementById('cal-search-input')?.focus(), 50);
  } else {
    calSearchQuery = '';
    bar.style.display = 'none';
    btn.style.background = 'var(--card)';
    btn.style.color = 'var(--muted)';
    btn.style.borderColor = 'var(--border2)';
    renderCalendarView(document.getElementById('main-content'));
  }
}

function clearCalSearch() {
  calSearchQuery = '';
  calSearchActive = false;
  renderCalendarView(document.getElementById('main-content'));
}

function onCalSearch(val) {
  calSearchQuery = val;
  updateCalSearchUI();
  // 셀 하이라이트 갱신
  const y=calYear, mo=calMonth;
  const events=getCalendarEvents();
  document.querySelectorAll('#cal-grid-main .cal-cell[data-dk]').forEach(cell => {
    const dk = cell.getAttribute('data-dk');
    if(!dk) return;
    cell.classList.remove('cal-search-match');
    if(!val.trim()) return;
    const q = val.toLowerCase();
    const dayMsgs = messages.filter(m=>(m.eventDate||m.messageDate)===dk);
    const dayCustom = getCustomEventsForDate(dk);
    const evTexts = [
      ...dayMsgs.map(m=>(m.summary||'')+(m.content||'')+(m.tag||'')),
      ...dayCustom.map(e=>(e.title||'')+(e.memo||''))
    ].join(' ').toLowerCase();
    if(q.split(' ').filter(Boolean).every(w=>evTexts.includes(w))) cell.classList.add('cal-search-match');
  });
  // 결과 패널 갱신
  updateCalSearchResults(val);
}

function updateCalSearchUI() {
  const q = calSearchQuery.trim();
  const countEl = document.getElementById('cal-search-count');
  if(!countEl) return;
  if(!q) { countEl.textContent = ''; return; }
  const matches = document.querySelectorAll('#cal-grid-main .cal-search-match').length;
  countEl.textContent = matches + '건';
}

function updateCalSearchResults(q) {
  let panel = document.getElementById('cal-search-results-panel');
  const layout = document.getElementById('cal-layout');
  if(!layout) return;
  if(!panel) {
    panel = document.createElement('div');
    panel.id = 'cal-search-results-panel';
    layout.appendChild(panel);
  }
  if(!q || !q.trim()) { panel.innerHTML = ''; return; }
  const allEvents = [
    ...messages.filter(m=>m.eventDate||m.messageDate).map(m=>({
      date:m.eventDate||m.messageDate, title:m.summary||m.content||'', tag:m.tag||'메시지', type:'msg', id:m.id, roomName:m.roomName
    })),
    ...customEvents.map(e=>({date:e.date, title:e.title, tag:e.tag||'일정', type:'custom', id:e.id, memo:e.memo}))
  ];
  const results = allEvents.filter(e =>
    q.toLowerCase().split(' ').filter(Boolean).every(w=>((e.title||'')+(e.memo||'')+(e.tag||'')).toLowerCase().includes(w))
  ).sort((a,b)=>a.date.localeCompare(b.date));

  if(!results.length) {
    panel.innerHTML = '<div style="grid-column:1/-1"><div class="panel"><div class="empty-box">검색 결과가 없습니다.</div></div></div>';
    return;
  }
  panel.innerHTML = '<div style="grid-column:1/-1"><div class="panel"><div class="panel-head"><div class="panel-title">🔍 검색 결과 · '+results.length+'건</div></div>'+
    results.map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="${e.type==='custom'?`openEditEventModal('${e.id}')`:`openEditMsgEvent('${e.id}')`}">
      <span style="font-size:11px;color:var(--muted);min-width:48px">${formatDate(e.date)}</span>
      <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:${e.type==='msg'?'#ede9fe':'#dbeafe'};color:${e.type==='msg'?'#6d28d9':'#1e40af'}">${e.tag}</span>
      <span style="font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title}</span>
    </div>`).join('')
  +'</div></div>';
}

function renderCalendarView(el) {
  const y=calYear,mo=calMonth;
  const firstDay=new Date(y,mo,1).getDay();
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const events=getCalendarEvents();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(new Date(y,mo,d));
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 월별 날씨 캐시 키
  const weatherCacheKey = `hj_cal_weather_${y}_${mo+1}`;
  const cachedWeather = (() => {
    try { const c = JSON.parse(localStorage.getItem(weatherCacheKey)||'null');
      if(c && Date.now()-c.ts < 6*60*60*1000) return c.data; } catch(e) {}
    return null;
  })();

  // 날씨 데이터 없으면 비동기 로드 후 재렌더
  if(!cachedWeather) {
    const startDate = `${y}-${String(mo+1).padStart(2,'0')}-01`;
    const endDate = `${y}-${String(mo+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
    const todayStr = todayKey();

    const fetchWeather = async () => {
      const wd = {};
      const commonParams = `latitude=36.9923&longitude=127.0892&daily=weathercode,precipitation_sum&timezone=Asia/Seoul`;

      // 과거 구간
      if(startDate <= todayStr) {
        const pastEnd = endDate < todayStr ? endDate : todayStr;
        try {
          const r = await fetch(`https://archive-api.open-meteo.com/v1/archive?${commonParams}&start_date=${startDate}&end_date=${pastEnd}`);
          const d = await r.json();
          (d.daily?.time||[]).forEach((date,i) => {
            wd[date] = { code: d.daily.weathercode[i], rain: d.daily.precipitation_sum[i] };
          });
        } catch(e) {}
      }
      // 미래 구간
      if(endDate >= todayStr) {
        const futureStart = startDate > todayStr ? startDate : todayStr;
        try {
          const r = await fetch(`https://api.open-meteo.com/v1/forecast?${commonParams}&start_date=${futureStart}&end_date=${endDate}`);
          const d = await r.json();
          (d.daily?.time||[]).forEach((date,i) => {
            wd[date] = { code: d.daily.weathercode[i], rain: d.daily.precipitation_sum[i] };
          });
        } catch(e) {}
      }

      localStorage.setItem(weatherCacheKey, JSON.stringify({data:wd, ts:Date.now()}));
      renderCalendarView(el);
    };
    fetchWeather();
  }

  const weatherData = cachedWeather || {};

  const calHTML = `
    <div class="calendar-card" style="border:none;padding:0;background:transparent">
      <div class="calendar-head">
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="calNav(-1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">‹</button>
          <div class="calendar-title">${y}년 ${monthNames[mo]}</div>
          <button onclick="calNav(1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">›</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button onclick="calNav(0)" style="height:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 12px">오늘</button>

        </div>
      </div>
      <div id="cal-search-bar" style="display:none;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:none;align-items:center;gap:8px">
        <input id="cal-search-input" style="flex:1;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:13px;background:var(--card);color:var(--text);outline:none" placeholder="일정 검색... (예: 타설, 302동)" oninput="onCalSearch(this.value)">

        <button onclick="clearCalSearch()" style="border:none;background:none;font-size:16px;color:var(--muted);cursor:pointer;padding:0 4px">✕</button>
      </div>
      <div class="calendar-grid" id="cal-grid-main">
        ${['일','월','화','수','목','금','토'].map(d=>`<div class="day-label">${d}</div>`).join('')}
        ${cells.map((date,i)=>{
          if(!date) return '<div class="cal-cell" data-dk=""></div>';
          const dk=dateKey(date);
          const dayEvents=events.filter(e=>e.date===dk);
          const dayCustomSingle=customEvents.filter(e=>e.date===dk&&!e.endDate&&!/^(휴무|근무)/.test(e.title.trim()));
          const dayCustomRange=customEvents.filter(e=>e.endDate&&!/^(휴무|근무)/.test(e.title.trim()));

function drawRangeBarsInCell(y, mo, gridId='cal-grid-main') {
  // 기존 기간 바 모두 제거 (중복 방지)
  document.querySelectorAll(`#${gridId} .range-bar-item`).forEach(el => el.remove());
  const rangeEvents = customEvents.filter(e => e.endDate && e.endDate !== e.date && !/^(휴무|근무)/.test(e.title.trim()));
  if(!rangeEvents.length) return;

  const monthStart = dateKey(new Date(y, mo, 1));
  const monthEnd = dateKey(new Date(y, mo+1, 0));
  const COLORS = ['#ef4444','#f97316','#f5c518','#10b981','#3b82f6','#8b5cf6','#64748b','#1a2332'];

  rangeEvents.forEach((ev, evIdx) => {
    const color = ev.color || COLORS[evIdx % COLORS.length];
    const evStart = ev.date;
    const evEnd = ev.endDate;

    // 월 내 모든 날짜 순회하며 해당 기간에 속하는 셀에 바 삽입
    let cur = new Date(evStart > monthStart ? evStart : monthStart);
    const endD = new Date(evEnd < monthEnd ? evEnd : monthEnd);
    if(cur > endD) return;

    while(cur <= endD) {
      const dk = dateKey(cur);
      const cell = document.querySelector(`#${gridId} [data-dk="${dk}"]`);
      if(cell) {
        const isStart = dk === evStart;
        const isEnd = dk === evEnd;
        const dow = cur.getDay(); // 0=일, 6=토
        const isWeekStart = dow === 0; // 줄 시작
        const isWeekEnd = dow === 6;   // 줄 끝

        const showLabel = isStart || isWeekStart;
        const roundLeft = isStart ? '4px' : '0px';
        const roundRight = isEnd || isWeekEnd ? '4px' : '0px';
        const marginLeft = isStart || isWeekStart ? '2px' : '0px';
        const marginRight = isEnd || isWeekEnd ? '2px' : '0px';

        const capLeft = isStart || isWeekStart;
        const capRight = isEnd || isWeekEnd;
        const bar = document.createElement('div');
        bar.className = 'range-bar-item';
        bar.style.cssText = `
          display:block;
          margin-top:2px;
          margin-bottom:1px;
          margin-left:-6px;
          margin-right:-7px;
          height:16px;
          background:${color}33;
          color:${color};
          border:none;
          box-shadow:none;
          font-size:10px;
          font-weight:700;
          border-radius:${capLeft ? '4px' : '0'} ${capRight ? '4px' : '0'} ${capRight ? '4px' : '0'} ${capLeft ? '4px' : '0'};
          padding:1px 6px;
          overflow:hidden;
          white-space:nowrap;
          text-overflow:clip;
          cursor:pointer;
          line-height:14px;
          position:relative;
          z-index:5;
        `;
        bar.textContent = showLabel ? ev.title : '';
        bar.title = ev.title;
        bar.onclick = (e) => { e.stopPropagation(); openEditEventModal(ev.id); };
        // 날짜 다음(기존 일정 위)에 삽입 - 기간 바 위치를 모든 날짜에서 일정하게 유지
        const ref = cell.querySelector('.cal-event, .cal-more');
        cell.insertBefore(bar, ref);
      }
      cur.setDate(cur.getDate() + 1);
    }
  });
}

function toggleTodo(id) {

let checkedTodos = new Set();

function renderTodoView(el) {
  const pending=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);
  el.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">미완료 · ${pending.length}건</div>
        <button class="btn-primary" style="font-size:12px;padding:6px 12px;" onclick="completeChecked()">✓ 선택 완료처리</button>
      </div>
      ${pending.map(t=>todoItemCheckable(t)).join('')||'<div class="empty-box"><div class="empty-icon">✅</div><div class="empty-text">미완료 할일이 없습니다.</div></div>'}
    </div>
    <div class="panel"><div class="panel-head"><div class="panel-title">완료 · ${done.length}건</div></div>${done.map(t=>todoItem(t)).join('')||'<div class="empty-box"><div class="empty-icon">🎉</div><div class="empty-text">완료된 할일이 없습니다.</div></div>'}</div>`;
}

function todoItemCheckable(t) {
  const tag=normalizeTag(t.tag);
  const isChecked = checkedTodos.has(t.id);
  const m = messages.find(msg=>msg.id===t.messageId);
  const sender = t.sender || (m && m.sender) || '';
  return `<div class="item" style="display:flex;gap:10px;align-items:flex-start;">
    <input type="checkbox" style="margin-top:4px;width:16px;height:16px;cursor:pointer;" ${isChecked?'checked':''} onchange="toggleCheck('${t.id}',this.checked)">
    <div style="flex:1;cursor:pointer;" onclick="openTodoDetail('${t.id}')">
      <span class="badge ${badgeClass(tag)}">${tagIcon(tag)} ${tag}</span>
      <div class="item-title">${t.title}</div>
      <div class="meta">${[formatDate(t.dueDate),sender,t.roomName].filter(Boolean).join(' · ')}</div>
    </div>
  </div>`;
}

function toggleCheck(id, checked) {
  if(checked) checkedTodos.add(id);
  else checkedTodos.delete(id);
}

function completeChecked() {
  if(checkedTodos.size===0){showToast('완료할 항목을 선택해주세요');return;}
  const count = checkedTodos.size;
  if(!confirm(`선택한 ${count}건을 완료처리할까요?`)) return;
  todos=todos.map(t=>checkedTodos.has(t.id)?{...t,done:true,doneAt:new Date().toISOString()}:t);
  checkedTodos.clear();
  save(); saveTodosToSupabase();
  renderTodoView(document.getElementById('main-content'));
  showToast(`✅ ${count}건 완료처리 완료!`);
}

// ===== AI 검색 (Gemini, 텍스트+도면 이미지 분석) =====
function aiSearchExtractKeywords(q) {
  // 영문/숫자와 한글이 붙어있으면 띄어서 분리 (예: "ALC검측" -> "ALC 검측", "302동검측" -> "302동 검측")
  const spaced = q
    .replace(/([a-zA-Z0-9])([가-힣])/g, '$1 $2')
    .replace(/([가-힣])([a-zA-Z0-9])/g, '$1 $2');
  return spaced.replace(/[?!.,~()]/g, ' ').split(/\s+/).map(w => w.trim()).filter(w => w.length >= 2);
}

let aiSearchWeeklyCache = null; // 주간업무일지 검색용 캐시 (지연 로드)

async function loadAiSearchWeeklyData() {
  try {
    const rows = await sbFetch('weekly_report', 'GET', null, '?select=row_name,date_key,content&order=date_key.desc&limit=500');
    aiSearchWeeklyCache = rows || [];
  } catch(e) { console.warn('주간업무일지 로드 실패', e); aiSearchWeeklyCache = []; }
}

function aiSearchGatherContext(question) {
  const keywords = aiSearchExtractKeywords(question);
  const matchScore = (str) => { str = str || ''; return keywords.filter(k => str.includes(k)).length; };

  function rank(items, scoreFn, cap) {
    const scored = items.map(item => ({ item, score: scoreFn(item) })).filter(x => x.score > 0);
    return scored.sort((a, b) => b.score - a.score).slice(0, cap).map(x => x.item);
  }

  // ===== 시간 표현을 실제 날짜로 변환해서 날짜 기반 데이터 자동 포함 =====
  const today = todayKey();
  const tomorrow = addDaysKey(1);
  const thisWeekEnd = addDaysKey(6);

  const hasToday    = /오늘|today/.test(question);
  const hasTomorrow = /내일|tomorrow/.test(question);
  const hasThisWeek = /이번\s*주|이번주|this\s*week/.test(question);
  const hasSchedule = /일정|검측|할일|할 일|작업|계획|사항/.test(question);

  // 날짜 관련 질문이면 해당 날짜 범위의 캘린더 일정, 주간업무일지, 할일을 강제로 포함
  let dateRelatedEvents = [];
  let dateRelatedWeekly = [];
  let dateRelatedTodos = [];

  if(hasToday || hasTomorrow || hasThisWeek || hasSchedule) {
    const fromDate = today;
    const toDate = (hasThisWeek || hasSchedule) ? thisWeekEnd : hasTomorrow ? tomorrow : today;

    dateRelatedEvents = customEvents.filter(e => {
      const s = e.date, en = e.endDate || e.date;
      return en >= fromDate && s <= toDate;
    }).slice(0, 20);

    dateRelatedWeekly = (aiSearchWeeklyCache || []).filter(r => {
      return r.date_key >= fromDate && r.date_key <= toDate && r.content && r.content.trim();
    }).slice(0, 20);

    dateRelatedTodos = (typeof todos !== 'undefined' ? todos : []).filter(t => {
      if(t.done) return false;
      const d = t.dueDate || '';
      if(hasTomorrow && d === tomorrow) return true;
      if(hasToday && d === today) return true;
      if(hasThisWeek && d >= today && d <= thisWeekEnd) return true;
      if(hasSchedule && d >= today && d <= thisWeekEnd) return true;
      return false;
    }).slice(0, 20);
  }

  const relMsgs = rank(messages, m => matchScore([m.summary, m.content, m.tag, m.roomName].join(' ')), 30);
  // 날짜 기반으로 뽑은 일정을 키워드 매칭 일정과 합쳐서 중복 제거
  const keywordEvents = rank(customEvents, e => matchScore([e.title, e.memo, e.tag].join(' ')), 20);
  const relEvents = [...new Map([...dateRelatedEvents, ...keywordEvents].map(e => [e.id||e.title, e])).values()].slice(0, 20);

  const keywordWeekly = rank(aiSearchWeeklyCache || [], r => matchScore([r.row_name, r.content].join(' ')), 15);
  const relWeekly = [...new Map([...dateRelatedWeekly, ...keywordWeekly].map(r => [r.row_name+':'+r.date_key, r])).values()].slice(0, 20);

  const relFolders = rank(typeof inspectionFolders !== 'undefined' ? inspectionFolders : [], f => matchScore(f.title || ''), 5);
  return { relMsgs, relEvents, relWeekly, relFolders, dateRelatedTodos };
}

// Visual Viewport API: 키보드 올라올 때 AI 입력창 위치 자동 조정 (Android 대응)
function initAiInputViewportListener() {
  if(!window.visualViewport) return;
  const adjust = () => {
    const el = document.querySelector('.ai-fixed-input');
    if(!el) return;
    const keyboardHeight = window.innerHeight - window.visualViewport.height;
    el.style.bottom = keyboardHeight > 0 ? keyboardHeight + 'px' : '0';
  };
  window.visualViewport.addEventListener('resize', adjust);
  window.visualViewport.addEventListener('scroll', adjust);
}

function genUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}

function ensureAiConversationId() {
  if(!currentAiConversationId) {
    currentAiConversationId = genUUID();
    localStorage.setItem('hj_ai_conv_id', currentAiConversationId);
  }
  return currentAiConversationId;
}

async function saveAiSearchTurn(question, answer) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/ai_search_history`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, question, answer, conversation_id: ensureAiConversationId() })
    });
  } catch(e) { console.warn('AI 검색 히스토리 저장 실패', e); }
}

async function loadAiSearchHistory(conversationId) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId || !conversationId) return [];
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ai_search_history?user_id=eq.${userId}&conversation_id=eq.${conversationId}&order=created_at.asc&limit=50`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(res.ok) return await res.json();
  } catch(e) { console.warn('AI 검색 히스토리 로드 실패', e); }
  return [];
}

// 대화 목록(conversation_id별로 묶어서) 가져오기 - 최근 대화 순
async function loadAiSearchConversationList() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return [];
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ai_search_history?user_id=eq.${userId}&order=created_at.desc&limit=500&select=question,conversation_id,created_at`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(!res.ok) return [];
    const rows = await res.json();
    const map = {};
    rows.forEach(r => {
      if(!map[r.conversation_id]) map[r.conversation_id] = { id: r.conversation_id, firstQuestion: r.question, count: 0, lastAt: r.created_at };
      map[r.conversation_id].count++;
      map[r.conversation_id].lastAt = r.created_at; // 오름차순이라 마지막에 덮어쓴 값이 최신
    });
    return Object.values(map).sort((a,b) => new Date(b.lastAt) - new Date(a.lastAt));
  } catch(e) { console.warn('대화 목록 로드 실패', e); return []; }
}

// 모델이 같은 문장을 계속 반복하는 무한루프성 응답인지 감지
function aiSearchIsDegenerate(text) {
  if(!text || text.length < 800) return false;
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 8);
  const counts = {};
  for(const line of lines) {
    counts[line] = (counts[line] || 0) + 1;
    if(counts[line] >= 4) return true; // 같은 줄이 4번 이상 반복되면 비정상으로 판단
  }
  return false;
}

async function aiSearchAsk(question) {
  const { relMsgs, relEvents, relWeekly, relFolders, dateRelatedTodos } = aiSearchGatherContext(question);
  const isFirstTurn = aiSearchConversation.length === 0;
  const now = new Date();
  const nowStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${['일','월','화','수','목','금','토'][now.getDay()]}요일) ${now.getHours()}시 ${now.getMinutes()}분`;

  const textContext = `[현재 날짜/시각: ${nowStr}]

[캘린더 일정 (날짜순)]
${relEvents.length ? relEvents.sort((a,b)=>a.date.localeCompare(b.date)).map(e => `- ${e.date}${e.endDate&&e.endDate!==e.date?'~'+e.endDate:''} ${e.title}${e.memo?' / '+e.memo:''}`).join('\n') : '(관련 일정 없음)'}

[할일 목록]
${dateRelatedTodos.length ? dateRelatedTodos.map(t=>`- [${t.dueDate||'기한없음'}] ${t.title}`).join('\n') : '(관련 할일 없음)'}

[카톡 메시지]
${relMsgs.map(m => `- (${m.messageDate||''}) [${m.tag||''}] ${m.sender||''}: ${m.summary||m.content||''}`).join('\n') || '(관련 메시지 없음)'}

[주간업무일지]
${relWeekly.map(r => `- (${r.date_key}) ${r.row_name}: ${r.content}`).join('\n') || '(관련 주간업무일지 없음)'}

[검측요청서 폴더]
${relFolders.map(f => `- ${f.title}`).join('\n') || '(관련 검측요청서 폴더 없음)'}`;

  const userMessage = isFirstTurn
    ? `아래 자료를 참고해서 질문에 답하세요.\n자료에서 확인되지 않으면 "자료에서 확인할 수 없어요"라고 솔직하게 답하세요. 추측하지 마세요.\n\n${textContext}\n\n질문: ${question}`
    : `이어지는 질문이에요. (새로 찾은 관련 자료가 있으면 추가로 참고하세요)\n\n${textContext}\n\n질문: ${question}`;

  aiSearchConversation.push({ role: 'user', content: userMessage });

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 45000);
  let res;
  try {
    if(aiEngine === 'gemini') {
      // Gemini 직접 호출
      if(!geminiApiKey) throw new Error('Gemini API 키를 설정해주세요. (설정 → AI 분류 엔진)');
      // Gemini 형식으로 변환 (role: user/model, parts 배열)
      const geminiContents = aiSearchConversation.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));
      res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${geminiApiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: geminiContents, generationConfig: { temperature: 0.2, maxOutputTokens: 2048 } }),
        signal: controller.signal
      });
    } else {
      // Claude Edge Function 호출
      const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
      res = await fetch(`${SUPABASE_URL}/functions/v1/rapid-endpoint`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
          'apikey': SUPABASE_KEY,
        },
        body: JSON.stringify({
          system: '당신은 건설현장 정보 비서입니다. 자료에서 확인되지 않으면 "자료에서 확인할 수 없어요"라고 솔직하게 답하세요. 추측하지 마세요. 이후 이어지는 질문은 지금까지의 대화 맥락을 참고해서 답하세요.',
          messages: aiSearchConversation,
        }),
        signal: controller.signal
      });
    }
  } catch(e) {
    aiSearchConversation.pop();
    if(e.name === 'AbortError') throw new Error('응답이 너무 오래 걸려서 중단했어요. 다시 질문해주세요.');
    throw e;
  } finally {
    clearTimeout(timeoutId);
  }

  if(!res.ok) { aiSearchConversation.pop(); throw new Error('AI 검색 오류: ' + res.status); }
  const data = await res.json();

  let answer;
  if(aiEngine === 'gemini') {
    answer = data.candidates?.[0]?.content?.parts?.[0]?.text || '답변을 생성하지 못했어요.';
  } else {
    if(data.error) { aiSearchConversation.pop(); throw new Error(data.error); }
    answer = data.answer || '답변을 생성하지 못했어요.';
  }

  if(aiSearchIsDegenerate(answer)) {
    aiSearchConversation.pop();
    throw new Error('AI가 응답을 만들다가 같은 내용을 반복하는 오류가 있었어요. 다시 질문해주세요.');
  }

  aiSearchConversation.push({ role: 'assistant', content: answer });

  return { answer, relMsgs, relEvents, relWeekly, relFolders };
}


async function runAiSearch() {
  const inpEl = document.getElementById('ai-search-input');
  const q = inpEl ? inpEl.value.trim() : '';
  if(!q) return;

  // 빈 상태(중앙 배치)였다면 활성 레이아웃(하단 고정)으로 전환
  const mainEl = document.getElementById('main-content');
  if(mainEl && mainEl.querySelector('.ai-search-wrap.is-empty')) {
    aiSearchSwitchToActive(mainEl);
  }

  const inp = document.getElementById('ai-search-input');
  if(inp) {
    inp.value = '';
    // Android에서 키보드 내리기 시도 (readonly 트릭)
    inp.setAttribute('readonly', 'readonly');
    inp.blur();
    setTimeout(() => inp && inp.removeAttribute('readonly'), 200);
  }
  // 임시 포커스 트릭도 병행
  const dummy = document.createElement('input');
  dummy.setAttribute('type','text');
  dummy.setAttribute('readonly','readonly');
  dummy.style.cssText = 'position:fixed;top:-999px;left:-999px;opacity:0;';
  document.body.appendChild(dummy);
  dummy.focus(); dummy.blur();
  setTimeout(() => document.body.removeChild(dummy), 200);
  const answerEl = document.getElementById('ai-search-answer');
  const btn = document.getElementById('ai-search-btn');
  btn.disabled = true; btn.textContent = '⏳ 분석 중...';

  const turnId = 'ai-turn-' + Date.now();
  const turnWrapId = 'ai-turn-wrap-' + Date.now();
  answerEl.insertAdjacentHTML('beforeend', `
    <div id="${turnWrapId}" style="margin-top:12px">
      <div style="font-size:12px;color:var(--text);font-weight:700;margin-bottom:6px">🙋 ${q}</div>
      <div id="${turnId}" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:13px;color:var(--muted)">관련 자료를 찾고 분석하는 중이에요...</div>
    </div>`);
  // 질문 말풍선이 키보드 위로 보이도록 스크롤 (키보드가 안 내려가도 질문은 보임)
  setTimeout(() => {
    const wrap = document.getElementById(turnWrapId);
    if(wrap) wrap.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);

  try {
    const { answer, relMsgs, relEvents, relWeekly, relFolders } = await aiSearchAsk(q);
    const turnEl = document.getElementById(turnId);
    if(turnEl) turnEl.outerHTML = `
      <div id="${turnId}" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px">
        <div style="font-size:14px;color:var(--text);white-space:pre-wrap;line-height:1.6">${answer}</div>
        <div style="margin-top:8px;font-size:10px;color:var(--muted)">참고: 메시지 ${relMsgs.length}건 · 일정 ${relEvents.length}건 · 주간업무일지 ${relWeekly.length}건 · 검측요청서 ${relFolders.length}건</div>
      </div>`;
    saveAiSearchTurn(q, answer);
  } catch(e) {
    const turnEl = document.getElementById(turnId);
    if(turnEl) turnEl.outerHTML = `<div id="${turnId}" style="background:#fee2e2;color:#b91c1c;border-radius:12px;padding:14px;font-size:13px">⚠️ ${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '질문하기';
    aiSearchScrollToBottom();
  }
}

// ===== 채팅방 뷰 =====
function renderRoomView(el, viewId) {
  const id = viewId.replace('room_','');
  const room = rooms.find(r=>r.id===id);
  if(!room) return;
  const roomMsgs = [...messages.filter(m=>m.roomName===room.name)].sort((a,b)=>new Date(a.messageDate||a.createdAt)-new Date(b.messageDate||b.createdAt));

  // 입력 현황 3개월 캘린더
  const now = new Date();
  // 월 오프셋 (화살표로 이동)
  const calOffsetKey = 'hj3_caloffset_' + id;
  const calOffset = Number(localStorage.getItem(calOffsetKey) || '0');
  const months = [-1, 0, 1].map(offset => {
    let mo = now.getMonth() + offset + calOffset;
    let y = now.getFullYear();
    while(mo < 0) { mo += 12; y--; }
    while(mo > 11) { mo -= 12; y++; }
    return { y, mo };
  });
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 이 채팅방에서 입력된 날짜 수집 (messageDate 기준, 오늘 이전만)
  const inputDates = new Set(roomMsgs
    .filter(m => m.messageDate && m.messageDate <= todayKey())
    .map(m => m.messageDate)
  );

  function renderMiniCal(y, mo, isCenter) {
    const daysInMonth = new Date(y, mo+1, 0).getDate();
    const firstDay = new Date(y, mo, 1).getDay();
    let cells = '';
    for(let i=0; i<firstDay; i++) cells += '<div></div>';
    for(let d=1; d<=daysInMonth; d++) {
      const dk = `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dk === todayKey();
      const hasInput = inputDates.has(dk);
      const isFuture = dk > todayKey();
      const isSun = (firstDay + d - 1) % 7 === 0;
      cells += `<div onclick="${hasInput?`scrollToDate('${dk}')`:'void(0)'}" style="
        width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:1px auto;
        font-size:9px;font-weight:${isToday?'900':'600'};
        background:${hasInput?'#10b981':isToday?'var(--primary)':isFuture?'transparent':'#fee2e2'};
        color:${hasInput?'#fff':isToday?'#fff':isFuture?'var(--soft)':isSun?'#ef4444':'var(--muted)'};
        cursor:${hasInput?'pointer':'default'};
      " title="${dk}${hasInput?' ✅ 입력완료':isFuture?'':' ❌ 미입력'}">${d}</div>`;
    }
    const header = isCenter
      ? `<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px">
          <button onclick="localStorage.setItem('${calOffsetKey}', ${calOffset-1});renderRoomView(document.getElementById('main-content'),'${viewId}');setTimeout(applyRoomCalLayout,0)" style="border:1px solid var(--border2);background:var(--card);border-radius:5px;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1">‹</button>
          <span style="font-size:11px;font-weight:800;color:var(--text)">${y}년 ${monthNames[mo]}</span>
          <button onclick="localStorage.setItem('${calOffsetKey}', ${calOffset+1});renderRoomView(document.getElementById('main-content'),'${viewId}');setTimeout(applyRoomCalLayout,0)" style="border:1px solid var(--border2);background:var(--card);border-radius:5px;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1">›</button>
        </div>`
      : `<div style="font-size:10px;font-weight:700;color:var(--soft);text-align:center;margin-bottom:6px">${y}년 ${monthNames[mo]}</div>`;
    return `
      <div style="flex:1;min-width:0">
        ${header}
        <div style="display:grid;grid-template-columns:repeat(7,20px);gap:1px;justify-content:center">
          ${['일','월','화','수','목','금','토'].map((d,i)=>`<div style="width:20px;text-align:center;font-size:8px;font-weight:800;color:${i===0?'#ef4444':'var(--soft)'};padding-bottom:2px">${d}</div>`).join('')}
          ${cells}
        </div>
      </div>`;
  }

  // 기간 필터 상태

// ===== 파싱 =====
function parseAiTable(text,roomName) {
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const rows=[];
  for(const line of lines) {
    if(!line.includes('|')) continue;
    if(/^\|?\s*-+/.test(line)) continue;
    const cells=line.split('|').map(c=>c.trim()).filter(Boolean);
    if(cells.length<2) continue;
    if(cells.some(c=>c.includes('태그'))&&cells.some(c=>c.includes('요약'))) continue;
    const tag=normalizeTag(stripEmoji(cells[0]||'기타'));
    const sender=cells[1]||'';
    const summary=cells[2]||cells[1]||'';
    const todoCell=cells[3]||'';
    const dateCell=cells[4]||summary;
    if(!summary) continue;
    const finalTag=TAGS.includes(tag)?tag:guessTag(summary);
    const extractedDate = extractDateKey(`${summary} ${dateCell}`);
    rows.push({
      tempId:uid(),roomName,tag:finalTag,sender,summary,content:summary,
      messageDate:extractedDate||todayKey(),
      isTodo:/✅|todo|할일|예|yes|y/i.test(todoCell)||shouldBeTodo(summary,finalTag),
    });
  }
  return rows;
}

function parseRawKakao(text,roomName) {
  return text.split('\n').map(l=>l.trim()).filter(l=>l.length>=4).map(line=>{
    const match=line.match(/^(.{1,18}?)[\s:：-]+(.+)$/);
    const sender=match?match[1].replace(/\[|\]/g,'').trim():'';
    const body=match?match[2].trim():line;
    const tag=guessTag(body);
    return {
      tempId:uid(),roomName,tag,sender,
      summary:body.length>70?body.slice(0,70)+'...':body,
      content:body,messageDate:extractDateKey(body),isTodo:shouldBeTodo(body,tag),
    };
  });
}

function guessTag(text) {
  if(/공지|전달|안내|조회|회의/.test(text)) return '공지사항';
  if(/기준|시방|도면|승인도|상세도|KCS|KS|규격/.test(text)) return '시공기준';
  if(/자재|발주|반입|입고|납품|수량|출고/.test(text)) return '자재발주';
  if(/품질|검측|시험|검사|사진대장|확인서/.test(text)) return '품질관리';
  if(/안전|난간|조회|위험|보호구|작업허가|위험성/.test(text)) return '안전관리';
  if(/하자|보수|누수|균열|들뜸|탈락|AS|A\/S/.test(text)) return '하자보수';
  if(/내일|모레|오늘|이번\s*주|다음\s*주|\d{1,2}\/\d{1,2}|\d{1,2}월\s*\d{1,2}일|오전|오후/.test(text)) return '일정';
  if(/해주세요|바랍니다|확인|공유|정리|보고|조치/.test(text)) return '지시사항';
  return '기타';
}

function shouldBeTodo(text,tag) {
  if(['지시사항','자재발주','품질관리','안전관리','하자보수'].includes(normalizeTag(tag))) return true;
  return /까지|요청|해주세요|바랍니다|확인|공유|정리|보고|조치/.test(text);
}

function stripEmoji(v) { return String(v||'').replace(/[📋📐🧱🧪⚠️🔧📅📢📌✅]/g,'').trim(); }

function extractDateKey(text) {
  const now=new Date();
  if(/내일/.test(text)) return addDaysKey(1);
  if(/모레/.test(text)) return addDaysKey(2);
  const slash=text.match(/(\d{1,2})\/(\d{1,2})/);
  if(slash) return dateKey(new Date(now.getFullYear(),Number(slash[1])-1,Number(slash[2])));
  const kor=text.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if(kor) return dateKey(new Date(now.getFullYear(),Number(kor[1])-1,Number(kor[2])));
  const iso=text.match(/(20\d{2})-(\d{1,2})-(\d{1,2})/);
  if(iso) return dateKey(new Date(Number(iso[1]),Number(iso[2])-1,Number(iso[3])));
  return null;
}

function exportBackup() {
  const data={version:2,exportedAt:new Date().toISOString(),rooms,messages,todos,starredRooms};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`현장톡_백업_${todayKey()}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 백업 완료!');
}

function importBackup() {
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file) return;
    const text=await file.text();
    try{
      const data=JSON.parse(text);
      if(!data.rooms||!data.messages){showToast('❌ 올바른 백업 파일이 아니에요');return;}
      if(!confirm(`복원할까요?\n메시지 ${data.messages.length}건, 할일 ${data.todos?.length||0}건`)) return;
      rooms=data.rooms||[];messages=data.messages||[];todos=data.todos||[];starredRooms=data.starredRooms||[];
      save(); saveRoomsToSupabase(); saveMessagesToSupabase(); saveTodosToSupabase();
      setView('dashboard');showToast('✅ 복원 완료!');
    }catch{showToast('❌ 파일 읽기 오류');}
  };
  input.click();
}

function exportCSV() {
  if(!messages.length){showToast('내보낼 메시지가 없어요');return;}
  const headers=['태그','채팅방','발신자','요약','날짜','할일여부'];
  const rows=messages.map(m=>[m.tag||'',m.roomName||'',m.sender||'',m.summary||'',m.messageDate||'',m.isTodo?'할일':'']);
  const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`현장톡_${todayKey()}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast('📊 엑셀 파일 다운로드 완료!');
}

function applySpecificDate() {
  const dateStr = document.getElementById('specific-date-input').value;
  if(!dateStr) { showToast('날짜를 선택해주세요'); return; }
  const sharedText = document.getElementById('date-filter-modal').dataset.text;
  closeDateFilterModal();

  const target = new Date(dateStr);
  const lines = sharedText.split('\n');
  let currentDate = null;
  const filteredLines = [];

  for(const line of lines) {
    const dateMatch = line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(dateMatch) {
      currentDate = new Date(Number(dateMatch[1]), Number(dateMatch[2])-1, Number(dateMatch[3]));
    }
    if(currentDate && currentDate.toDateString() === target.toDateString()) {
      filteredLines.push(line);
    }
  }

  const filtered = filteredLines.join('\n').trim();
  setFilteredText(filtered, `${dateStr} 대화`);
}

function applyDateRange() {

  if(!start||!end) { showToast('시작일과 종료일을 선택해주세요'); return; }

  const endDate = new Date(end);
  endDate.setHours(23,59,59,999);
  const lines = sharedText.split('\n');
  let currentDate = null;
  const filteredLines = [];

  for(const line of lines) {
    const dateMatch = line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(dateMatch) {
      currentDate = new Date(Number(dateMatch[1]), Number(dateMatch[2])-1, Number(dateMatch[3]));
    }

      filteredLines.push(line);

function applyDateFilter(days) {
  const sharedText = document.getElementById('date-filter-modal').dataset.text;
  closeDateFilterModal();

  let filtered = sharedText;

  if(days !== 'all') {
    const lines = sharedText.split('\n');
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - Number(days));
    cutoff.setHours(0,0,0,0);

    let currentDate = null;
    const filteredLines = [];

    for(const line of lines) {
      const dateMatch = line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
      if(dateMatch) {
        currentDate = new Date(Number(dateMatch[1]), Number(dateMatch[2])-1, Number(dateMatch[3]));
      }
      if(!currentDate || currentDate >= cutoff) {
        filteredLines.push(line);
      }
    }
    filtered = filteredLines.join('\n').trim();
  }

  const label = days==='all'?'전체':days+'일치';
  setFilteredText(filtered, label);
}
