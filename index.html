async function extractLocationFromImage(file) {
  if(!geminiApiKey) return;
  showToast('📍 위치 정보 인식 중...');
  try {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${geminiApiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: file.type || 'image/jpeg', data: base64 } },
            { text: '이 사진에서 위치 정보와 불량 내용 텍스트를 찾아주세요. 위치는 "302동 903호", "302동 1코어 21층", "1동 101호 거실" 같은 형식입니다. 동 번호, 호수 또는 층/코어, 공간명(거실/안방/주방 등), 불량내용을 추출하세요. 반드시 아래 형식의 순수 JSON만 응답하고 다른 텍스트는 절대 포함하지 마세요. {"building":"302동","unit":"1코어 21층","space":null,"description":"배관제거"} 없는 항목은 null로 하세요.' }
          ]
        }],
        generationConfig: { temperature: 0, maxOutputTokens: 500 }
      })
    });
    const data = await response.json();
    if(data.error) {
      if(data.error.code === 429) showToast('⚠️ Gemini 사용량 한도 초과. 잠시 후 다시 시도해 주세요.');
      return;
    }
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
    if(!text) return;
    const stripped = text.replace(/```json|```/g, '').trim();
    const jsonMatch = stripped.match(/\{[\s\S]*?\}/);
    if(!jsonMatch) return;
    const loc = JSON.parse(jsonMatch[0]);
    if(loc.building) { const el = document.getElementById('punch-building'); if(el && !el.value) el.value = loc.building; }
    if(loc.unit) { const el = document.getElementById('punch-unit'); if(el && !el.value) el.value = loc.unit; }
    if(loc.space) { const el = document.getElementById('punch-space'); if(el && !el.value) el.value = loc.space; }
    if(loc.description) { const el = document.getElementById('punch-desc'); if(el && !el.value) el.value = loc.description; }
    if(loc.building || loc.unit || loc.description) showToast('📍 위치/내용 자동 입력됐어요!');
  } catch(e) { console.warn('위치 인식 실패:', e); }
}

async function pastePunchImage() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `punch_${Date.now()}.png`, { type });
          addPunchPendingImage(file);
          extractLocationFromImage(file);
          showToast('📋 이미지를 붙여넣었어요');
          return;
        }
      }
    }
    showToast('클립보드에 이미지가 없어요.');
  } catch(e) {
    showToast('붙여넣기 권한이 필요해요.');
  }
}

async function confirmPunchItem(editId) {
  const modal = document.getElementById('punch-add-modal');
  const building = document.getElementById('punch-building')?.value.trim();
  const unit = document.getElementById('punch-unit')?.value.trim();
  const space = document.getElementById('punch-space')?.value.trim();
  const location = [building, unit, space].filter(Boolean).join(' ');
  const desc = document.getElementById('punch-desc')?.value.trim();
  const memo = document.getElementById('punch-memo')?.value.trim();
  const due = document.getElementById('punch-due')?.value || null;
  const found = document.getElementById('punch-found')?.value || todayKey();
  const contractor = document.getElementById('punch-contractor')?.value || null;
  const catBtn = modal?.querySelector('.punch-cat-btn[style*="var(--primary)"]');
  const category = catBtn?.dataset.cat || getPunchCats().slice(-1)[0] || '기타';

  if(!building) { showToast('동을 입력해주세요.'); return; }

  const saveBtn = modal?.querySelector('.btn-primary');
  if(saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

  try {
    let punchId = editId;

    if(editId) {
      await updatePunchItem(editId, { building, unit, space, location, description: desc, memo, due_date: due, found_date: found, contractor, category });
      showToast('✅ 수정됐어요.');
    } else {
      await savePunchItem({ building, unit, space, location, description: desc, memo, due_date: due, found_date: found, contractor, category, status: '미조치' });
      punchId = punchItems[0]?.id;
      showToast('✅ 추가됐어요.');
    }

    // 대기 중인 이미지들 업로드
    const pendingFiles = pendingPunchImages.filter(Boolean);
    if(pendingFiles.length && punchId) {
      for(const item of pendingFiles) {
        const result = await uploadPunchImage(item.file);
        await savePunchImage(punchId, result.filePath, result.thumbPath);
      }
      pendingPunchImages = [];
    }

    // 대표 썸네일 업데이트 (첫 번째 이미지로)
    const imgs = punchImages[punchId] || [];
    if(imgs.length > 0) {
      await updatePunchItem(punchId, { image_path: imgs[0].image_path, thumb_path: imgs[0].thumb_path });
    }

    modal?.remove();
    renderPunchView(document.getElementById('main-content'));
  } catch(e) {
    showToast('저장 실패: ' + e.message);
    if(saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장'; }
  }
}

function sharePunchItem(p) {
  const loc = [p.building, p.unit, p.space].filter(Boolean).join(' ') || p.location || '';
  const lines = [
    '[펀치리스트]',
    `📍 ${loc}`,
    `🔧 ${p.category||''}${p.contractor?' | '+p.contractor:''}`,
  ];
  if(p.description) lines.push(`📋 ${p.description}`);
  if(p.found_date) lines.push(`📅 발견일: ${p.found_date}`);
  if(p.due_date) lines.push(`⏰ 조치기한: ${p.due_date}`);
  lines.push(`🔴 상태: ${p.status||'미조치'}`);

  const text = lines.join('\n');
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 클립보드에 복사됐어요. 카카오톡에 붙여넣기 하세요!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 클립보드에 복사됐어요. 카카오톡에 붙여넣기 하세요!');
  }
}

function renderPunchView(el) {
  if(!el) return;
  if(punchItems.length === 0) {
    loadPunchItems().then(() => _renderPunchView(el));
    return;
  }
  _renderPunchView(el);
}

function _renderPunchView(el) {
  const total = punchItems.length;
  const done = punchItems.filter(p => p.status === '조치완료').length;
  const pending = total - done;
  const rate = total ? Math.round(done / total * 100) : 0;

  // 필터 적용
  let filtered = punchItems;
  if(punchFilter === '미조치') filtered = filtered.filter(p => p.status !== '조치완료');
  if(punchFilter === '조치완료') filtered = filtered.filter(p => p.status === '조치완료');
  if(punchCatFilter !== '전체') filtered = filtered.filter(p => p.category === punchCatFilter);
  if(punchContractorFilter !== '전체') filtered = filtered.filter(p => p.contractor === punchContractorFilter);

  // 동 목록 (building 필드 우선, 없으면 location 첫 단어)
  const buildings = [...new Set(punchItems.map(p => p.building || p.location?.split(' ')[0]).filter(Boolean))].sort();
  if(punchLocationFilter !== '전체') filtered = filtered.filter(p => (p.building || p.location?.split(' ')[0]) === punchLocationFilter);

  // 협력사 목록
  const contractors = [...new Set(punchItems.map(p => p.contractor).filter(Boolean))].sort();

  const pendingItems = filtered.filter(p => p.status !== '조치완료');
  const doneItems = filtered.filter(p => p.status === '조치완료');

  function punchCard(p) {
    const isDone = p.status === '조치완료';
    const locLabel = [p.building, p.unit, p.space].filter(Boolean).join(' ') || p.location || '';
    const imgPath = isDone && p.after_thumb_path ? p.after_thumb_path : (p.thumb_path || p.image_path);
    const imgCount = (punchImages[p.id] || []).length;
    return `
      <div style="background:var(--card);border:0.5px solid var(--border2);border-radius:14px;overflow:hidden;cursor:pointer;${isDone?'opacity:0.6':''}" onclick="openPunchAddModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">

          ${imgPath ? `<img data-path="${imgPath}" class="lib-thumb" style="width:100%;height:100%;object-fit:cover" onerror="if(this.dataset.loaded)this.style.display='none'">` : `<span style="font-size:32px">📷</span>`}

          ${!isDone ? `<button onclick="event.stopPropagation();openPunchCompleteModal('${p.id}')" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer">미조치</button>` : `<button onclick="event.stopPropagation();if(confirm('조치완료를 취소할까요?'))togglePunchStatus('${p.id}')" style="position:absolute;top:8px;right:8px;background:#10b981;color:#fff;border:none;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer">✅ 완료</button>`}
          ${imgCount > 1 ? `<div style="position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">📷 ${imgCount}</div>` : ''}
          ${isDone && p.after_thumb_path ? `<div style="position:absolute;bottom:6px;right:6px;background:rgba(16,185,129,.8);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">after</div>` : ''}

          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
            <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:0.5px solid var(--border2)">${p.category||'기타'}</span>
            ${p.contractor?`<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#ede9fe;color:#7c3aed">${p.contractor}</span>`:''}
            ${p.due_date?`<span style="font-size:11px;color:var(--muted)">${p.due_date}</span>`:''}
          </div>
          <div style="font-size:13px;font-weight:500;color:var(--text);${isDone?'text-decoration:line-through':''}">${p.description||'내용 없음'}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
            <div style="font-size:11px;color:var(--muted)">${p.found_date||''}</div>
            <button onclick="event.stopPropagation();sharePunchItem(${JSON.stringify(p).replace(/"/g,'&quot;')})" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:6px;border:0.5px solid var(--border2)">공유 📤</button>
          </div>
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div style="padding:16px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
        <div style="background:var(--surface);border-radius:10px;padding:12px 14px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">전체</div><div style="font-size:22px;font-weight:500;color:var(--text)">${total}</div></div>
        <div style="background:var(--surface);border-radius:10px;padding:12px 14px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">미조치</div><div style="font-size:22px;font-weight:500;color:#ef4444">${pending}</div></div>
        <div style="background:var(--surface);border-radius:10px;padding:12px 14px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">조치완료</div><div style="font-size:22px;font-weight:500;color:#10b981">${done}</div></div>
        <div style="background:var(--surface);border-radius:10px;padding:12px 14px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">완료율</div><div style="font-size:22px;font-weight:500;color:#f59e0b">${rate}%</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
        ${['전체','미조치','조치완료'].map(f=>`<div onclick="punchFilter='${f}';renderPunchView(document.getElementById('main-content'))" style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid ${punchFilter===f?'var(--primary)':'var(--border2)'};background:${punchFilter===f?'var(--primary)':'var(--surface)'};color:${punchFilter===f?'#fff':'var(--muted)'}">${f}</div>`).join('')}
        <select onchange="punchLocationFilter=this.value;renderPunchView(document.getElementById('main-content'))" style="font-size:12px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text)">
          <option value="전체">전체 동</option>
          ${buildings.map(l=>`<option value="${l}" ${punchLocationFilter===l?'selected':''}>${l}</option>`).join('')}
        </select>
        <select onchange="punchCatFilter=this.value;renderPunchView(document.getElementById('main-content'))" style="font-size:12px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text)">
          <option value="전체">전체 공종</option>
          ${getPunchCats().map(c=>`<option value="${c}" ${punchCatFilter===c?'selected':''}>${c}</option>`).join('')}
        </select>
        ${contractors.length ? `<select onchange="punchContractorFilter=this.value;renderPunchView(document.getElementById('main-content'))" style="font-size:12px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text)">
          <option value="전체">전체 협력사</option>
          ${contractors.map(c=>`<option value="${c}" ${punchContractorFilter===c?'selected':''}>${c}</option>`).join('')}
        </select>` : ''}
        <button class="btn-primary" style="padding:6px 14px;font-size:12px;margin-left:auto" onclick="openPunchAddModal()">+ 추가</button>
      </div>
      ${pendingItems.length ? `
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px">미조치 ${pendingItems.length}건</div>
        ${(() => {
          const sorted = [...pendingItems].sort((a,b) => (b.found_date||b.created_at||'').localeCompare(a.found_date||a.created_at||''));
          const groups = {};
          sorted.forEach(p => {
            const d = p.found_date || p.created_at?.slice(0,10) || '날짜 없음';
            if(!groups[d]) groups[d] = [];
            groups[d].push(p);
          });
          return Object.keys(groups).map(date => `
            <div style="margin-bottom:1.2rem">
              <div style="font-size:11px;font-weight:700;color:var(--primary);padding:4px 0;border-bottom:1px solid var(--border2);margin-bottom:8px">📅 ${date}</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
                ${groups[date].map(punchCard).join('')}
              </div>
            </div>
          `).join('');
        })()}` : ''}
      ${doneItems.length ? `
        <div style="height:0.5px;background:var(--border2);margin:0.5rem 0 1rem"></div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px">조치완료 ${doneItems.length}건</div>
        ${(() => {
          const sorted = [...doneItems].sort((a,b) => (b.found_date||b.created_at||'').localeCompare(a.found_date||a.created_at||''));
          const groups = {};
          sorted.forEach(p => {
            const d = p.found_date || p.created_at?.slice(0,10) || '날짜 없음';
            if(!groups[d]) groups[d] = [];
            groups[d].push(p);
          });
          return Object.keys(groups).map(date => `
            <div style="margin-bottom:1.2rem">
              <div style="font-size:11px;font-weight:700;color:#10b981;padding:4px 0;border-bottom:1px solid var(--border2);margin-bottom:8px">📅 ${date}</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
                ${groups[date].map(punchCard).join('')}
              </div>
            </div>
          `).join('');
        })()}` : ''}
      ${!pendingItems.length && !doneItems.length ? `
        <div style="text-align:center;padding:60px 0;color:var(--muted)">
          <div style="font-size:32px;margin-bottom:12px">📌</div>
          <div style="font-size:14px;font-weight:500">펀치리스트가 없어요</div>
          <div style="font-size:12px;margin-top:6px">+ 추가 버튼으로 첫 항목을 등록해보세요</div>

  `;

  loadLibraryThumbs();
}
let personalNotes = [];
const PERSONAL_CATS_DEFAULT = ['투자기록','쇼핑목록','할일','약속','메모'];
const PERSONAL_CAT_COLORS = {투자기록:'#10b981',쇼핑목록:'#f59e0b',할일:'#3b82f6',약속:'#8b5cf6',메모:'#6b7280'};
let personalCatFilter = '전체';
let pendingPersonalImageFile = null;
let pendingPersonalImageRemoved = false;

function getPersonalCats() {
  return appSettings.personalCategories || PERSONAL_CATS_DEFAULT;
}

async function loadPersonalNotes() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_notes?user_id=eq.${userId}&order=created_at.desc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(res.ok) personalNotes = await res.json();
  } catch(e) { console.warn('personal notes load error', e); }
}

// 개인노트 이미지 업로드 (원본 + 작은 썸네일 함께 저장 - Free 플랜에서도 동작)
async function uploadPersonalNoteImage(file) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const ext = file.name.split('.').pop() || 'png';
  const baseName = `pn_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `${baseName}.${ext}`;

  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': file.type },
    body: file
  });
  if(!uploadRes.ok) throw new Error('이미지 업로드 실패');

  return filePath;
}

async function getPersonalNoteImageUrl(filePath) {
  let url = await getLibraryThumbUrl(filePath); // Pro 플랜: 서버 transform 축소본
  if(!url) url = await getLibraryFileUrl(filePath); // 폴백: 원본
  return url;
}

async function savePersonalNote(note) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  const payload = { user_id: userId, title: note.title, memo: note.memo||'', category: note.category||'메모', due_date: note.due_date||null, image_path: note.image_path||null, done: false };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_notes`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(payload)
  });
  if(res.ok) { const rows = await res.json(); personalNotes.unshift(rows[0]); }
}

async function updatePersonalNote(id, patch) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_notes?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(patch)
  });
  personalNotes = personalNotes.map(n => n.id === id ? {...n, ...patch} : n);
}

async function deletePersonalNote(id) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_notes?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  personalNotes = personalNotes.filter(n => n.id !== id);
}

async function togglePersonalDone(id) {
  const note = personalNotes.find(n => n.id === id);
  if(!note) return;
  const done = !note.done;
  await updatePersonalNote(id, { done, done_at: done ? new Date().toISOString() : null });
  renderPersonalView(document.getElementById('main-content'));
}

function openPersonalAddModal(editNote = null) {
  const existing = document.getElementById('personal-add-modal');
  if(existing) existing.remove();
  pendingPersonalImageFile = null;
  pendingPersonalImageRemoved = false;
  const selectedCat = editNote?.category || '메모';
  const modal = document.createElement('div');
  modal.id = 'personal-add-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--card);border-radius:14px;width:100%;max-width:420px;padding:20px">
      <div style="font-size:15px;font-weight:700;margin-bottom:16px">${editNote ? '노트 수정' : '노트 추가'}</div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:5px">카테고리</div>
        <div id="pn-cat-wrap" style="display:flex;gap:6px;flex-wrap:wrap">
          ${getPersonalCats().map(c=>`
            <div data-cat="${c}" class="pn-cat-btn" style="padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid ${c===selectedCat?'var(--primary)':'var(--border2)'};background:${c===selectedCat?'var(--primary)':'var(--surface)'};color:${c===selectedCat?'#fff':'var(--muted)'}">${c}</div>
          `).join('')}
        </div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:5px">제목 *</div>
        <input id="pn-title" class="modal-input" value="${editNote?.title||''}" placeholder="제목을 입력하세요" style="width:100%">
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:5px">내용</div>
        <textarea id="pn-memo" class="modal-input" style="width:100%;height:120px;resize:none" placeholder="내용을 입력하세요">${editNote?.memo||''}</textarea>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:5px">이미지 (선택)</div>
        <input type="file" id="pn-image-input" accept="image/*" style="display:none" onchange="handlePersonalImageSelect(event)">
        <div id="pn-image-preview-wrap">
          ${editNote?.image_path ? `
            <div style="position:relative;display:inline-block">
              <img id="pn-image-preview" src="" data-thumb-path="${editNote.image_path}" class="lib-thumb" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border2);display:block">
              <button onclick="removePersonalImage()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px">✕</button>
            </div>
          ` : `
            <div style="display:flex;gap:6px">
              <button class="btn-ghost" style="flex:1;padding:10px;font-size:12px" onclick="document.getElementById('pn-image-input').click()">📷 이미지 선택</button>
              <button class="btn-ghost" style="flex:1;padding:10px;font-size:12px" onclick="pastePersonalImage()">📋 붙여넣기</button>
            </div>
          `}
        </div>
      </div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:5px">기한 (선택)</div>
        <input id="pn-due" type="date" class="modal-input" value="${editNote?.due_date||''}" style="width:100%">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" style="flex:1" onclick="document.getElementById('personal-add-modal').remove()">취소</button>
        <button class="btn-primary" style="flex:2" onclick="confirmPersonalNote('${editNote?.id||''}')">저장</button>
      </div>
    </div>
  `;
  modal.querySelectorAll('.pn-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      modal.querySelectorAll('.pn-cat-btn').forEach(b => {
        b.style.background='var(--surface)'; b.style.color='var(--muted)'; b.style.borderColor='var(--border2)';
      });
      btn.style.background='var(--primary)'; btn.style.color='#fff'; btn.style.borderColor='var(--primary)';
    });
  });
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  modal.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if(!items) return;
    for(const item of items) {
      if(item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if(!file) continue;
        pendingPersonalImageFile = file;
        pendingPersonalImageRemoved = false;
        const reader = new FileReader();
        reader.onload = ev => {
          const wrap = document.getElementById('pn-image-preview-wrap');
          if(wrap) {
            wrap.innerHTML = `
              <div style="position:relative;display:inline-block">
                <img src="${ev.target.result}" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border2);display:block">
                <button onclick="removePersonalImage()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px">✕</button>
              </div>
            `;
          }
        };
        reader.readAsDataURL(file);
        showToast('📋 이미지를 붙여넣었어요');
        break;
      }
    }
  });
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('pn-title')?.focus(), 50);

  // 수정 모드에서 기존 이미지 미리보기 로드
  if(editNote?.image_path) {
    getPersonalNoteImageUrl(editNote.image_path).then(url => {
      const img = document.getElementById('pn-image-preview');
      if(img && url) img.src = url;
    });
  }
}

async function pastePersonalImage() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `paste_${Date.now()}.png`, { type });
          pendingPersonalImageFile = file;
          pendingPersonalImageRemoved = false;
          const reader = new FileReader();
          reader.onload = ev => {
            const wrap = document.getElementById('pn-image-preview-wrap');
            if(wrap) {
              wrap.innerHTML = `
                <div style="position:relative;display:inline-block">
                  <img src="${ev.target.result}" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border2);display:block">
                  <button onclick="removePersonalImage()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px">✕</button>
                </div>
              `;
            }
          };
          reader.readAsDataURL(file);
          showToast('📋 이미지를 붙여넣었어요');
          return;
        }
      }
    }
    showToast('클립보드에 이미지가 없어요. 캡처 후 다시 시도해주세요.');
  } catch(e) {
    showToast('붙여넣기 권한이 필요해요. 브라우저에서 허용해주세요.');
  }
}

function handlePersonalImageSelect(e) {
  const file = e.target.files?.[0];
  if(!file) return;
  pendingPersonalImageFile = file;
  pendingPersonalImageRemoved = false;
  const reader = new FileReader();
  reader.onload = ev => {
    const wrap = document.getElementById('pn-image-preview-wrap');
    if(wrap) {
      wrap.innerHTML = `
        <div style="position:relative;display:inline-block">
          <img src="${ev.target.result}" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border2);display:block">

        </div>
      `;
    }
  };
  reader.readAsDataURL(file);
}

async function confirmPersonalNote(editId) {
  const modal = document.getElementById('personal-add-modal');
  const title = document.getElementById('pn-title')?.value.trim();
  const memo = document.getElementById('pn-memo')?.value.trim();
  const due = document.getElementById('pn-due')?.value || null;
  const catBtn = modal?.querySelector('.pn-cat-btn[style*="var(--primary)"]');
  const category = catBtn?.dataset.cat || '메모';
  if(!title) { showToast('제목을 입력해주세요.'); return; }

  const saveBtn = modal?.querySelector('.btn-primary');
  if(saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

  try {
    let imagePath = undefined; // undefined면 patch에서 제외 (기존 이미지 유지)
    if(pendingPersonalImageFile) {
      imagePath = await uploadPersonalNoteImage(pendingPersonalImageFile);
    } else if(pendingPersonalImageRemoved) {
      imagePath = null;
    }

    if(editId) {
      const patch = { title, memo, due_date: due||null, category };
      if(imagePath !== undefined) patch.image_path = imagePath;
      await updatePersonalNote(editId, patch);
      showToast('✅ 수정됐어요.');
    } else {
      await savePersonalNote({ title, memo, due_date: due||null, category, image_path: imagePath || null });
      showToast('✅ 추가됐어요.');
    }
    modal?.remove();
    renderPersonalView(document.getElementById('main-content'));
  } catch(e) {
    showToast('저장에 실패했어요: ' + e.message);
    if(saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장'; }
  }
}

function renderPersonalCalendar() {
  const y = pCalYear, mo = pCalMonth;
  const firstDay = new Date(y, mo, 1).getDay();
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const cells = [];
  for(let i=0; i<firstDay; i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(y, mo, d));

  const upcomingEvs = personalEvents
    .filter(e => e.date >= todayKey())
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, 5);

  return `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="calendar-card" style="border:none;padding:0;background:transparent">
        <div class="calendar-head">
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="pCalNav(-1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">‹</button>
            <div class="calendar-title">${y}년 ${monthNames[mo]}</div>
            <button onclick="pCalNav(1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">›</button>
          </div>
          <button onclick="pCalNav(0)" style="height:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 12px">오늘</button>
        </div>
        <div class="calendar-grid" id="p-cal-grid">
          ${['일','월','화','수','목','금','토'].map(d=>`<div class="day-label">${d}</div>`).join('')}
          ${cells.map((date, i) => {
            if(!date) return '<div class="cal-cell" data-dk=""></div>';
            const dk = dateKey(date);
            const dayEvs = personalEvents.filter(e => e.date === dk || (e.end_date && e.date <= dk && e.end_date >= dk));
            const isToday = isSameDay(date, new Date());
            const isSun = i % 7 === 0;
            const allDayCustom = getCustomEventsForDate(dk);
            const dayPersonalEvs = personalEvents.filter(e => e.date === dk);
            const isOffDay = [...allDayCustom, ...dayPersonalEvs].some(e => /^휴무/.test(e.title?.trim()));
            const isWorkSat = allDayCustom.some(e => /^근무/.test(e.title?.trim())) && date.getDay() === 6;
            const holiday = appSettings.showHoliday !== false ? getHoliday(y, mo, date.getDate()) : null;
            const singleEvs = dayEvs.filter(e => !e.end_date||e.end_date===e.date);
            return `<div class="cal-cell ${isToday?'today':''} ${isSun?'sunday':''} ${holiday?'holiday':''} ${isOffDay?'off-day':''} ${singleEvs.length?'has-custom':''}" data-dk="${dk}" onclick="openPersonalEventModal('${dk}')">
              <div class="cal-date" style="${isOffDay?'color:#ef4444':''}">
                <span>${date.getDate()}</span>
                ${isOffDay?'<span style="font-size:11px;color:#ef4444;font-weight:900;margin-left:3px">휴무</span>':''}
                ${isWorkSat?'<span style="font-size:11px;color:#0f766e;font-weight:900;margin-left:3px">근무</span>':''}
                ${holiday?`<span class="holiday-name" style="display:inline;margin-left:3px">${holiday}</span>`:''}
              </div>

          <button class="btn-primary" style="font-size:11px;padding:5px 10px" onclick="openPersonalEventModal('${todayKey()}')">+ 추가</button>
        </div>

          <div class="mini-schedule" style="cursor:pointer;border-left-color:${e.color||'#3b82f6'}" onclick="openPersonalEventModal('${e.date}','${e.id}')">

function _renderPersonalView(el) {
  if(!el) return;
  const today = todayKey();
  const thisWeekEnd = (() => {
    const d = new Date();
    const kst = new Date(d.getTime() + 9*60*60*1000);
    kst.setDate(kst.getDate() + (7 - kst.getDay()));
    return kst.toISOString().slice(0,10);
  })();
  const filtered = personalCatFilter === '전체' ? personalNotes : personalNotes.filter(n => n.category === personalCatFilter);
  const undone = filtered.filter(n => !n.done);
  const done = filtered.filter(n => n.done);
  const overdue = undone.filter(n => n.due_date && n.due_date < today);
  const dueToday = undone.filter(n => n.due_date === today);
  const dueWeek = undone.filter(n => n.due_date && n.due_date > today && n.due_date <= thisWeekEnd);
  const dueFuture = undone.filter(n => n.due_date && n.due_date > thisWeekEnd);
  const noDue = undone.filter(n => !n.due_date);

  function noteCard(n) {
    const catColor = PERSONAL_CAT_COLORS[n.category] || '#6b7280';
    const isOverdue = n.due_date && n.due_date < today && !n.done;
    const dueTxt = n.due_date ? (isOverdue ? `⚠️ 기한 지남` : n.due_date) : '';
    return `
      <div style="background:var(--card);border:0.5px solid var(--border2);border-radius:14px;padding:16px;min-height:180px;display:flex;flex-direction:column;cursor:pointer;${n.done?'opacity:0.5':''}" onclick="openPersonalEditModal('${n.id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:${catColor}22;color:${catColor}">${n.category}</span>
          <div style="display:flex;align-items:center;gap:6px">
            ${dueTxt?`<span style="font-size:11px;color:${isOverdue?'#ef4444':'var(--muted)'};font-weight:${isOverdue?'600':'400'}">${dueTxt}</span>`:''}
            <button onclick="event.stopPropagation();togglePersonalDone('${n.id}')" style="width:16px;height:16px;border-radius:50%;border:1.5px solid ${n.done?catColor:'var(--border2)'};background:${n.done?catColor:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;padding:0">
              ${n.done?'<svg width="8" height="6" viewBox="0 0 8 6"><polyline points="1,3 3,5 7,1" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>':''}
            </button>
            <button onclick="event.stopPropagation();if(confirm('삭제할까요?')){deletePersonalNote('${n.id}').then(()=>renderPersonalView(document.getElementById('main-content')))}" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0;line-height:1">✕</button>
          </div>
        </div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;${n.done?'text-decoration:line-through':''}">${n.title}</div>
        ${n.image_path ? `<img data-path="${n.image_path}" class="lib-thumb" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;background:var(--surface);cursor:zoom-in" onclick="event.stopPropagation();openPersonalImageViewer('${n.image_path}')" onerror="if(this.dataset.loaded)this.style.display='none'">` : ''}
        ${n.memo?`<div style="font-size:12px;color:var(--muted);line-height:1.6;flex:1">${n.memo.replace(/\n/g,'<br>')}</div>`:'<div style="flex:1"></div>'}
      </div>`;
  }

  function section(label, notes, color='var(--muted)') {
    if(!notes.length) return '';
    return `
      <div style="margin-bottom:1.5rem">
        <div style="font-size:11px;font-weight:600;color:${color};margin-bottom:10px;display:flex;justify-content:space-between">
          <span>${label}</span><span>${notes.length}건</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
          ${notes.map(noteCard).join('')}
        </div>
      </div>`;
  }

  const isEmpty = personalNotes.length === 0;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:12px 16px;align-items:start">
      <div>
        ${renderPersonalCalendar()}
      </div>
      <div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px">
          ${['전체',...getPersonalCats()].map(c=>`
            <div onclick="personalCatFilter='${c}';renderPersonalView(document.getElementById('main-content'))"
              style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid ${personalCatFilter===c?'var(--primary)':'var(--border2)'};background:${personalCatFilter===c?'var(--primary)':'var(--surface)'};color:${personalCatFilter===c?'#fff':'var(--muted)'}">
              ${c}
            </div>`).join('')}
          <button class="btn-primary" onclick="openPersonalAddModal()" style="padding:4px 12px;font-size:12px;margin-left:auto">+ 추가</button>
        </div>
        ${isEmpty
          ? `<div style="text-align:center;padding:40px 0;color:var(--muted)">
              <div style="font-size:28px;margin-bottom:10px">📒</div>
              <div style="font-size:13px;font-weight:500">아직 노트가 없어요</div>
            </div>`
          : `${section('기한 지남', overdue, '#ef4444')}
             ${section('오늘', dueToday, '#f59e0b')}
             ${section('이번 주', dueWeek, 'var(--primary)')}
             ${section('예정', dueFuture)}
             ${section('기한 없음', noDue)}
             ${done.length?`<div style="height:0.5px;background:var(--border2);margin:1rem 0"></div>${section('완료', done)}`:''}`
        }
      </div>
    </div>
    <style>
      @media(max-width:700px){
        #main-content > div { grid-template-columns:1fr!important; }
      }
    </style>
  `;
  requestAnimationFrame(() => drawPersonalRangeBars(pCalYear, pCalMonth));
  loadLibraryThumbs();
}

// ===== 기존 도면 썸네일 일괄 생성 =====
async function startThumbMigration() {
  const statusEl = document.getElementById('thumb-migration-status');
  const progressWrap = document.getElementById('thumb-migration-progress-wrap');
  const bar = document.getElementById('thumb-migration-bar');
  const label = document.getElementById('thumb-migration-label');
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;

  statusEl.textContent = '대상 도면 확인 중...';
  progressWrap.style.display = 'block';

  // thumb_path 없는 도면 전체 조회
  const res = await fetch(`${SUPABASE_URL}/rest/v1/library_docs?thumb_path=is.null&select=id,file_path,doc_type`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(!res.ok) { statusEl.textContent = '대상 조회 실패'; return; }
  const targets = await res.json();

  if(targets.length === 0) {
    statusEl.textContent = '✅ 모든 도면에 이미 썸네일이 있어요.';
    progressWrap.style.display = 'none';
    return;
  }

  statusEl.textContent = `${targets.length}장 처리 중...`;
  let done = 0, failed = 0;

  for(const doc of targets) {
    try {
      // 1. 원본 이미지 다운로드
      const fileUrl = await getLibraryFileUrl(doc.file_path);
      if(!fileUrl) { failed++; continue; }
      const imgRes = await fetch(fileUrl);
      if(!imgRes.ok) { failed++; continue; }
      const blob = await imgRes.blob();
      const file = new File([blob], doc.file_path, { type: blob.type || 'image/png' });

      // 2. 클라이언트에서 240x240 리사이즈
      const thumbBlob = await resizeImageToThumb(file);
      if(!thumbBlob) { failed++; continue; }

      // 3. 썸네일 업로드
      const thumbPath = `thumb_${doc.file_path.replace(/\.[^.]+$/, '')}.jpg`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
        body: thumbBlob
      });
      if(!uploadRes.ok) { failed++; continue; }

      // 4. DB 업데이트
      await fetch(`${SUPABASE_URL}/rest/v1/library_docs?id=eq.${doc.id}`, {
        method: 'PATCH',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ thumb_path: thumbPath })
      });

      done++;
    } catch(e) {
      console.warn('썸네일 마이그레이션 실패:', doc.file_path, e);
      failed++;
    }

    const progress = Math.round(((done + failed) / targets.length) * 100);
    bar.style.width = progress + '%';
    label.textContent = `${done + failed} / ${targets.length} 처리됨 (성공 ${done}, 실패 ${failed})`;
  }

  statusEl.textContent = `✅ 완료! 성공 ${done}장, 실패 ${failed}장`;
  if(failed > 0) statusEl.textContent += ' (실패한 도면은 원본으로 표시돼요)';

  // 캐시 초기화해서 새 썸네일이 바로 반영되도록
  libThumbUrlCache = {};
  localStorage.removeItem(LIB_THUMB_CACHE_KEY);
}

async function uploadGalleryPhoto(folderId, file, title='') {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const resized = await resizeImage(file, 1920);
  const baseName = `gallery_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `gallery/${baseName}.jpg`;
  const thumbPath = `gallery/thumb_${baseName}.jpg`;

  await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
    body: resized
  });

  const thumbBlob = await resizeImageToThumb(file);
  if(thumbBlob) {
    await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
      body: thumbBlob
    });
  }

  await sbFetch('gallery_photos', 'POST', [{ folder_id: folderId, file_path: filePath, thumb_path: thumbBlob ? thumbPath : null, memo: '', title: title||'' }]);
  await loadGalleryPhotos(folderId);
  renderGalleryView(document.getElementById('main-content'));
}

async function resizeImage(file, maxSize) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxSize || h > maxSize) {
        if(w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/jpeg', 0.85);
    };
    img.src = url;
  });
}

function searchGalleryPhotos(query) {
  const resultsEl = document.getElementById('gallery-search-results');
  if(!resultsEl) return;
  if(!query.trim()) { resultsEl.style.display = 'none'; resultsEl.innerHTML = ''; return; }
  // 전체 폴더 사진에서 검색
  const q = query.toLowerCase();
  const results = [];
  Object.entries(galleryPhotos).forEach(([folderId, photos]) => {
    const folder = galleryFolders.find(f => f.id === folderId);
    photos.filter(p => (p.title||'').toLowerCase().includes(q)).forEach(p => {
      results.push({...p, folderName: folder?.name || '미분류'});
    });
  });

  if(results.length === 0) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:12px 0">검색 결과가 없어요.</div>`;
    return;
  }

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${results.length}장 검색됨</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">
      ${results.map(p => `
        <div style="position:relative;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--surface)" onclick="openGalleryPhotoViewer('${p.file_path}')">
          <div style="aspect-ratio:1">
            <img data-path="${p.thumb_path||p.file_path}" class="lib-thumb" style="width:100%;height:100%;object-fit:cover">
          </div>
          <div style="padding:4px 6px;background:var(--card)">
            ${p.title ? `<div style="font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.title}</div>` : ''}
            <div style="font-size:10px;color:var(--muted)">${p.folderName}</div>
          </div>
        </div>
      `).join('')}
    </div>`;

  // lazy load
  setTimeout(() => {
    resultsEl.querySelectorAll('img.lib-thumb[data-path]').forEach(img => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(async e => {
          if(e.isIntersecting) {
            observer.disconnect();
            const path = img.dataset.path;
            const cacheKey = 'hj_thumb_cache_v1_' + path;
            const cached = localStorage.getItem(cacheKey);
            if(cached) { img.src = cached; return; }
            const url = await getLibraryFileUrl(path);
            if(url) { img.src = url; localStorage.setItem(cacheKey, url); }
          }
        });
      });
      observer.observe(img);
    });
  }, 50);
}

function initGalleryFolderDrag() {
  const grid = document.getElementById('gallery-folder-grid');
  if(!grid) return;
  let dragSrc = null;
  grid.querySelectorAll('.gallery-folder-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => item.style.opacity = '0.4', 0);
    });
    item.addEventListener('dragend', () => { item.style.opacity = '1'; });
    item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    item.addEventListener('drop', async e => {
      e.preventDefault();
      e.stopPropagation();
      if(dragSrc === item) return;
      const items = [...grid.querySelectorAll('.gallery-folder-item')];
      const srcIdx = items.indexOf(dragSrc);
      const tgtIdx = items.indexOf(item);
      if(srcIdx < tgtIdx) item.after(dragSrc); else item.before(dragSrc);
      // 순서 저장
      const newOrder = [...grid.querySelectorAll('.gallery-folder-item')].map((el,i) => ({id: el.dataset.id, sort_order: i}));
      galleryFolders = newOrder.map(o => galleryFolders.find(f => f.id === o.id)).filter(Boolean);
      await Promise.all(newOrder.map(o => sbFetch('gallery_folders', 'PATCH', {sort_order: o.sort_order}, `?id=eq.${o.id}`)));
    });
  });
}

function _renderGalleryFolderDetail(el, folderId) {
  const folder = galleryFolders.find(f => f.id === folderId);
  const photos = galleryPhotos[folderId] || [];
  el.innerHTML = `
    <div style="max-width:900px;margin:0 auto;padding:0 0 40px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button onclick="currentGalleryFolder=null;renderGalleryView(document.getElementById('main-content'))" style="background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text)">← 목록</button>
        <span style="font-size:15px;font-weight:700;color:var(--text)">🗂️ ${folder?.name||''}</span>
      </div>

      ${photos.length === 0 ? `<div style="text-align:center;color:var(--muted);padding:60px 0;font-size:14px">사진이 없어요.</div>` : `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">
        ${photos.map(p => `
          <div style="position:relative;border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--border)">
            <div style="aspect-ratio:1;cursor:pointer" onclick="openGalleryPhotoViewer('${p.file_path}')">
              <img data-path="${p.thumb_path||p.file_path}" class="lib-thumb" style="width:100%;height:100%;object-fit:cover">
            </div>
            <div style="padding:4px 8px 4px 8px;display:flex;align-items:center;gap:4px;min-height:26px">
              <span style="flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.title||''}</span>
              <button onclick="event.stopPropagation();openGalleryPhotoMenu('${p.id}','${folderId}',this)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;flex-shrink:0">⋮</button>
            </div>
          </div>
        `).join('')}
      </div>`}
    </div>`;
  // lazy load 썸네일
  setTimeout(() => {
    el.querySelectorAll('img.lib-thumb[data-path]').forEach(img => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(async e => {
          if(e.isIntersecting) {
            observer.disconnect();
            const path = img.dataset.path;
            const cacheKey = 'hj_thumb_cache_v1_' + path;
            const cachedRaw = localStorage.getItem(cacheKey);
            const isGallery = path.startsWith('gallery/');
            const ttl = isGallery ? 50*60*1000 : 7*24*60*60*1000; // 갤러리:50분, 나머지:7일
            if(cachedRaw) {
              try {
                const {url: cachedUrl, ts} = JSON.parse(cachedRaw);
                if(Date.now() - ts < ttl) { img.src = cachedUrl; return; }
              } catch(e) { img.src = cachedRaw; return; } // 구형 캐시 포맷
            }
            const url = await getLibraryFileUrl(path);
            if(url) {
              img.src = url;
              localStorage.setItem(cacheKey, JSON.stringify({url, ts: Date.now()}));
            }
          }
        });
      });
      observer.observe(img);
    });
  }, 50);
}

function openGalleryPhotoViewer(filePath) {
  const existing = document.getElementById('gallery-viewer');
  if(existing) existing.remove();

  let scale = 1, rotate = 0, currentUrl = '';

  const modal = document.createElement('div');
  modal.id = 'gallery-viewer';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.4)">
      <button onclick="document.getElementById('gallery-viewer').remove()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer">✕ 닫기</button>
      <div style="display:flex;gap:8px">
        <button onclick="gvRotate(-90)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="왼쪽 회전">↺</button>
        <button onclick="gvRotate(90)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="오른쪽 회전">↻</button>
        <button onclick="gvZoom(-0.25)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="축소">－</button>
        <button onclick="gvZoom(0.25)" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer" title="확대">＋</button>
        <button onclick="gvShare()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer" title="공유">공유</button>
      </div>
    </div>
    <div style="overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding-top:56px">
      <img id="gallery-viewer-img" style="max-width:90vw;max-height:85vh;object-fit:contain;transition:transform .2s;transform-origin:center center;border-radius:4px">
    </div>`;

  document.body.appendChild(modal);

  // 배경 클릭 닫기
  modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });

  function applyTransform() {
    const img = document.getElementById('gallery-viewer-img');
    if(img) img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
  }

  window.gvRotate = (deg) => { rotate = (rotate + deg + 360) % 360; applyTransform(); };
  window.gvZoom = (delta) => { scale = Math.max(0.25, Math.min(5, scale + delta)); applyTransform(); };
  window.gvShare = async () => {
    const img = document.getElementById('gallery-viewer-img');
    if(!img?.src) return;
    try {
      const res = await fetch(img.src);
      const blob = await res.blob();
      const file = new File([blob], 'photo.jpg', { type: blob.type });
      if(navigator.share && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '현장 사진' });
      } else {
        // 공유 불가 시 다운로드
        const a = document.createElement('a');
        a.href = img.src;
        a.download = `photo_${Date.now()}.jpg`;
        a.click();
      }
    } catch(e) { showToast('공유에 실패했어요.'); }
  };

  // 핀치 줌 지원
  let lastDist = 0;
  modal.addEventListener('touchstart', e => {
    if(e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  });
  modal.addEventListener('touchmove', e => {
    if(e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if(lastDist > 0) { scale = Math.max(0.25, Math.min(5, scale * (dist / lastDist))); applyTransform(); }
      lastDist = dist;
    }
  });

  getLibraryFileUrl(filePath).then(url => {
    if(url) {
      currentUrl = url;
      const img = document.getElementById('gallery-viewer-img');
      if(img) img.src = url;
    }
  });
}

function initMenuOrderList() {
  const menuDefs = {
    dashboard: {icon:'📊', label:'대시보드'},
    calendar: {icon:'📅', label:'캘린더'},
    weekly: {icon:'📋', label:'주간업무일지'},
    library: {icon:'📊', label:'공정표 관리'},
    drawing: {icon:'📐', label:'도면 관리'},
    construction: {icon:'🏗️', label:'시공 관리'},
    inspection: {icon:'📋', label:'검측요청서'},
    punch: {icon:'📌', label:'펀치리스트'},
    todo: {icon:'✅', label:'할일'},
    personal: {icon:'📒', label:'개인노트'},
    settings: {icon:'⚙️', label:'설정'},
  };
  const defaultOrder = ['dashboard','calendar','weekly','library','drawing','construction','inspection','punch','todo','personal','gallery','settings'];
  let order = (appSettings.menuOrder && appSettings.menuOrder.length === defaultOrder.length)
    ? [...appSettings.menuOrder]
    : [...defaultOrder];

  const list = document.getElementById('menu-order-list');
  if(!list) return;

  function render() {
    list.innerHTML = order.map(key => {
      const m = menuDefs[key];
      if(!m) return '';
      return `<div class="menu-order-item" data-key="${key}" style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:8px">
        <span style="font-size:16px;color:var(--soft);cursor:grab">⠿</span>
        <span style="font-size:14px">${m.icon}</span>
        <span style="font-size:13px;font-weight:600;color:var(--text)">${m.label}</span>
      </div>`;
    }).join('');
    attachDrag();
  }

  function attachDrag() {
    let dragging = null;
    list.querySelectorAll('.menu-order-item').forEach(el => {
      el.draggable = true;
      el.addEventListener('dragstart', () => {
        dragging = el;
        setTimeout(() => el.style.opacity = '0.4', 0);
      });
      el.addEventListener('dragend', async () => {
        el.style.opacity = '';
        dragging = null;
        order = [...list.querySelectorAll('.menu-order-item')].map(d => d.getAttribute('data-key'));
        appSettings.menuOrder = order;
        await saveSettingsToSupabase();
        renderSidebar();
        showToast('✅ 메뉴 순서가 저장됐어요');
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        if(dragging && dragging !== el) {
          const rect = el.getBoundingClientRect();
          const mid = rect.top + rect.height/2;
          if(e.clientY < mid) list.insertBefore(dragging, el);
          else list.insertBefore(dragging, el.nextSibling);
        }
      });
    });
  }

  render();
}

// 날짜 클릭 → 일정 있으면 목록, 없으면 추가 모달
function handleDayClick(dateStr) {
  const dayMsgs = messages.filter(m=>(m.eventDate||m.messageDate)===dateStr&&normalizeTag(m.tag)==='일정');
  const dayCustom = getCustomEventsForDate(dateStr);
  if(dayMsgs.length===0 && dayCustom.length===0) {
    openEventModal(dateStr);
    return;
  }
  // 일정 목록 모달
  const d = new Date(dateStr);
  const days=['일','월','화','수','목','금','토'];
  const dateLabel = `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
  document.getElementById('day-modal-title').textContent = `📅 ${dateLabel} 일정`;
  let html = '';
  // 메시지 일정 + 직접 추가 일정 합쳐서 순서 관리
  const allItems = [
    ...dayMsgs.map(m=>({type:'msg', id:m.id, tag:normalizeTag(m.tag), title:m.summary, sub:m.roomName+(m.sender?' · '+m.sender:''), data:m})),
    ...dayCustom.map(e=>({type:'custom', id:e.id, tag:normalizeTag(e.tag||'일정'), title:e.title, sub:e.memo||'', color:e.color||'none', data:e}))
  ];

  // 저장된 순서 적용
  const orderKey = 'hj3_order_'+dateStr;
  const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(savedOrder.length) {
    allItems.sort((a,b)=>{
      const ai = savedOrder.indexOf(a.id);
      const bi = savedOrder.indexOf(b.id);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  }

  allItems.forEach((item,i)=>{
    const tag = item.tag;
    html+=`<div class="day-drag-item" draggable="true" data-idx="${i}"
      ondragstart="onDayDragStart(event,${i})"
      ondragover="onDayDragOver(event,${i},'${dateStr}')"
      ondrop="onDayDrop(event,${i},'${dateStr}')"
      ondragend="onDayDragEnd(event,'${dateStr}')"
      style="margin-bottom:8px;border:1px solid var(--border);border-left:3px solid ${/^휴무/.test((item.title||'').trim())?'#ef4444':(item.title||'').includes('타설')?'#f5c518':item.type==='custom'?'#3b82f6':'#7c3aed'};border-radius:8px;padding:12px;background:${/^휴무/.test((item.title||'').trim())?'#fff0f0':(item.title||'').includes('타설')?'#fffbe6':'var(--surface)'};display:flex;align-items:flex-start;gap:8px;cursor:grab;transition:opacity 0.15s">
      <span style="font-size:14px;color:var(--soft);margin-top:2px">⠿</span>
      <div style="flex:1;cursor:pointer" onclick="closeDayModal();${item.type==='custom'?`openEditEventModal('${item.id}')`:`openEditMsgEvent('${item.id}')`}">
        <span class="badge ${badgeClass(tag)}">${tagIcon(tag)} ${tag} ✏️</span>
        <div class="item-title" style="font-size:13px;margin-top:4px">${item.title}</div>
        ${item.sub?`<div class="meta">${item.sub}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('day-modal-list').innerHTML = html;
  document.getElementById('day-modal-date').value = dateStr;
  document.getElementById('day-modal').style.display = 'flex';
}

let dragEventId = null;
let dragFromIdx = null;

function onDayDragStart(e, idx) {
  dragFromIdx = idx;
  e.target.style.opacity = '0.4';
}

function onDayDragOver(e, idx, dateStr) {
  e.preventDefault();
  if(dragFromIdx === null || dragFromIdx === idx) return;
  // 시각적 피드백
  document.querySelectorAll('.day-drag-item').forEach((el,i)=>{
    el.style.borderTop = i===idx ? '2px solid #3b82f6' : '';
  });
}

function onDayDragEnd(e, dateStr) {
  e.target.style.opacity = '1';
  document.querySelectorAll('.day-drag-item').forEach(el=>{
    el.style.borderTop = '';
    el.style.opacity = '1';
  });
  // drop이 처리됨
}

function onDayDrop(e, toIdx, dateStr) {
  e.preventDefault();
  if(dragFromIdx===null || dragFromIdx===toIdx) { dragFromIdx=null; return; }

  // 해당 날짜 모든 아이템 수집
  const dayMsgs = messages.filter(m=>(m.eventDate||m.messageDate)===dateStr&&normalizeTag(m.tag)==='일정');
  const dayCustom = customEvents.filter(ev=>ev.date===dateStr);
  let allIds = [
    ...dayMsgs.map(m=>m.id),
    ...dayCustom.map(ev=>ev.id)
  ];

  // 저장된 순서 있으면 적용
  const orderKey = 'hj3_order_'+dateStr;
  const savedOrder = JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(savedOrder.length) {
    allIds.sort((a,b)=>{
      const ai=savedOrder.indexOf(a); const bi=savedOrder.indexOf(b);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  }

  // 순서 변경
  const moved = allIds.splice(dragFromIdx,1)[0];
  allIds.splice(toIdx,0,moved);
  dragFromIdx = null;

  // localStorage에 저장
  localStorage.setItem(orderKey, JSON.stringify(allIds));

  // customEvents 배열 순서도 반영
  const customOrder = allIds.filter(id => customEvents.find(e=>e.id===id));
  customEvents.sort((a,b)=>{
    const ai = customOrder.indexOf(a.id);
    const bi = customOrder.indexOf(b.id);
    if(ai===-1&&bi===-1) return 0;
    if(ai===-1) return 1;
    if(bi===-1) return -1;
    return ai-bi;
  });

  save(); saveCustomEventsToSupabase();
  handleDayClick(dateStr);
  // 캘린더 셀도 즉시 갱신
  const el = document.getElementById('main-content');
  if(currentView==='calendar') renderCalendarView(el);
  else if(currentView==='dashboard') renderDashboard(el);
}

async function checkAuth() {
  // URL 해시에서 access_token 확인 (OAuth 콜백)
  const hash = window.location.hash;
  if(hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if(accessToken) {
      localStorage.setItem('hj_token', accessToken);
      if(refreshToken) localStorage.setItem('hj_refresh_token', refreshToken);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }

  const token = localStorage.getItem('hj_token');
  if(!token) return false;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    if(!res.ok) {
      // 토큰 만료 → 자동갱신 시도
      const refreshed = await refreshToken();
      if(!refreshed) { localStorage.removeItem('hj_token'); return false; }
      return await checkAuth();
    }
    const user = await res.json();
    if(user.email === ALLOWED_EMAIL) {
      window._currentUserEmail = user.email;
      window._currentUserName = user.user_metadata?.full_name || user.email;
      // 45분마다 자동갱신
      setTimeout(autoRefreshToken, 45 * 60 * 1000);
      return true;
    } else {
      alert(`접근 권한이 없습니다.\n(${user.email})`);
      localStorage.removeItem('hj_token');
      localStorage.removeItem('hj_refresh_token');
      return false;
    }
  } catch(e) { return false; }
}

async function refreshToken() {
  const refresh = localStorage.getItem('hj_refresh_token');
  if(!refresh) return false;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refresh })
    });
    if(!res.ok) return false;
    const data = await res.json();
    if(data.access_token) {
      localStorage.setItem('hj_token', data.access_token);
      if(data.refresh_token) localStorage.setItem('hj_refresh_token', data.refresh_token);
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function autoRefreshToken() {
  const ok = await refreshToken();
  if(ok) {
    // 갱신 성공 → 45분 후 다시 갱신
    setTimeout(autoRefreshToken, 45 * 60 * 1000);
    console.log('✅ 토큰 자동갱신 완료');
  }
}

function initApp() {
  // 모바일 기기 판별
  if(/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)) {
    document.body.classList.add('is-mobile-device');
  }
  renderApp();
  renderModals();
  document.getElementById('header-sub').textContent = '☁️ Supabase 연결 중...';
  loadFromSupabase().then(ok => {
    if (ok) {
      document.getElementById('header-sub').textContent = '☁️ Supabase 클라우드 저장 모드';
    } else {
      document.getElementById('header-sub').textContent = '⚠️ 로컬 저장 모드 (Supabase 연결 실패)';
    }
    updateLogoSub();
    updateStats();
    renderSidebar();
    setView('dashboard');
    handleSharedText();
  });
}

// 구글 로그인 체크
checkAuth().then(ok => {
  document.body.style.visibility = 'visible';
  if(ok) {
    document.getElementById('pw-modal').style.display = 'none';
    initApp();
  }
});
