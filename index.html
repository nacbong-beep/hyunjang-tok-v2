async function aiClassifyGemini(text, roomName) {
  if(!geminiApiKey) throw new Error('Gemini API 키를 설정해주세요. (설정 → AI 분류 엔진)');
  const TODAY = todayKey();
  const TOMORROW = addDaysKey(1);

  const prompt = `당신은 건설현장 카카오톡 메시지 분류 전문가입니다.
오늘 날짜: ${TODAY}
채팅방: ${roomName}
아래 대화를 분석해서 JSON 배열만 반환하세요. 다른 텍스트 없이 순수 JSON만.
태그: 지시사항, 공지사항, 시공기준, 자재발주, 품질관리, 안전관리, 하자보수, 일정, 기타
규칙:
- 인사말/이모티콘만 있는 메시지 제외
- messageDate: 카톡 대화가 실제로 오간 날짜 (대화 헤더의 날짜 기준, YYYY-MM-DD)
- eventDate: 메시지 내용에 언급된 날짜 (일정/할일에 해당하는 날짜, 없으면 null)
- 지시사항,자재발주,품질관리,안전관리,하자보수 → isTodo=true
응답형식:
[{"tag":"지시사항","sender":"발신자","summary":"요약30자이내","content":"원본내용","messageDate":"YYYY-MM-DD","eventDate":"YYYY-MM-DD또는null","isTodo":true}]
대화:
${text}`;

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${geminiApiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.1 }
    })
  });
  if(!res.ok) throw new Error('Gemini API 오류: ' + res.status);
  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const clean = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function getWeekRange(offset) {
  // KST(UTC+9) 기준 '오늘' 날짜를 브라우저 시간대와 무관하게 계산
  const kstNow = new Date(Date.now() + 9*60*60*1000);
  const today = new Date(kstNow.getUTCFullYear(), kstNow.getUTCMonth(), kstNow.getUTCDate());
  const day = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (day===0?6:day-1) + offset*7);
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  return {mon, sat};
}

function weekKey(offset) {
  const {mon} = getWeekRange(offset);
  return dateKey(mon);
}

// 특정 월의 첫째주로 이동 (해당 월 1일이 포함된 주의 월요일 기준)
function jumpToMonth(monthStr) {
  if(!monthStr) return;
  const [y, m] = monthStr.split('-').map(Number);
  const firstDay = new Date(y, m-1, 1);
  const dow = firstDay.getDay(); // 0=일 ~ 6=토
  // 해당 월 1일 이후(포함) 첫 번째 월요일 = 첫째주 시작일
  const daysToMon = dow === 1 ? 0 : (8 - dow) % 7;
  const targetMon = new Date(firstDay);
  targetMon.setDate(firstDay.getDate() + daysToMon);

  const {mon: thisMon} = getWeekRange(0);
  const diffDays = Math.round((targetMon - thisMon) / (24*60*60*1000));
  weeklyOffset = Math.round(diffDays / 7);
  renderWeeklyView(document.getElementById('main-content'));
}

function formatWeekDate(d) {

const WEATHER_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WEATHER_DESC = {0:'맑음',1:'대체로맑음',2:'구름조금',3:'흐림',45:'안개',48:'안개',51:'이슬비',53:'이슬비',55:'이슬비',61:'비',63:'비',65:'강한비',71:'눈',73:'눈',75:'폭설',80:'소나기',81:'소나기',82:'강한소나기',95:'뇌우',96:'뇌우',99:'강한뇌우'};

async function loadWeatherForWeek(days) {
  try {
    const startDate = days[0].key;
    const endDate = days[days.length-1].key;
    // 평택 장안동 위경도
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=36.9923&longitude=127.0892&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia/Seoul&start_date=${startDate}&end_date=${endDate}`);
    if(!res.ok) return null;
    const data = await res.json();
    const result = {};
    data.daily.time.forEach((date, i) => {
      const code = data.daily.weathercode[i];
      const max = Math.round(data.daily.temperature_2m_max[i]);
      const min = Math.round(data.daily.temperature_2m_min[i]);
      const icon = WEATHER_ICONS[code] || '🌡️';
      const desc = WEATHER_DESC[code] || '';
      result[date] = `${icon} ${desc} ${max}°/${min}°`;
    });
    return result;
  } catch(e) { console.warn('날씨 로드 실패', e); return null; }
}

  const {mon} = getWeekRange(offset);
  const days = ['(월)','(화)','(수)','(목)','(금)','(토)'];

    const d = new Date(mon); d.setDate(mon.getDate()+i);

function setWeeklyCell(wk, row, dateKey, val) {
  if(!weeklyData[wk]) weeklyData[wk] = {};
  weeklyData[wk][row+':'+dateKey] = val;
  localStorage.setItem('hj3_weekly', JSON.stringify(weeklyData));
  // 디바운스 저장 (1초 후 Supabase 저장)
  clearTimeout(weeklySaveTimer);
  weeklySaveTimer = setTimeout(() => saveWeeklyCellToSupabase(wk, row, dateKey, val), 1000);
}

async function saveWeeklyCellToSupabase(wk, row, dateKey, val) {
  try {
    const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
    let userId = null;
    try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
    const headers = {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };
    // 기존 행 삭제 후 INSERT
    // week_key와 무관하게 같은 날짜/항목의 모든 행 삭제 (과거 분산 데이터 자동 정리)
    await fetch(`${SUPABASE_URL}/rest/v1/weekly_report?user_id=eq.${userId}&row_name=eq.${row}&date_key=eq.${dateKey}`, {
      method: 'DELETE', headers
    });
    if(val) {
      await fetch(`${SUPABASE_URL}/rest/v1/weekly_report`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          user_id: userId, week_key: wk,
          row_name: row, date_key: dateKey,
          content: val, updated_at: new Date().toISOString()
        })
      });
    }
  } catch(e) { console.warn('weekly save error', e); }
}

async function loadWeeklyFromSupabase(wk, days) {
  try {
    // week_key가 아닌 date_key(실제 날짜) 기준으로 조회 - 과거 week_key 분산 문제와 무관하게 항상 정확
    const dateKeys = days.map(d=>d.key).join(',');
    const rows = await sbFetch('weekly_report', 'GET', null, `?date_key=in.(${dateKeys})&select=row_name,date_key,content`);
    // Supabase 데이터로 완전히 덮어쓰기 (병합 아님)
    // Supabase에 없는 항목은 빈값으로 처리
    weeklyData[wk] = {};
    if(rows && rows.length) {
      rows.forEach(r => {
        weeklyData[wk][r.row_name+':'+r.date_key] = r.content;
      });
    }
    localStorage.setItem('hj3_weekly', JSON.stringify(weeklyData));
  } catch(e) { console.warn('weekly load error', e); }
}

async function aiDraftWeekly() {
  const wk = weekKey(weeklyOffset);
  const days = getWeekDays(weeklyOffset);
  const btn = document.getElementById('weekly-ai-btn');
  btn.textContent = 'AI 작성 중...'; btn.disabled = true;

  const rows = ['작업사항','검측사항','확인사항','서류사항','기타'];

  // 해당 주 메시지 수집
  const weekMsgs = messages.filter(m => {
    const dk = m.eventDate || m.messageDate || '';
    return days.some(d => d.key === dk);
  });

  try {
    const res = await fetch('https://rjipklyccmwqodgdpbph.supabase.co/functions/v1/weekly', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
      body: JSON.stringify({
        messages: weekMsgs.map(m=>({날짜:m.eventDate||m.messageDate, 태그:m.tag, 내용:m.summary})),
        weekStart: days[0].key,
        weekEnd: days[5].key,
        days: days.map(d=>d.key)
      })
    });
    if(!res.ok) throw new Error('서버오류 '+res.status);
    const raw = await res.text();
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    const saves = [];
    rows.forEach(row => {
      days.forEach(d => {
        const val = (parsed[row]||{})[d.key] || '';
        if(val) {
          setWeeklyCell(wk, row, d.key, val);
          saves.push(saveWeeklyCellToSupabase(wk, row, d.key, val));
        }
      });
    });
    await Promise.all(saves);
    showToast('✅ AI 초안이 작성됐어요!');
    renderWeeklyView(document.getElementById('main-content'));
  } catch(e) {
    console.error(e);
    showToast('⚠️ AI 작성 실패. 직접 입력해주세요.');
  }
  btn.textContent = '🤖 AI 자동작성'; btn.disabled = false;
}

function searchWeeklyAll(q) {
  const el = document.getElementById('weekly-search-results');
  if(!q.trim()) { el.innerHTML = ''; return; }

  // 스페이스로 분리해서 AND 검색 (예: "302동 단열" → 302동 AND 단열 모두 포함)
  const keywords = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const results = [];

  Object.keys(weeklyData).sort((a,b)=>b.localeCompare(a)).forEach(wk => {
    const weekEntries = weeklyData[wk];
    Object.keys(weekEntries).forEach(key => {
      const val = weekEntries[key];
      if(!val) return;
      const valLower = val.toLowerCase();
      if(!keywords.every(kw => valLower.includes(kw))) return;
      const [row, dateKey] = key.split(':');
      const d = new Date(dateKey + 'T00:00:00+09:00');
      const days = ['일','월','화','수','목','금','토'];
      const dateLabel = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
      const monD = new Date(wk + 'T00:00:00+09:00');
      const weekLabel = `${monD.getFullYear()}년 ${monD.getMonth()+1}월 ${monD.getDate()}일 주`;
      results.push({wk, weekLabel, row, dateKey, dateLabel, val});
    });
  });

  if(!results.length) {
    el.innerHTML = '<div class="empty-box" style="margin-top:0">검색 결과가 없습니다.</div>';
    return;
  }

  el.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">${results.length}건 검색됨</div>
    ${results.map(r => {
      let highlighted = r.val;
      keywords.forEach(kw => {
        highlighted = highlighted.replace(
          new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),
          match => `<mark style="background:#fef08a;color:#1a2332;border-radius:2px;padding:0 2px">${match}</mark>`
        );
      });
      return `<div class="item" style="cursor:pointer;margin-bottom:8px" onclick="goToWeek('${r.wk}')">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span class="badge b-blue">${r.row}</span>
          <span style="font-size:12px;font-weight:700;color:var(--primary)">${r.dateLabel}</span>
          <span style="font-size:11px;color:var(--soft)">${r.weekLabel}</span>
        </div>
        <div style="font-size:13px;line-height:1.6;color:var(--text)">${highlighted}</div>
      </div>`;
    }).join('')}`;
}

function goToWeek(wk) {
  // 해당 주로 이동 (getWeekRange와 동일한 KST 기준 '이번주 월요일' 사용)
  const [wy, wm, wd] = wk.split('-').map(Number);
  const mon = new Date(wy, wm-1, wd);
  const {mon: todayMon} = getWeekRange(0);
  const diffDays = Math.round((mon - todayMon) / (24*60*60*1000));
  weeklyOffset = Math.round(diffDays / 7);
  toggleWeeklySearch();
  renderWeeklyView(document.getElementById('main-content'));
  showToast(`📅 ${mon.getMonth()+1}월 ${mon.getDate()}일 주로 이동했어요`);
}

async function shareWeeklyImage() {

      div.textContent = ta.value;
      ta.parentNode.replaceChild(div, ta);
    });

    wrapper.appendChild(titleEl);

    console.error(e);

  }
  btn.textContent = origText;
  btn.disabled = false;
}

function exportWeeklyExcel() {
  const wk = weekKey(weeklyOffset);
  const days = getWeekDays(weeklyOffset);
  const rows = ['작업사항','검측사항','확인사항','서류사항','기타'];
  const {mon, sat} = getWeekRange(weeklyOffset);

  let csv = '\uFEFF'; // BOM for Excel Korean
  csv += `주간업무일지,${formatWeekDate(mon)}~${formatWeekDate(sat)}\n`;
  csv += '구분,' + days.map(d=>d.label).join(',') + '\n';
  rows.forEach(row => {
    csv += row + ',' + days.map(d => {
      const v = getWeeklyCell(wk,row,d.key).replace(/\n/g,' ');
      return `"${v}"`;
    }).join(',') + '\n';
  });

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  a.download = `주간업무일지_${wk}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('📥 엑셀 파일 다운로드!');
}

function weeklyEventBadge(e) {
  let bg, c;
  if(/^휴무/.test(e.text.trim())) { bg='#fee2e2'; c='#b91c1c'; }
  else if(/^근무/.test(e.text.trim())) { bg='#dcfce7'; c='#0f766e'; }
  else if(e.text && e.text.includes('타설')) { bg='#fff3b0'; c='#7a6000'; }
  else if(e.isMsg) { bg='#ede9fe'; c='#6d28d9'; }
  else if(e.color && e.color!=='none') { bg=e.color+'22'; c=e.color; }
  else { bg='#dbeafe'; c='#1e40af'; }
  return `<span style="display:inline-block;font-size:12px;font-weight:700;padding:4px 9px;border-radius:6px;margin:0 4px 4px 0;background:${bg};color:${c}">${e.text}</span>`;
}

                    oninput="setWeeklyCellLocal('${wk}','${row}','${d.key}',this.value)"
                    >${val}</textarea>

              }).join('')}

            }).join('')}
          </tbody>
        </table>
      </div>`;
}

        ${children.length ? `<span onclick="event.stopPropagation();toggleLibCatGroup('${storageType}','${catName}')" style="font-size:10px;margin-right:5px;opacity:.5;cursor:pointer;display:inline-block;padding:2px;transition:transform .15s;transform:rotate(${isCollapsed?'-90deg':'0deg'})">▼</span>` : `<span style="display:inline-block;width:15px"></span>`}

let libViewDoc = null;

// ===== 카테고리 관리 =====
let libCatDraft = [];
let libCatRenameMap = {}; // 공종명 변경 추적: 원래이름 -> 변경된이름 (저장 시 기존 도면/자료에도 반영)

function openLibraryCatManager(storageType) {
  _libCatStorageType = storageType || currentView || 'library';
  libCatDraft = LIBRARY_CATEGORIES.map(c =>
    typeof c === 'string' ? {name:c, children:[]} : {...c, children:c.children||[]}
  );
  libCatRenameMap = {};
  renderLibraryCatList();
  document.getElementById('lib-cat-modal').style.display = 'flex';
  document.getElementById('lib-cat-new-input').value = '';
}

function closeLibraryCatManager() {
  document.getElementById('lib-cat-modal').style.display = 'none';
}

function renderLibraryCatList() {
  const el = document.getElementById('lib-cat-list');
  el.innerHTML = libCatDraft.map((cat, i) => {
    const name = typeof cat === 'string' ? cat : cat.name;
    const children = (typeof cat === 'object' && cat.children) ? cat.children : [];
    return `
    <div class="lib-cat-item" data-idx="${i}" style="border:1px solid var(--border);border-radius:8px;background:var(--card);margin-bottom:4px;overflow:hidden;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg)">
        <span class="lib-cat-handle" style="font-size:14px;color:var(--soft);cursor:grab;padding:0 2px">⠿</span>
        <input value="${name}" data-prev="${name}" onfocus="this.dataset.prev=this.value" onchange="handleCatNameChange(this, ${i})"
          style="flex:1;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--text);outline:none;font-family:inherit">
        <button onclick="addChildCat(${i})" style="border:1px solid var(--border2);background:var(--card);border-radius:5px;width:22px;height:22px;font-size:10px;cursor:pointer;color:var(--muted)" title="하위 추가">+</button>
        <button onclick="deleteLibraryCat(${i})" style="border:1px solid #fecaca;background:#fff;color:#ef4444;border-radius:5px;width:22px;height:22px;font-size:10px;cursor:pointer">✕</button>
      </div>
      <div class="lib-child-list" data-parent="${i}">
      ${children.map((child, j) => `
      <div class="lib-child-item" data-cidx="${j}" style="display:flex;align-items:center;gap:6px;padding:6px 10px 6px 14px;border-top:1px solid var(--border)">
        <span class="lib-child-handle" style="font-size:13px;color:var(--soft);cursor:grab;padding:0 2px">⠿</span>
        <span style="font-size:11px;color:var(--soft)">└</span>
        <input value="${child}" data-prev="${child}" onfocus="this.dataset.prev=this.value" onchange="handleCatNameChange(this, ${i}, ${j})"
          style="flex:1;border:none;background:transparent;font-size:12px;color:var(--text);outline:none;font-family:inherit">
        <button onclick="deleteChildCat(${i},${j})" style="border:1px solid #fecaca;background:#fff;color:#ef4444;border-radius:5px;width:20px;height:20px;font-size:10px;cursor:pointer">✕</button>
      </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  // 드래그 초기화
  initLibCatDrag();
  initLibChildDrag();
}

function initLibChildDrag() {
  document.querySelectorAll('.lib-child-list').forEach(list => {
    const parentIdx = parseInt(list.getAttribute('data-parent'));
    let dragging = null;
    list.querySelectorAll('.lib-child-item').forEach(el => {
      el.draggable = false;
      const handle = el.querySelector('.lib-child-handle');
      if(handle) {
        handle.addEventListener('mousedown', () => { el.draggable = true; });
        handle.addEventListener('touchstart', () => { el.draggable = true; }, {passive:true});
      }
      el.addEventListener('dragstart', e => {
        dragging = el;
        e.stopPropagation();
        setTimeout(() => el.style.opacity = '0.4', 0);
      });
      el.addEventListener('dragend', e => {
        e.stopPropagation();
        el.style.opacity = '';
        el.draggable = false;
        dragging = null;
        const newOrder = [...list.querySelectorAll('.lib-child-item')].map(d => parseInt(d.getAttribute('data-cidx')));
        const children = libCatDraft[parentIdx].children || [];
        libCatDraft[parentIdx].children = newOrder.map(j => children[j]);
        // data-cidx 재정렬을 위해 다시 그림
        renderLibraryCatList();
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        e.stopPropagation();
        if(dragging && dragging !== el) {
          const rect = el.getBoundingClientRect();
          const mid = rect.top + rect.height/2;
          if(e.clientY < mid) list.insertBefore(dragging, el);
          else list.insertBefore(dragging, el.nextSibling);
        }
      });
    });
  });
}

function initLibCatDrag() {
  const list = document.getElementById('lib-cat-list');
  if(!list) return;
  let dragging = null;
  list.querySelectorAll('.lib-cat-item').forEach(el => {
    el.draggable = false;
    const handle = el.querySelector('.lib-cat-handle');
    if(handle) {
      handle.addEventListener('mousedown', () => { el.draggable = true; });
      handle.addEventListener('touchstart', () => { el.draggable = true; }, {passive:true});
    }
    el.addEventListener('dragstart', e => {
      dragging = el;
      setTimeout(() => el.style.opacity = '0.4', 0);
    });
    el.addEventListener('dragend', e => {
      el.style.opacity = '';
      el.draggable = false;
      dragging = null;
      // 순서 반영
      const newOrder = [...list.querySelectorAll('.lib-cat-item')].map(d => parseInt(d.getAttribute('data-idx')));
      const newDraft = newOrder.map(i => libCatDraft[i]);
      libCatDraft = newDraft;
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if(dragging && dragging !== el) {
        const rect = el.getBoundingClientRect();
        const mid = rect.top + rect.height/2;
        if(e.clientY < mid) list.insertBefore(dragging, el);
        else list.insertBefore(dragging, el.nextSibling);
      }
    });
  });
}

function handleCatNameChange(el, i, j) {
  const oldName = el.dataset.prev;
  const newName = el.value;
  if(j === undefined || j === null) {
    libCatDraft[i].name = newName;
  } else {
    libCatDraft[i].children[j] = newName;
  }
  if(oldName !== undefined && oldName !== newName && oldName !== '') {
    // 같은 항목을 여러 번 고친 경우 체인 추적 (A -> B -> C 면 최종 A -> C로 기록)
    let chained = false;
    for(const k in libCatRenameMap) {
      if(libCatRenameMap[k] === oldName) { libCatRenameMap[k] = newName; chained = true; }
    }
    if(!chained) libCatRenameMap[oldName] = newName;
  }
  el.dataset.prev = newName;
}

async function applyCatRenamesToDocs(docType) {
  const entries = Object.entries(libCatRenameMap).filter(([o,n]) => o && n && o !== n);
  if(!entries.length) return;
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  for(const [oldName, newName] of entries) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/library_docs?doc_type=eq.${encodeURIComponent(docType)}&category=eq.${encodeURIComponent(oldName)}`, {
        method: 'PATCH',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: newName })
      });
    } catch(e) { console.warn('카테고리명 변경 반영 실패', oldName, '->', newName, e); }
  }
  // 로컬 캐시도 동일하게 갱신 (다시 불러오기 전에도 화면 일치시키기 위함)
  libraryDocs = libraryDocs.map(d => {
    if(d.doc_type !== docType) return d;
    const hit = entries.find(([o]) => o === d.category);
    return hit ? {...d, category: hit[1]} : d;
  });
}

function addLibraryCat() {
  const val = document.getElementById('lib-cat-new-input').value.trim();
  if(!val) { showToast('공종명을 입력해주세요'); return; }
  if(libCatDraft.find(c=>(c.name||c)===val)) { showToast('이미 있는 공종이에요'); return; }
  libCatDraft.push({name:val, children:[]});
  document.getElementById('lib-cat-new-input').value = '';
  renderLibraryCatList();
  // 새로 추가된 항목이 화면에 보이도록 스크롤
  const list = document.getElementById('lib-cat-list');
  if(list) list.scrollTop = list.scrollHeight;
}

function addChildCat(parentIdx) {
  const child = prompt('하위 카테고리 이름 입력 (예: 302동)');
  if(!child || !child.trim()) return;
  if(!libCatDraft[parentIdx].children) libCatDraft[parentIdx].children = [];
  libCatDraft[parentIdx].children.push(child.trim());
  renderLibraryCatList();
  // 추가된 하위 항목이 보이도록 스크롤
  const list = document.getElementById('lib-cat-list');
  if(list) list.scrollTop = list.scrollHeight;
}

function deleteChildCat(parentIdx, childIdx) {
  libCatDraft[parentIdx].children.splice(childIdx, 1);
  renderLibraryCatList();
}

function deleteLibraryCat(i) {
  const name = libCatDraft[i].name || libCatDraft[i];
  if(!confirm(`"${name}" 공종을 삭제할까요?
(해당 공종의 자료는 삭제되지 않아요)`)) return;
  libCatDraft.splice(i, 1);
  renderLibraryCatList();
}

function moveLibraryCat(i, dir) {
  const j = i + dir;
  if(j < 0 || j >= libCatDraft.length) return;
  [libCatDraft[i], libCatDraft[j]] = [libCatDraft[j], libCatDraft[i]];
  renderLibraryCatList();
}

async function saveLibraryCats() {
  // 현재 입력값 동기화
  // 트리형 입력값 동기화 - 상위/하위 모두
  const allInputs = document.querySelectorAll('#lib-cat-list input');
  // 입력값은 onchange로 이미 반영됨
  libCatDraft = libCatDraft.filter(c => (c.name||c).trim());
  LIBRARY_CATEGORIES = [...libCatDraft];
  const docType = _libCatStorageType || currentView || 'library';
  // 캐시 즉시 업데이트 (renderLibraryView가 덮어쓰지 않도록)
  LIB_CAT_CACHE[docType] = [...LIBRARY_CATEGORIES];
  await saveLibraryCatsToSupabase(docType, LIBRARY_CATEGORIES);
  await applyCatRenamesToDocs(docType);
  libCatRenameMap = {};
  closeLibraryCatManager();
  showToast('✅ 공종 분류가 저장됐어요!');
  renderLibraryView(document.getElementById('main-content'), docType);
}

async function saveLibraryCatsToSupabase(docType, cats) {
  try {
    const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
    let userId = null;
    try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
    const headers = {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    };
    // 기존 데이터 삭제
    await fetch(`${SUPABASE_URL}/rest/v1/library_categories?doc_type=eq.${docType}&user_id=eq.${userId}`, {
      method: 'DELETE', headers
    });
    // 새로 INSERT
    await fetch(`${SUPABASE_URL}/rest/v1/library_categories`, {
      method: 'POST',
      headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ doc_type: docType, categories: cats, user_id: userId, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.warn('category save error', e); }
}

async function loadLibraryCatsFromSupabase(docType) {
  try {
    const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/library_categories?doc_type=eq.${docType}&select=categories&limit=1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    if(!res.ok) return null;
    const data = await res.json();
    if(!data || !data.length) return null;
    // 기존 문자열 배열 → 계층 구조로 변환
    return data[0].categories.map(c =>
      typeof c === 'string' ? {name:c, children:[]} : c
    );
  } catch(e) { return null; }
}

// 클라이언트에서 이미지를 240x240 썸네일로 리사이즈 (Free 플랜 대응 - 서버 transform 없이 동작)
function resizeImageToThumb(file, maxSize = 240, quality = 0.6) {
  return new Promise((resolve, reject) => {
    if(!file.type.startsWith('image/')) { resolve(null); return; }
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      // cover 방식: 정사각형으로 크롭
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      canvas.width = maxSize;
      canvas.height = maxSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, side, side, 0, 0, maxSize, maxSize);
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadLibraryFile(file, category, title, memo, storageType='library') {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const ext = file.name.split('.').pop() || 'png';
  const baseName = `${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `${baseName}.${ext}`;

  // Supabase Storage 업로드 (원본)
  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': file.type },
    body: file
  });
  if(!uploadRes.ok) throw new Error('업로드 실패');

  // 썸네일 생성 후 별도 업로드 (Free 플랜에서도 작동 - 서버 transform 불필요)
  let thumbPath = null;
  try {
    const thumbBlob = await resizeImageToThumb(file);
    if(thumbBlob) {
      thumbPath = `thumb_${baseName}.jpg`;
      const thumbUploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
        body: thumbBlob
      });
      if(!thumbUploadRes.ok) thumbPath = null; // 썸네일 업로드 실패해도 원본 업로드는 유지
    }
  } catch(e) {
    console.warn('썸네일 생성 실패, 원본만 저장:', e);
  }

  // JWT에서 user_id 파싱
  let userId = null;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    userId = payload.sub;
  } catch(e) {}

  // DB에 메타데이터 저장
  const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/library_docs`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    },
    body: JSON.stringify({ category, title, memo, file_path: filePath, thumb_path: thumbPath, file_name: file.name, user_id: userId, doc_type: storageType })
  });
  if(!dbRes.ok) throw new Error('DB 저장 실패');
  return await dbRes.json();
}

async function getLibraryFileUrl(filePath) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/library/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ expiresIn: 3600 })
  });
  if(!res.ok) return null;
  const data = await res.json();
  return `${SUPABASE_URL}/storage/v1${data.signedURL}`;
}

async function deleteLibraryDoc(id, filePath) {
  if(!confirm('이 자료를 삭제할까요?')) return;
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;

  });
  await fetch(`${SUPABASE_URL}/rest/v1/library_docs?id=eq.${id}`, {
    method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
  });

function getInspectionAuth() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;

  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}

}

  const res = await fetch(`${SUPABASE_URL}/rest/v1/inspection_folders?user_id=eq.${userId}&order=sort_order.asc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }

}

async function loadInspectionItems(folderId) {
  const { token } = getInspectionAuth();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/inspection_items?folder_id=eq.${folderId}&order=sort_order.asc`, {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/library_docs?select=*&order=created_at.desc`, {

// 검측요청서 도면 추가 모달처럼 썸네일이 실제로 화면에 보일 때만 signed URL 발급
async function ensureInspectionDocThumb(doc) {
  if(doc.file_url || !doc.file_path) return doc.file_url;
  const url = await getLibraryThumbUrl(doc.file_path);
  if(url) doc.file_url = url;
  return url;
}

async function createInspectionFolder(title) {
  const { token, userId } = getInspectionAuth();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/inspection_folders`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ user_id: userId, title })
  });
  if(res.ok) {
    const rows = await res.json();
    inspectionFolders.unshift(rows[0]);
    return rows[0];
  }
}

async function deleteInspectionFolder(id) {
  const { token } = getInspectionAuth();
  await fetch(`${SUPABASE_URL}/rest/v1/inspection_folders?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  inspectionFolders = inspectionFolders.filter(f => f.id !== id);
  delete inspectionItems[id];
}

async function addInspectionItem(folderId, docId, paperSize='A4 landscape') {
  const { token } = getInspectionAuth();
  const items = inspectionItems[folderId] || [];
  const sortOrder = items.length;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/inspection_items`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ folder_id: folderId, doc_id: docId, sort_order: sortOrder, paper_size: paperSize })
  });
  if(res.ok) {
    const rows = await res.json();
    if(!inspectionItems[folderId]) inspectionItems[folderId] = [];
    inspectionItems[folderId].push(rows[0]);
  }
}

async function removeInspectionItem(itemId, folderId) {
  const { token } = getInspectionAuth();
  await fetch(`${SUPABASE_URL}/rest/v1/inspection_items?id=eq.${itemId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  inspectionItems[folderId] = inspectionItems[folderId].filter(i => i.id !== itemId);
}

async function updateInspectionItemOrder(folderId) {
  const { token } = getInspectionAuth();
  const items = inspectionItems[folderId] || [];
  await Promise.all(items.map((item, i) =>
    fetch(`${SUPABASE_URL}/rest/v1/inspection_items?id=eq.${item.id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ sort_order: i })
    })
  ));
}

async function updateInspectionItemPaperSize(itemId, folderId, paperSize) {
  const { token } = getInspectionAuth();
  await fetch(`${SUPABASE_URL}/rest/v1/inspection_items?id=eq.${itemId}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ paper_size: paperSize })
  });
  const item = (inspectionItems[folderId]||[]).find(i=>i.id===itemId);

}

function filterFolderList(q) {
  const list = document.getElementById('folder-list');

    const title = titleEl?.textContent || '';
    el.style.display = title.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function initFolderDrag() {
  const list = document.getElementById('folder-list');
  if(!list) return;
  let dragging = null;
  list.querySelectorAll('.drag-folder').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      dragging = el;
      setTimeout(() => el.style.opacity = '0.4', 0);
    });
    el.addEventListener('dragend', async e => {
      el.style.opacity = '';
      dragging = null;
      const newOrder = [...list.querySelectorAll('.drag-folder')].map(d => d.getAttribute('data-id'));
      inspectionFolders.sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
      const { token } = getInspectionAuth();
      for(let i=0; i<inspectionFolders.length; i++) {
        await fetch(`${SUPABASE_URL}/rest/v1/inspection_folders?id=eq.${inspectionFolders[i].id}`, {
          method: 'PATCH',
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ sort_order: i })
        });
      }
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if(dragging && dragging !== el) {
        const rect = el.getBoundingClientRect();
        const mid = rect.top + rect.height/2;
        if(e.clientY < mid) list.insertBefore(dragging, el);
        else list.insertBefore(dragging, el.nextSibling);
      }
    });
  });
}

function initItemDrag() {
  const list = document.getElementById('inspection-items-list');
  if(!list) return;
  const folderId = currentInspectionFolder?.id;
  let dragging = null;
  list.querySelectorAll('.drag-item').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      dragging = el;
      setTimeout(() => el.style.opacity = '0.4', 0);
    });
    el.addEventListener('dragend', async e => {
      el.style.opacity = '';
      dragging = null;
      // 순서 저장
      const newOrder = [...list.querySelectorAll('.drag-item')].map(d => d.getAttribute('data-id'));
      inspectionItems[folderId].sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
      await updateInspectionItemOrder(folderId);
      // 번호 갱신
      list.querySelectorAll('.drag-item').forEach((el,i) => {
        const numEl = el.querySelectorAll('div')[0];
        if(numEl) numEl.textContent = i+1;
      });
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if(dragging && dragging !== el) {
        const rect = el.getBoundingClientRect();
        const mid = rect.top + rect.height/2;
        if(e.clientY < mid) list.insertBefore(dragging, el);
        else list.insertBefore(dragging, el.nextSibling);
      }
    });
  });
}

let selectedDocIds = new Set();

function toggleDocSelect(docId, el) {
  if(selectedDocIds.has(docId)) {
    selectedDocIds.delete(docId);
    el.style.borderColor = 'var(--border)';
    el.style.background = 'var(--surface)';
    el.querySelector('.doc-check').style.background = '#fff';
    el.querySelector('.doc-check').style.borderColor = '#ccc';
    el.querySelector('.doc-check').textContent = '';
  } else {
    selectedDocIds.add(docId);
    el.style.borderColor = 'var(--primary)';
    el.style.background = '#f0f0ff';
    el.querySelector('.doc-check').style.background = 'var(--primary)';
    el.querySelector('.doc-check').style.borderColor = 'var(--primary)';
    el.querySelector('.doc-check').textContent = '✓';
    el.querySelector('.doc-check').style.color = '#fff';
  }
  const count = selectedDocIds.size;
  const countEl = document.getElementById('doc-selected-count');
  if(countEl) countEl.textContent = count > 0 ? `${count}개 선택됨` : '';
  const btn = document.getElementById('submit-add-docs-btn');
  if(btn) btn.textContent = count > 0 ? `${count}개 추가` : '선택 추가';
}

async function submitAddDocs() {
  if(selectedDocIds.size === 0) { alert('도면을 선택해주세요.'); return; }
  const folderId = currentInspectionFolder?.id;
  if(!folderId) return;
  const btn = document.getElementById('submit-add-docs-btn');
  if(btn) { btn.disabled = true; btn.textContent = '추가 중...'; }
  for(const docId of selectedDocIds) {
    await addInspectionItem(folderId, docId);
  }
  selectedDocIds.clear();
  closeAddDocModal();
  renderInspectionDetail(document.getElementById('main-content'));
}

function openAddDocModal() {
  document.getElementById('add-doc-modal').style.display = 'flex';
  loadLibraryThumbs();
}

function closeAddDocModal() {
  document.getElementById('add-doc-modal').style.display = 'none';
  selectedDocIds.clear();
}

function filterInspectionDocs(q) {
  const list = document.getElementById('doc-list');
  if(!list) return;
  const items = list.querySelectorAll('div[onclick]');
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(q.toLowerCase()) ? '' : 'none';
  });
}

async function moveInspectionItem(itemId, folderId, dir) {
  const items = inspectionItems[folderId] || [];
  const idx = items.findIndex(i => i.id === itemId);
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= items.length) return;
  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
  await updateInspectionItemOrder(folderId);
  renderInspectionDetail(document.getElementById('main-content'));
}

function toggleAllInspectionSelect() {
  const checks = document.querySelectorAll('.inspection-print-check');
  const allChecked = [...checks].every(c => c.checked);
  checks.forEach(c => c.checked = !allChecked);
  document.getElementById('inspection-select-all-btn').textContent = allChecked ? '전체 선택' : '전체 해제';
}

function toggleInspectionRotate(btn) {
  const rotated = btn.dataset.rotated === '1';
  btn.dataset.rotated = rotated ? '0' : '1';
  btn.style.color = rotated ? 'var(--muted)' : 'var(--primary)';
  btn.style.borderColor = rotated ? 'var(--border2)' : 'var(--primary)';
  btn.textContent = rotated ? '↻ 회전' : '↺ 원래대로';
}

async function printSelectedInspectionItems(folderId) {
  const checks = document.querySelectorAll('.inspection-print-check:checked');
  if(checks.length === 0) { showToast('인쇄할 도면을 선택해 주세요.'); return; }
  const selectedIds = [...checks].map(c => c.dataset.itemId);
  // 회전 정보 수집
  const rotatedIds = new Set([...document.querySelectorAll('button[data-rotated="1"]')].map(b => {
    return b.closest('.drag-item')?.dataset.id;
  }).filter(Boolean));
  const items = (inspectionItems[folderId] || []).filter(item => selectedIds.includes(item.id));

  const signedItems = await Promise.all(items.map(async item => {
    const doc = inspectionDocs.find(d => d.id === item.doc_id);
    if(!doc) return null;
    let url = doc.file_url;
    try {
      const filePath = doc.file_path || (doc.file_url ? doc.file_url.split('/library/')[1]?.split('?')[0] : null);
      if(filePath) url = await getLibraryFileUrl(filePath) || url;
    } catch(e) {}
    return { id: item.id, url, paper_size: item.paper_size || 'A4 landscape', title: doc.title };
  }));

  const validItems = signedItems.filter(Boolean);
  if(validItems.length === 0) { showToast('인쇄할 도면이 없어요.'); return; }

  const printWin = window.open('', '_blank');
  const pageStyles = '@page{margin:5mm;}';
  const styleStr = `
    *{margin:0;padding:0;}
    body{margin:0;}
    @media print{
      body{margin:0;}
      img{display:block;width:100%;height:100vh;object-fit:contain;page-break-after:always;}
      img:last-child{page-break-after:avoid;}
    }
  `;
  // 회전 이미지를 canvas로 변환
  async function rotateImgToDataUrl(url) {
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalHeight;
        canvas.height = img.naturalWidth;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(Math.PI/2);
        ctx.drawImage(img, -img.naturalWidth/2, -img.naturalHeight/2);
        resolve(canvas.toDataURL('image/jpeg', 0.95));
      };
      img.onerror = () => resolve(url);
      img.src = url;
    });
  }
  // 회전 이미지 미리 변환
  const processedItems = await Promise.all(validItems.map(async item => {
    if(rotatedIds?.has(item.id)) {
      const rotatedUrl = await rotateImgToDataUrl(item.url);
      return {...item, url: rotatedUrl};
    }
    return item;
  }));
  const pagesHtml = processedItems.map((item,i) => {
    const isLast = i === processedItems.length - 1;
    return `<div style="page-break-after:${isLast?'avoid':'always'};break-after:${isLast?'avoid':'page'};width:100%;height:100vh;display:flex;align-items:center;justify-content:center;"><img src="${item.url}" style="width:100%;height:100%;object-fit:contain;"></div>`;
  }).join('');
  const scriptStr = 'window.onload=function(){setTimeout(function(){window.print();},800);};';
  printWin.document.write('<!DOCTYPE html><html><head><title>검측요청서</title><style>' + styleStr + '<\/style><\/head><body>' + pagesHtml + '<script>' + scriptStr + '<\/scr' + 'ipt><\/body><\/html>');
  printWin.document.close();
}

async function printInspectionFolder(folderId) {
  if(!inspectionItems[folderId]) await loadInspectionItems(folderId);
  const items = inspectionItems[folderId] || [];
  if(items.length === 0) { alert('출력할 도면이 없습니다.'); return; }

  // 이미지 URL 서명 갱신
  const signedItems = await Promise.all(items.map(async item => {
    const doc = inspectionDocs.find(d => d.id === item.doc_id);
    if(!doc) return null;
    let url = doc.file_url;
    try {
      const filePath = doc.file_path || (doc.file_url ? doc.file_url.split('/library/')[1]?.split('?')[0] : null);
      if(filePath) url = await getLibraryFileUrl(filePath) || url;
    } catch(e) {}
    const paperSize = item.paper_size || 'A4 landscape';
    return { url, paper_size: paperSize, title: doc.title };
  }));

  const validItems = signedItems.filter(Boolean);

  const printWin = window.open('', '_blank');
  const pageStyles = '@page{margin:5mm;}';

  const styleStr = `
    *{margin:0;padding:0;}
    body{margin:0;}
    @media print{
      body{margin:0;}
      img{display:block;width:100%;height:100vh;object-fit:contain;page-break-after:always;}
      img:last-child{page-break-after:avoid;}
    }
  `;
  const pagesHtml = validItems.map((item,i) =>
    `<img src="${item.url}" alt="${item.title}">`
  ).join('');
  const scriptStr = 'window.onload=function(){setTimeout(function(){window.print();},800);};';
  printWin.document.write('<!DOCTYPE html><html><head><title>검측요청서</title><style>' + styleStr + '<\/style><\/head><body>' + pagesHtml + '<script>' + scriptStr + '<\/scr' + 'ipt><\/body><\/html>');
  printWin.document.close();
}

// 썸네일 signed URL을 localStorage에 캐싱 (새로고침/재방문해도 유지 → transform/egress 사용량 최소화)
// signed URL을 7일짜리로 길게 발급 → 도면은 거의 안 바뀌는 정적 자료이므로 자주 재발급할 필요 없음
const LIB_THUMB_CACHE_KEY = 'hj_thumb_cache_v1';
const LIB_THUMB_EXPIRES_IN = 7 * 24 * 60 * 60; // signed URL 유효기간: 7일 (초 단위)
const LIB_THUMB_CACHE_TTL = 6 * 24 * 60 * 60 * 1000; // 캐시 유지: 6일 (URL 만료 1일 전 여유)

function getThumbCacheStore() {
  try { return JSON.parse(localStorage.getItem(LIB_THUMB_CACHE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function setThumbCacheStore(store) {
  try { localStorage.setItem(LIB_THUMB_CACHE_KEY, JSON.stringify(store)); }
  catch(e) {
    // 용량 초과 등으로 저장 실패하면 캐시 비우고 재시도 (오래된 항목 누적 방지)
    try { localStorage.removeItem(LIB_THUMB_CACHE_KEY); localStorage.setItem(LIB_THUMB_CACHE_KEY, JSON.stringify(store)); }
    catch(e2) {}
  }
}

let libThumbUrlCache = {}; // file_path -> signed URL (메모리, localStorage의 빠른 1차 캐시)

// 업로드 시 미리 생성해둔 작은 썸네일 파일의 signed URL 발급 (transform 불필요 - Free 플랜에서도 동작)
async function getLibraryThumbFileUrl(thumbPath) {
  if(libThumbUrlCache[thumbPath]) return libThumbUrlCache[thumbPath];

  const store = getThumbCacheStore();
  const cached = store[thumbPath];
  if(cached && (Date.now() - cached.ts) < LIB_THUMB_CACHE_TTL) {
    libThumbUrlCache[thumbPath] = cached.url;
    return cached.url;
  }

  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/library/${thumbPath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ expiresIn: LIB_THUMB_EXPIRES_IN })
  });
  if(!res.ok) return null;
  const data = await res.json();
  if(!data.signedURL) return null;
  const url = `${SUPABASE_URL}/storage/v1${data.signedURL}`;
  libThumbUrlCache[thumbPath] = url;
  store[thumbPath] = { url, ts: Date.now() };
  setThumbCacheStore(store);
  return url;
}

async function getLibraryThumbUrl(filePath) {
  // 1차: 메모리 캐시
  if(libThumbUrlCache[filePath]) return libThumbUrlCache[filePath];

  // 2차: localStorage 캐시 (만료 안 됐으면 재사용 → transform 요청 자체를 안 보냄)
  const store = getThumbCacheStore();
  const cached = store[filePath];
  if(cached && (Date.now() - cached.ts) < LIB_THUMB_CACHE_TTL) {
    libThumbUrlCache[filePath] = cached.url;
    return cached.url;
  }

  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/library/${filePath}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ expiresIn: LIB_THUMB_EXPIRES_IN, transform: { width: 240, height: 240, resize: 'cover', quality: 60 } })
  });
  if(!res.ok) {
    console.warn('썸네일 signed URL 발급 실패:', filePath, res.status, await res.text().catch(()=>''));
    return null;
  }
  const data = await res.json();
  if(!data.signedURL) {
    console.warn('썸네일 signedURL 누락:', filePath, data);
    return null;
  }
  const url = `${SUPABASE_URL}/storage/v1${data.signedURL}`;
  libThumbUrlCache[filePath] = url;

  // localStorage에도 저장 (다음 방문/새로고침 때 재사용)
  store[filePath] = { url, ts: Date.now() };
  setThumbCacheStore(store);

  return url;
}

let libThumbObserver = null;

async function loadLibraryThumbs() {
  const imgs = Array.from(document.querySelectorAll('.lib-thumb')).filter(img => !img.dataset.loaded && !img.dataset.observed);
  if(!imgs.length) return;

  const loadOne = async (img) => {
    const path = img.dataset.path;
    const thumbPath = img.dataset.thumbPath;
    if(!path || img.dataset.loaded) return;
    img.dataset.loaded = '1';
    try {
      let url;
      if(thumbPath) {
        // 업로드 시 미리 만들어둔 작은 썸네일 파일 사용 (Free 플랜에서도 동작, transform 불필요)
        url = await getLibraryThumbFileUrl(thumbPath);
      }
      if(!url) {
        // 구버전 도면(썸네일 없음) - 서버 transform 시도 (Pro 플랜에서만 동작)
        url = await getLibraryThumbUrl(path);
      }
      if(!url) url = await getLibraryFileUrl(path);
      if(url) {
        img.src = url;
      } else {
        console.warn('썸네일 URL 발급 실패 (전부 null):', path);
      }
    } catch(e) {
      console.warn('썸네일 로드 예외:', path, e);
    }
  };

  if('IntersectionObserver' in window) {
    if(!libThumbObserver) {
      libThumbObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting) {
            loadOne(entry.target);
            libThumbObserver.unobserve(entry.target);
          }
        });
      }, { rootMargin: '300px' }); // 화면에 들어오기 300px 전부터 미리 로드 (스크롤 시 끊김 없이)
    }
    imgs.forEach(img => {
      img.dataset.observed = '1';
      libThumbObserver.observe(img);
    });
  } else {
    // 폴백: IntersectionObserver 미지원 시 동시 로드
    const concurrency = 6;
    let idx = 0;
    async function worker() {
      while(idx < imgs.length) { await loadOne(imgs[idx++]); }
    }
    await Promise.all(Array.from({ length: Math.min(concurrency, imgs.length) }, worker));
  }
}

        </div>
      </div>
    </div>`);

async function confirmLibraryBulkUpload(storageType) {
  const category = document.getElementById('lib-bulk-cat-select').value;
  const files = window._libBulkFiles || [];
  document.getElementById('lib-bulk-cat-modal').remove();
  if(!files.length) return;

  // 진행률 모달
  document.body.insertAdjacentHTML('beforeend', `
    <div id="lib-bulk-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1002;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
      <div style="background:var(--card);border-radius:16px;padding:24px;width:min(420px,92vw)">
        <div style="font-size:15px;font-weight:700;margin-bottom:14px">📦 일괄 업로드 중...</div>
        <div style="background:var(--surface);border-radius:8px;height:10px;overflow:hidden;margin-bottom:10px">
          <div id="lib-bulk-bar" style="background:var(--primary);height:100%;width:0%;transition:width .15s"></div>
        </div>
        <div id="lib-bulk-status" style="font-size:13px;color:var(--muted)">0 / ${files.length}</div>
        <div id="lib-bulk-fail" style="font-size:12px;color:#dc2626;margin-top:8px;max-height:120px;overflow-y:auto"></div>
      </div>
    </div>`);

  let done = 0;
  const failed = [];
  for(const file of files) {
    try {
      // 파일명(확장자 제외)을 제목으로 사용 (예: "1A065_84㎡A형 단위세대 MC중심선도.png" -> 제목 그대로)
      const title = file.name.replace(/\.[^.]+$/, '');
      await uploadLibraryFile(file, category || '미분류', title, '', storageType);
    } catch(e) {
      failed.push(file.name);
    }
    done++;
    const bar = document.getElementById('lib-bulk-bar');
    const status = document.getElementById('lib-bulk-status');
    if(bar) bar.style.width = Math.round(done/files.length*100) + '%';
    if(status) status.textContent = `${done} / ${files.length}` + (failed.length ? ` (실패 ${failed.length}건)` : '');
  }

  const failEl = document.getElementById('lib-bulk-fail');
  if(failEl && failed.length) {
    failEl.innerHTML = `실패: ${failed.slice(0,10).join(', ')}${failed.length>10?` 외 ${failed.length-10}건`:''}`;
  }
  showToast(`✅ 업로드 완료! 성공 ${files.length-failed.length}건${failed.length?` · 실패 ${failed.length}건`:''}`);
  window._libBulkFiles = null;

async function openLibraryPaste() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `paste_${Date.now()}.png`, {type});
          openLibraryUpload(file);
          return;
        }
      }
    }
    showToast('클립보드에 이미지가 없어요. 카톡에서 이미지를 복사 후 시도해주세요.');

let libZoomScale = 1;      // 현재 줌 배율 (1 = fit 기준)
let libBaseFitWidth = 0;   // "전체 맞춤" 상태의 기준 너비(px)

function libApplyZoomWidth() {
  const img = document.getElementById('lib-view-img');
  if(!img || !libBaseFitWidth) return;
  img.style.width = (libBaseFitWidth * libZoomScale) + 'px';
  img.style.height = 'auto';
  const label = document.getElementById('lib-zoom-label');
  if(label) label.textContent = Math.round(libZoomScale * 100) + '%';
}

function libZoom(delta) {
  if(!libBaseFitWidth) return;
  libZoomScale = Math.max(0.2, Math.min(8, libZoomScale + delta));
  libApplyZoomWidth();
}

function libZoomReset() {
  // 원본 = 이미지의 실제 자연 픽셀 크기
  const img = document.getElementById('lib-view-img');
  if(img && img.naturalWidth && libBaseFitWidth) {
    libZoomScale = img.naturalWidth / libBaseFitWidth;
    libApplyZoomWidth();
  }
}

function libZoomFit() {
  const img = document.getElementById('lib-view-img');
  const container = document.getElementById('lib-view-scroll');
  if(!img || !container || !img.naturalWidth) {
    libZoomScale = 1;
    const label = document.getElementById('lib-zoom-label');
    if(label) label.textContent = '100%';
    return;
  }
  const availW = Math.max(50, container.clientWidth - 40);  // padding 20px*2 고려
  const availH = Math.max(50, container.clientHeight - 40);
  const ratio = img.naturalWidth / img.naturalHeight;
  let w = availW, h = w / ratio;
  if(h > availH) { h = availH; w = h * ratio; }
  libBaseFitWidth = w;
  libZoomScale = 1;
  img.style.width = w + 'px';
  img.style.height = 'auto';
  const label = document.getElementById('lib-zoom-label');
  if(label) label.textContent = '100%';
}

function initLibViewerDrag() {
  const el = document.getElementById('lib-view-scroll');
  if(!el) return;
  let isDragging = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;

  const onDown = (x, y) => {
    isDragging = true;
    startX = x; startY = y;
    scrollLeft = el.scrollLeft; scrollTop = el.scrollTop;
    el.style.cursor = 'grabbing';
    el.style.userSelect = 'none';
  };
  const onMove = (x, y) => {
    if(!isDragging) return;
    el.scrollLeft = scrollLeft - (x - startX);
    el.scrollTop  = scrollTop  - (y - startY);
  };
  const onUp = () => {
    isDragging = false;
    el.style.cursor = 'grab';
    el.style.userSelect = '';
  };

  el.addEventListener('mousedown',  e => { if(e.button===0) onDown(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   onUp);

  // 터치 지원 (모바일)
  el.addEventListener('touchstart', e => { const t=e.touches[0]; onDown(t.clientX, t.clientY); }, {passive:true});
  el.addEventListener('touchmove',  e => { const t=e.touches[0]; onMove(t.clientX, t.clientY); }, {passive:true});
  el.addEventListener('touchend',   onUp);
}

  doc.write('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>' + title + '</title><style>');
  doc.write('* { box-sizing:border-box; margin:0; padding:0; }');

  doc.write('<div style="color:rgba(255,255,255,.5);font-size:11px;margin-top:2px">' + meta + '</div></div>');
  doc.write('<div style="color:rgba(255,255,255,.4);font-size:11px">드래그로 이동 / 버튼으로 확대</div></div>');
  doc.write('<div class="img-wrap" id="img-wrap"><img id="main-img" src="' + imgSrc + '" style="border-radius:6px;margin:auto;display:block;user-select:none;-webkit-user-drag:none"></div>');
  doc.write('<div class="zoom-bar">');
  doc.write('<button id="zm">− 축소</button>');
  doc.write('<span id="zl" style="color:rgba(255,255,255,.7);font-size:12px;min-width:44px;text-align:center">100%</span>');
  doc.write('<button id="zp">+ 확대</button>');
  doc.write('<button id="zr">원본</button>');
  doc.write('<button id="zf">전체 맞춤</button>');
  doc.write('</div>');
  doc.close();

  const win = libFloatWin;
  win.onload = function() {
    const img = win.document.getElementById('main-img');
    const wrap = win.document.getElementById('img-wrap');
    let baseFitWidth = 0, zoomScale = 1;

    function applyZoom() {
      img.style.width = (baseFitWidth * zoomScale) + 'px';
      img.style.height = 'auto';
      win.document.getElementById('zl').textContent = Math.round(zoomScale * 100) + '%';
    }
    function setZoom(s) {
      zoomScale = Math.max(0.2, Math.min(8, s));
      applyZoom();
    }
    function fitZoom() {
      if(!img.naturalWidth) return;
      const availW = Math.max(50, wrap.clientWidth - 24);
      const availH = Math.max(50, wrap.clientHeight - 24);
      const ratio = img.naturalWidth / img.naturalHeight;
      let w = availW, h = w / ratio;
      if(h > availH) { h = availH; w = h * ratio; }
      baseFitWidth = w; zoomScale = 1;
      img.style.width = w + 'px'; img.style.height = 'auto';
      win.document.getElementById('zl').textContent = '100%';
    }
    img.onload = fitZoom;
    if(img.complete && img.naturalWidth) fitZoom();

    win.document.getElementById('zm').onclick = () => setZoom(zoomScale - 0.2);
    win.document.getElementById('zp').onclick = () => setZoom(zoomScale + 0.2);
    win.document.getElementById('zr').onclick = () => { if(img.naturalWidth && baseFitWidth) setZoom(img.naturalWidth / baseFitWidth); };
    win.document.getElementById('zf').onclick = fitZoom;

    // 드래그로 이동
    let isDragging = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;
    wrap.addEventListener('mousedown', e => {
      if(e.button !== 0) return;
      isDragging = true; startX = e.clientX; startY = e.clientY;
      scrollLeft = wrap.scrollLeft; scrollTop = wrap.scrollTop;
      wrap.classList.add('dragging');
    });
    win.addEventListener('mousemove', e => {
      if(!isDragging) return;
      wrap.scrollLeft = scrollLeft - (e.clientX - startX);
      wrap.scrollTop  = scrollTop  - (e.clientY - startY);
    });
    win.addEventListener('mouseup', () => { isDragging = false; wrap.classList.remove('dragging'); });
  };
  if(win.document.readyState === 'complete') win.onload();
  libFloatWin.focus();
}

async function loadPersonalEvents() {

  if(!userId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_events?user_id=eq.${userId}&order=date.asc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(res.ok) personalEvents = await res.json();
  } catch(e) { console.warn('personal events load error', e); }
}

async function savePersonalEvent(ev) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  const payload = { user_id: userId, date: ev.date, end_date: ev.end_date||null, title: ev.title, memo: ev.memo||'', color: ev.color||'#3b82f6' };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/personal_events`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(payload)
  });
  if(res.ok) { const rows = await res.json(); personalEvents.push(rows[0]); }
}

async function updatePersonalEvent(id, patch) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_events?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(patch)
  });
  personalEvents = personalEvents.map(e => e.id === id ? {...e, ...patch} : e);
}

async function deletePersonalEvent(id) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/personal_events?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  personalEvents = personalEvents.filter(e => e.id !== id);
}

async function confirmSavePersonalEvent(editId) {
  const modal = document.getElementById('personal-event-modal');
  const title = document.getElementById('pev-title')?.value.trim();
  const date = document.getElementById('pev-date')?.value;
  const end_date = document.getElementById('pev-end')?.value || null;
  const memo = document.getElementById('pev-memo')?.value.trim();
  const colorEl = modal?.querySelector('div[data-color][style*="outline:2.5px"]') || modal?.querySelector('div[data-color]');
  const color = modal?._getSelectedColor?.() || colorEl?.dataset.color || '#3b82f6';
  if(!title || !date) { showToast('제목과 날짜를 입력해주세요.'); return; }

  const isOffDay = /^휴무/.test(title.trim());
  const finalColor = isOffDay ? '#ef4444' : color;

  if(editId) {
    await updatePersonalEvent(editId, { title, date, end_date, memo, color: finalColor });
    // 휴무면 customEvents도 업데이트
    if(isOffDay) {
      const existing = customEvents.find(e => /^휴무/.test(e.title?.trim()) && e.date === date);
      if(existing) {
        customEvents = customEvents.map(e => e.id === existing.id ? {...e, title, date, endDate: end_date||null, memo} : e);
      } else {
        customEvents.push({id:uid(), title, date, endDate: end_date||null, tag:'일정', color:'#ef4444', memo, createdAt: new Date().toISOString()});
      }
      save(); saveCustomEventsToSupabase();
    }
    showToast('✅ 수정됐어요.');
  } else {
    await savePersonalEvent({ title, date, end_date, memo, color: finalColor });
    // 휴무면 customEvents에도 동시 저장
    if(isOffDay) {
      const newEv = {id:uid(), title, date, endDate: end_date||null, tag:'일정', color:'#ef4444', memo, createdAt: new Date().toISOString()};
      customEvents.push(newEv);
      save();
      // Supabase에 직접 insert
      await sbFetch('custom_events', 'POST', [{
        id: newEv.id, title, date, end_date: end_date||null, tag:'일정', color:'#ef4444', memo, created_at: newEv.createdAt
      }]);
    }
    showToast('✅ 추가됐어요.');
  }
  modal?.remove();
  // 업무캘린더도 갱신 (휴무 연동)
  if(currentView === 'calendar') renderCalendarView(document.getElementById('main-content'));
  else if(currentView === 'dashboard') renderDashboard(document.getElementById('main-content'));
  else renderPersonalView(document.getElementById('main-content'));
}

async function confirmDeletePersonalEvent(id) {
  if(!confirm('이 일정을 삭제할까요?')) return;
  const ev = personalEvents.find(e => e.id === id);
  document.getElementById('personal-event-modal')?.remove();
  await deletePersonalEvent(id);
  // 휴무였으면 customEvents에서도 같은 날짜 휴무 삭제
  if(ev && /^휴무/.test(ev.title?.trim())) {
    const target = customEvents.find(e => /^휴무/.test(e.title?.trim()) && e.date === ev.date);
    if(target) {
      customEvents = customEvents.filter(e => e.id !== target.id);
      save(); saveCustomEventsToSupabase();
      sbFetch('custom_events', 'DELETE', null, `?id=eq.${target.id}`).catch(e=>console.error(e));
    }
  }
  showToast('🗑️ 삭제됐어요.');
  renderPersonalView(document.getElementById('main-content'));
}

function drawPersonalRangeBars(y, mo) {
  const gridId = 'p-cal-grid';
  document.querySelectorAll(`#${gridId} .range-bar-item`).forEach(el => el.remove());
  const rangeEvents = personalEvents.filter(e => e.end_date && e.end_date !== e.date);
  if(!rangeEvents.length) return;

  const monthStart = dateKey(new Date(y, mo, 1));
  const monthEnd = dateKey(new Date(y, mo+1, 0));

  rangeEvents.forEach(ev => {
    const color = ev.color || '#3b82f6';
    let cur = new Date(ev.date > monthStart ? ev.date : monthStart);
    const endD = new Date(ev.end_date < monthEnd ? ev.end_date : monthEnd);
    if(cur > endD) return;
    while(cur <= endD) {
      const dk = dateKey(cur);
      const cell = document.querySelector(`#${gridId} [data-dk="${dk}"]`);
      if(cell) {
        const isStart = dk === ev.date;
        const isEnd = dk === ev.end_date;
        const dow = cur.getDay();
        const isWeekStart = dow === 0;
        const isWeekEnd = dow === 6;
        const showLabel = isStart || isWeekStart;
        const capLeft = isStart || isWeekStart;
        const capRight = isEnd || isWeekEnd;
        const bar = document.createElement('div');
        bar.className = 'range-bar-item';
        bar.style.cssText = `display:block;margin-top:2px;margin-bottom:1px;margin-left:-6px;margin-right:-7px;height:16px;background:${color}33;color:${color};font-size:10px;font-weight:700;border-radius:${capLeft?'4px':'0'} ${capRight?'4px':'0'} ${capRight?'4px':'0'} ${capLeft?'4px':'0'};padding:1px 6px;overflow:hidden;white-space:nowrap;cursor:pointer;line-height:14px;position:relative;z-index:5;`;
        bar.textContent = showLabel ? ev.title : '';
        bar.title = ev.title;
        bar.onclick = e => { e.stopPropagation(); openPersonalEventModal(ev.date, ev.id); };
        const ref = cell.querySelector('.cal-event, .cal-more');
        cell.insertBefore(bar, ref);
      }
      cur.setDate(cur.getDate() + 1);
    }
  });
}

function renderPersonalCalendar() {
  const y = pCalYear, mo = pCalMonth;
  const firstDay = new Date(y, mo, 1).getDay();
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const cells = [];
  for(let i=0; i<firstDay; i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(y, mo, d));

  const upcomingEvs = personalEvents
    .filter(e => e.date >= todayKey())
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, 5);

  return `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="calendar-card" style="border:none;padding:0;background:transparent">
        <div class="calendar-head">
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="pCalNav(-1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">‹</button>
            <div class="calendar-title">${y}년 ${monthNames[mo]}</div>
            <button onclick="pCalNav(1)" style="height:28px;min-width:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:14px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 8px">›</button>
          </div>
          <button onclick="pCalNav(0)" style="height:28px;border:1px solid var(--border2);background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;padding:0 12px">오늘</button>
        </div>
        <div class="calendar-grid" id="p-cal-grid">
          ${['일','월','화','수','목','금','토'].map(d=>`<div class="day-label">${d}</div>`).join('')}
          ${cells.map((date, i) => {
            if(!date) return '<div class="cal-cell" data-dk=""></div>';
            const dk = dateKey(date);
            const dayEvs = personalEvents.filter(e => e.date === dk || (e.end_date && e.date <= dk && e.end_date >= dk));
            const isToday = isSameDay(date, new Date());
            const isSun = i % 7 === 0;
            const allDayCustom = getCustomEventsForDate(dk);
            const dayPersonalEvs = personalEvents.filter(e => e.date === dk);
            const isOffDay = [...allDayCustom, ...dayPersonalEvs].some(e => /^휴무/.test(e.title?.trim()));
            const isWorkSat = allDayCustom.some(e => /^근무/.test(e.title?.trim())) && date.getDay() === 6;
            const holiday = appSettings.showHoliday !== false ? getHoliday(y, mo, date.getDate()) : null;
            return `<div class="cal-cell ${isToday?'today':''} ${isSun?'sunday':''} ${holiday?'holiday':''} ${isOffDay?'off-day':''} ${dayEvs.length?'has-custom':''}" data-dk="${dk}" onclick="openPersonalEventModal('${dk}')">
              <div class="cal-date" style="${isOffDay?'color:#ef4444':''}">
                <span>${date.getDate()}</span>
                ${isOffDay?'<span style="font-size:11px;color:#ef4444;font-weight:900;margin-left:3px">휴무</span>':''}
                ${isWorkSat?'<span style="font-size:11px;color:#0f766e;font-weight:900;margin-left:3px">근무</span>':''}
                ${holiday?`<span class="holiday-name" style="display:inline;margin-left:3px">${holiday}</span>`:''}
              </div>
              ${dayEvs.slice(0,3).map(e=>`<span class="cal-event custom-ev" onclick="event.stopPropagation();openPersonalEventModal('${dk}','${e.id}')" style="${e.color?'background:'+e.color+'22;color:'+e.color:''}">${e.title}</span>`).join('')}
              ${dayEvs.length>3?`<span class="cal-more">+${dayEvs.length-3}</span>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="panel-title">다가오는 일정</div>
          <button class="btn-primary" style="font-size:11px;padding:5px 10px" onclick="openPersonalEventModal('${todayKey()}')">+ 추가</button>
        </div>
        ${upcomingEvs.length ? upcomingEvs.map(e=>`
          <div class="mini-schedule" style="cursor:pointer;border-left-color:${e.color||'#3b82f6'}" onclick="openPersonalEventModal('${e.date}','${e.id}')">
            <div class="mini-date" style="color:${e.color||'#3b82f6'}">${formatDate(e.date)}${e.end_date?' ~ '+formatDate(e.end_date):''}</div>
            <div class="mini-text">${e.title}</div>
            ${e.memo?`<div class="meta">${e.memo}</div>`:''}
          </div>`).join('')
        : '<div class="empty-box">다가오는 일정이 없습니다.</div>'}
      </div>
    </div>
  `;
}

let punchItems = [];
let punchFilter = '전체';
let punchCatFilter = '전체';
let punchLocationFilter = '전체';
let punchContractorFilter = '전체';
let pendingPunchImageFile = null;
const PUNCH_CATS_DEFAULT = ['도배','바닥','창호','설비','목공','기타'];

function getPunchCats() {
  return appSettings.punchCategories || PUNCH_CATS_DEFAULT;
}
function getPunchContractors() {
  return appSettings.punchContractors || [];
}

let punchImages = {}; // punch_id -> [{id, image_path, thumb_path}]

async function loadPunchImages(punchId) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_images?punch_id=eq.${punchId}&order=created_at.asc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(res.ok) punchImages[punchId] = await res.json();
  return punchImages[punchId] || [];
}

async function savePunchImage(punchId, imagePath, thumbPath) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_images`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ punch_id: punchId, image_path: imagePath, thumb_path: thumbPath })
  });
  if(res.ok) {
    const rows = await res.json();
    if(!punchImages[punchId]) punchImages[punchId] = [];
    punchImages[punchId].push(rows[0]);
    return rows[0];
  }
  return null;
}

async function deletePunchImage(imageId, punchId) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/punch_images?id=eq.${imageId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  if(punchImages[punchId]) {
    punchImages[punchId] = punchImages[punchId].filter(img => img.id !== imageId);
  }
}

async function loadPunchItems() {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  if(!userId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_items?user_id=eq.${userId}&order=created_at.desc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if(res.ok) punchItems = await res.json();
  } catch(e) { console.warn('punch load error', e); }
}

async function savePunchItem(item) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  let userId = null;
  try { userId = JSON.parse(atob(token.split('.')[1])).sub; } catch(e) {}
  const res = await fetch(`${SUPABASE_URL}/rest/v1/punch_items`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ user_id: userId, ...item })
  });
  if(res.ok) { const rows = await res.json(); punchItems.unshift(rows[0]); }
}
async function updatePunchItem(id, patch) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/punch_items?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(patch)
  });
  punchItems = punchItems.map(p => p.id === id ? {...p, ...patch} : p);
}

async function deletePunchItem(id) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/punch_items?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
  });
  punchItems = punchItems.filter(p => p.id !== id);
}

async function togglePunchStatus(id) {
  const item = punchItems.find(p => p.id === id);
  if(!item) return;
  const done = item.status !== '조치완료';
  await updatePunchItem(id, { status: done ? '조치완료' : '미조치', completed_at: done ? new Date().toISOString() : null });
  renderPunchView(document.getElementById('main-content'));
}

function openPunchCompleteModal(id) {
  const existing = document.getElementById('punch-complete-modal');
  if(existing) existing.remove();
  let pendingAfterFile = null;

  const modal = document.createElement('div');
  modal.id = 'punch-complete-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--card);border-radius:14px;width:100%;max-width:400px;padding:20px">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">조치완료 처리</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">조치 후 사진을 첨부할 수 있어요 (선택)</div>
      <input type="file" id="punch-after-input" accept="image/*" style="display:none" onchange="handleAfterImageSelect(event)">
      <div id="punch-after-preview-wrap" style="margin-bottom:16px">
        <div style="display:flex;gap:6px">
          <button class="btn-ghost" style="flex:1;padding:10px;font-size:12px" onclick="document.getElementById('punch-after-input').click()">📷 이미지 선택</button>
          <button class="btn-ghost" style="flex:1;padding:10px;font-size:12px" onclick="pasteAfterImage()">📋 붙여넣기</button>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" style="flex:1" onclick="document.getElementById('punch-complete-modal').remove()">취소</button>
        <button class="btn-primary" style="flex:2" id="punch-complete-btn" onclick="confirmPunchComplete('${id}')">조치완료 저장</button>
      </div>
    </div>
  `;

  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  modal.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if(!items) return;
    for(const item of items) {
      if(item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if(!file) continue;
        setAfterImagePreview(file);
        showToast('📋 이미지를 붙여넣었어요');
        break;
      }
    }
  });
  document.body.appendChild(modal);
}

let pendingAfterImageFile = null;

function setAfterImagePreview(file) {
  pendingAfterImageFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const wrap = document.getElementById('punch-after-preview-wrap');
    if(wrap) wrap.innerHTML = `
      <div style="position:relative;display:inline-block;width:100%">
        <img src="${ev.target.result}" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid var(--border2)">
        <button onclick="pendingAfterImageFile=null;document.getElementById('punch-after-preview-wrap').innerHTML='<div style=display:flex;gap:6px><button class=btn-ghost style=flex:1;padding:10px;font-size:12px onclick=document.getElementById(punch-after-input).click()>📷 이미지 선택</button><button class=btn-ghost style=flex:1;padding:10px;font-size:12px onclick=pasteAfterImage()>📋 붙여넣기</button></div>'" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px">✕</button>
      </div>
    `;
  };
  reader.readAsDataURL(file);
}

function handleAfterImageSelect(e) {
  const file = e.target.files?.[0];
  if(file) setAfterImagePreview(file);
}

async function pasteAfterImage() {
  try {
    const items = await navigator.clipboard.read();
    for(const item of items) {
      for(const type of item.types) {
        if(type.startsWith('image/')) {
          const blob = await item.getType(type);
          const file = new File([blob], `after_${Date.now()}.png`, { type });
          setAfterImagePreview(file);
          showToast('📋 이미지를 붙여넣었어요');
          return;
        }
      }
    }
    showToast('클립보드에 이미지가 없어요.');
  } catch(e) {
    showToast('붙여넣기 권한이 필요해요.');
  }
}

async function confirmPunchComplete(id) {
  const btn = document.getElementById('punch-complete-btn');
  if(btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
  try {
    let after_image_path = null;
    let after_thumb_path = null;
    if(pendingAfterImageFile) {
      const result = await uploadPunchImage(pendingAfterImageFile);
      after_image_path = result.filePath;
      after_thumb_path = result.thumbPath;
    }
    await updatePunchItem(id, {
      status: '조치완료',
      completed_at: new Date().toISOString(),
      after_image_path,
      after_thumb_path
    });
    document.getElementById('punch-complete-modal')?.remove();
    pendingAfterImageFile = null;
    showToast('✅ 조치완료 처리됐어요.');
    renderPunchView(document.getElementById('main-content'));
  } catch(e) {
    showToast('저장 실패: ' + e.message);
    if(btn) { btn.disabled = false; btn.textContent = '조치완료 저장'; }
  }
}

async function handleAfterImageReupload(e, punchId) {
  const file = e.target.files?.[0];
  if(!file || !punchId) return;
  showToast('⏳ 사진 교체 중...');
  try {
    const result = await uploadPunchImage(file);
    await updatePunchItem(punchId, {
      after_image_path: result.filePath,
      after_thumb_path: result.thumbPath
    });
    showToast('✅ After 사진이 교체됐어요.');

    renderPunchView(document.getElementById('main-content'));
  } catch(err) {
    showToast('❌ 사진 교체 실패');
    console.error(err);
  }
  e.target.value = '';
}

async function uploadPunchImage(file) {
  const token = localStorage.getItem('hj_token') || SUPABASE_KEY;
  const baseName = `punch_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const filePath = `${baseName}.jpg`;
  const thumbPath = `thumb_${baseName}.jpg`;

  // 원본 업로드
  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${filePath}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': file.type },
    body: file
  });
  if(!uploadRes.ok) throw new Error('이미지 업로드 실패');

  // 썸네일 생성 및 업로드
  let finalThumbPath = null;
  try {
    const thumbBlob = await resizeImageToThumb(file);
    if(thumbBlob) {
      const thumbRes = await fetch(`${SUPABASE_URL}/storage/v1/object/library/${thumbPath}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'image/jpeg' },
        body: thumbBlob
      });
      if(thumbRes.ok) finalThumbPath = thumbPath;
    }
  } catch(e) { console.warn('썸네일 생성 실패:', e); }

  return { filePath, thumbPath: finalThumbPath };
}

let pendingPunchImages = []; // [{file, previewUrl}]

function addPunchPendingImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {

    pendingPunchImages.push({ file, previewUrl: ev.target.result });
    const wrap = document.getElementById('punch-pending-images');
    if(wrap) {
      const div = document.createElement('div');
      div.style.cssText = 'position:relative;width:80px;height:80px';
      div.innerHTML = `
        <img src="${ev.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border2)">
        <button onclick="removePendingPunchImage(${idx},this.parentElement)" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;line-height:1">✕</button>
      `;
      wrap.appendChild(div);
    }
  };
  reader.readAsDataURL(file);
}

function removePendingPunchImage(idx, el) {

}
